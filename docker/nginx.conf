upstream zitadel {
  server zitadel:8080;
}

upstream zitadel-login {
  server zitadel-login:3000;
}

server {
  listen 8080;
  server_name _;

  location /ui/v2/login {
    proxy_pass http://zitadel-login;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host:$server_port;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location / {
    proxy_pass http://zitadel;
    proxy_http_version 1.1;
    # Always forward Host as "localhost:8080" so Zitadel's instance interceptor
    # matches the "localhost" domain in projections.instance_domains (port is stripped
    # for lookup), and Zitadel constructs its public URL as http://localhost:8080
    # (not port-80). Required for both browser requests AND zitadel-login API calls.
    proxy_set_header Host "localhost:8080";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host "localhost:8080";
    proxy_set_header X-Forwarded-Port "8080";
  }
}

