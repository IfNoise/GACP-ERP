version: '3.9'

# Development overrides for docker-compose.yml
# Usage: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up -d

services:
  postgres:
    environment:
      # Enable detailed logging in dev
      POSTGRES_LOG_STATEMENT: 'all'
    ports:
      - '5432:5432'

  kafka:
    environment:
      # Lower retention for dev
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 536870912

  # Kafka UI for development visibility
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: gacp-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: gacp-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - '8090:8080'
    networks:
      - gacp-net

  # RedisInsight for Redis inspection
  redis-insight:
    image: redis/redisinsight:latest
    container_name: gacp-redis-insight
    restart: unless-stopped
    ports:
      - '5540:5540'
    networks:
      - gacp-net

  # pgAdmin for PostgreSQL inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gacp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gacp-erp.example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_dev_2026}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: 'False'
    ports:
      - '5050:80'
    networks:
      - gacp-net

  # ImmuDB Webconsole (image removed from Docker Hub — disabled)
  # immudb-webconsole: disabled
