# ─── Telegraf Configuration — GACP-ERP IoT Sensor Data Collection ────────────
# EPIC 5: Environmental Monitoring
# Telegraf acts as the IoT consumer: MQTT → VictoriaMetrics IoT
# No custom Go service required — all handled declaratively here.

[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "10s"
  flush_jitter = "2s"
  collection_jitter = "1s"
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  quiet = false
  hostname = "telegraf"
  omit_hostname = false

# ─── INPUT: MQTT Consumer (EMQX broker) ──────────────────────────────────────
[[inputs.mqtt_consumer]]
  # EMQX broker address
  servers = ["tcp://emqx:1883"]

  # Subscribe to all sensor topics under gacp/sensors/
  # Topic format: gacp/sensors/{zone_id}/{sensor_type}
  topics = ["gacp/sensors/#"]

  # Parse incoming JSON payloads
  data_format = "json"

  # Preserve full topic as a tag for downstream filtering
  topic_tag = "full_topic"

  # Extract zone_id and sensor_type from topic segments
  # gacp/sensors/<zone_id>/<sensor_type>
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "gacp/sensors/+/+"
    tags = "_/_/zone_id/sensor_type"

  # JSON field names extracted from payload
  # Expected payload: {"value": 23.5, "unit": "celsius", "sensor_id": "s-001", "recorded_at": "..."}
  json_string_fields = ["unit", "sensor_id", "recorded_at"]

  # Rename measurement for consistent metric naming
  name_override = "gacp_sensor_reading"

  # Connection timeout
  connection_timeout = "30s"

  # MQTT QoS level (1 = at least once — required for data integrity)
  qos = 1

# ─── INPUT: Internal metrics (Telegraf self-monitoring) ──────────────────────
[[inputs.internal]]
  collect_memstats = false

# ─── OUTPUT: VictoriaMetrics IoT (dedicated instance, port 8429) ─────────────
[[outputs.http]]
  # Port 8428 — internal Docker network port (VM default); host exposes 8429
  url = "http://victoriametrics-iot:8428/api/v1/write"
  data_format = "prometheusremotewrite"

  # HTTP timeouts
  timeout = "10s"

  # Retry on failure to prevent data loss (ALCOA+ completeness)
  [outputs.http.headers]
    Content-Type = "application/x-protobuf"
    Content-Encoding = "snappy"
    X-Prometheus-Remote-Write-Version = "0.1.0"
