# Ephemeral infrastructure for integration / E2E tests.
# Usage:
#   docker compose -f docker/docker-compose.test.yml up -d
#   <run tests>
#   docker compose -f docker/docker-compose.test.yml down -v

services:
  postgres-test:
    image: postgis/postgis:15-3.5
    environment:
      POSTGRES_USER: gacp_test
      POSTGRES_PASSWORD: gacp_test_pass
      POSTGRES_DB: gacp_erp_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gacp_test -d gacp_erp_test']
      interval: 2s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    command: redis-server --requirepass redis_test_pass
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_test_pass', 'ping']
      interval: 2s
      timeout: 5s
      retries: 10

  kafka-test:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-test:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-test:9092,EXTERNAL://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
      CLUSTER_ID: 'test-e2e-cluster-00001'
    ports:
      - '9095:9094'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1',
        ]
      interval: 5s
      timeout: 10s
      retries: 15
