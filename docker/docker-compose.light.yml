version: '3.9'

# ─── Lightweight dev stack ──────────────────────────────────────────────────
# Usage: docker compose -f docker/docker-compose.light.yml up -d
#
# Includes ONLY the services needed for NestJS microservice development:
#   postgres, kafka, zitadel, zitadel-login, nginx (proxy), loki, jaeger
#
# Excluded: mongodb, redis, emqx, victoriametrics, victoriametrics-iot,
#           telegraf, mayan-edms, immudb

x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: '10m'
    max-file: '3'

x-restart: &default-restart
  restart: unless-stopped

networks:
  gacp-net:
    driver: bridge
    name: gacp-erp-network

volumes:
  postgres-data:
  kafka-data:
  zitadel-data:
  zitadel-bootstrap:
  loki-data:

services:
  # ─── Nginx — Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: gacp-nginx
    <<: *default-restart
    logging: *default-logging
    depends_on:
      zitadel:
        condition: service_healthy
    ports:
      - '8080:8080'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8080/ui/console > /dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── PostgreSQL 15 with PostGIS ─────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.5
    container_name: gacp-postgres
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gacp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gacp_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-gacp_erp}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_LOG_STATEMENT: 'all'
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gacp} -d ${POSTGRES_DB:-gacp_erp}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Apache Kafka 3.7 (KRaft mode) ─────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: gacp-kafka
    <<: *default-restart
    logging: *default-logging
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: '-Xmx512m -Xms256m'
    ports:
      - '${KAFKA_PORT:-9094}:9094'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Zitadel (Self-Hosted Identity Provider) ───────────────────
  zitadel:
    image: ghcr.io/zitadel/zitadel:${ZITADEL_VERSION:-latest}
    container_name: gacp-zitadel
    <<: *default-restart
    logging: *default-logging
    user: '0'
    command: 'start-from-init --masterkey=${ZITADEL_MASTERKEY}'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_GATEWAY_EXTERNAL_URL: '${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}'
      ZITADEL_EXTERNALSECURE: ${ZITADEL_EXTERNALSECURE}
      ZITADEL_TLS_ENABLED: 'false'
      ZITADEL_DATABASE_POSTGRES_DSN: 'postgresql://${POSTGRES_USER:-gacp}:${POSTGRES_PASSWORD:-gacp_secret_2026}@postgres:5432/postgres?sslmode=disable'
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: 'false'
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: ${LOGIN_CLIENT_PAT_EXPIRATION}
      ZITADEL_DEFAULTINSTANCE_ORGNAME: ${ZITADEL_ORG_NAME:-GACP-ERP}
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: 'true'
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: '${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/'
      ZITADEL_OIDC_DEFAULTLOGINURLV2: '${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/login?authRequest='
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: '${ZITADEL_PUBLIC_SCHEME}://${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}/ui/v2/login/logout?post_logout_redirect='

    expose:
      - '8080'
    volumes:
      - zitadel-data:/crdb
      - zitadel-bootstrap:/zitadel/bootstrap
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD', '/app/zitadel', 'ready']
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s

  # ─── Zitadel Login UI (v2) ────────────────────────────────────────────
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:${ZITADEL_VERSION:-latest}
    container_name: gacp-zitadel-login
    <<: *default-restart
    logging: *default-logging
    user: '0'
    depends_on:
      zitadel:
        condition: service_healthy
      nginx:
        condition: service_healthy
    environment:
      # Route through nginx so the Host header arrives at Zitadel as "localhost",
      # matching the registered instance domain in projections.instance_domains.
      ZITADEL_API_URL: 'http://nginx:8080'
      NEXT_PUBLIC_BASE_PATH: '/ui/v2/login'
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider http://localhost:3000 2>/dev/null || exit 1']
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    networks:
      - gacp-net

  # ─── Loki — log aggregation ─────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: gacp-loki
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '${LOKI_PORT:-3100}:3100'
    volumes:
      - loki-data:/loki
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Jaeger — distributed tracing ───────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: gacp-jaeger
    <<: *default-restart
    logging: *default-logging
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '${JAEGER_UI_PORT:-16686}:16686'
      - '${OTEL_OTLP_PORT:-4317}:4317'
      - '4318:4318'
    networks:
      - gacp-net
