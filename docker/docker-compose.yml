version: '3.9'

x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: '10m'
    max-file: '3'

x-restart: &default-restart
  restart: unless-stopped

networks:
  gacp-net:
    driver: bridge
    name: gacp-erp-network

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  zitadel-data:
  zitadel-bootstrap:
  immudb-data:
  mongodb-data:
  victoriametrics-data:
  victoriametrics-iot-data:
  emqx-data:
  emqx-log:
  mayan-data:
  mayan-media:
  loki-data:

services:
  # ─── PostgreSQL 15 with PostGIS ─────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.5
    container_name: gacp-postgres
    <<: *default-restart
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gacp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gacp_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-gacp_erp}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gacp} -d ${POSTGRES_DB:-gacp_erp}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Redis 7 ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gacp-redis
    <<: *default-restart
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_2026} --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret_2026}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Apache Kafka 3.7 (KRaft mode, no Zookeeper) ───────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: gacp-kafka
    <<: *default-restart
    logging: *default-logging
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: '-Xmx512m -Xms256m'
    ports:
      - '${KAFKA_PORT:-9094}:9094'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Zitadel (Self-Hosted Identity Provider) ───────────────────
  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    container_name: gacp-zitadel
    <<: *default-restart
    logging: *default-logging
    command: 'start-from-init --masterkey=${ZITADEL_MASTERKEY}'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZITADEL_DEFAULTINSTANCE_ORGNAME: ${ZITADEL_ORG_NAME:-GACP-ERP}
      ZITADEL_EXTERNALSECURE: 'false'
      ZITADEL_EXTERNALHOST: localhost:8080
      ZITADEL_TLS_ENABLED: 'false'
      ZITADEL_DATABASE_POSTGRES_DSN: 'postgresql://${POSTGRES_USER:-gacp}:${POSTGRES_PASSWORD:-gacp_secret_2026}@postgres:5432/postgres?sslmode=disable'
    ports:
      - '8080:8080'
    volumes:
      - zitadel-data:/crdb
      - zitadel-bootstrap:/zitadel/bootstrap
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD', '/app/zitadel', 'ready']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ─── Zitadel Login UI ──────────────────────────────────────────
  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:latest
    container_name: gacp-zitadel-login
    <<: *default-restart
    logging: *default-logging
    depends_on:
      zitadel:
        condition: service_healthy
    environment:
      ZITADEL_API_URL: 'http://zitadel:8080'
      NEXT_PUBLIC_BASE_PATH: '/ui/v2/login'
    ports:
      - '3001:3000'
    networks:
      - gacp-net

  # ─── ImmuDB 1.9 ──────────────────────────────────────────────────
  immudb:
    image: codenotary/immudb:1.9.3
    container_name: gacp-immudb
    <<: *default-restart
    logging: *default-logging
    environment:
      IMMUDB_ADDRESS: 0.0.0.0
      IMMUDB_PORT: 3322
      IMMUDB_ADMIN_PASSWORD: ${IMMUDB_ADMIN_PASSWORD:-immudb_secret_2026}
      IMMUDB_DIR: /var/lib/immudb
    ports:
      - '${IMMUDB_PORT:-3322}:3322'
      - '${IMMUDB_METRICS_PORT:-9497}:9497'
    volumes:
      - immudb-data:/var/lib/immudb
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD', 'immuadmin', 'status']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── MongoDB 7 ───────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: gacp-mongodb
    <<: *default-restart
    logging: *default-logging
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-gacp}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo_secret_2026}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-gacp_erp}
    ports:
      - '${MONGO_PORT:-27017}:27017'
    volumes:
      - mongodb-data:/data/db
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── VictoriaMetrics ─────────────────────────────────────────────
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.102.0
    container_name: gacp-victoriametrics
    <<: *default-restart
    logging: *default-logging
    command:
      - '--storageDataPath=/storage'
      - '--retentionPeriod=12'
      - '--httpListenAddr=:8428'
    ports:
      - '${VM_PORT:-8428}:8428'
    volumes:
      - victoriametrics-data:/storage
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8428/-/healthy || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── EMQX 5 — MQTT Broker for IoT sensors ─────────────────────
  emqx:
    image: emqx/emqx:5.6.0
    container_name: gacp-emqx
    <<: *default-restart
    logging: *default-logging
    environment:
      EMQX_NAME: gacp-emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${EMQX_ADMIN:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_ADMIN_PASSWORD:-emqx_secret_2026}
    ports:
      - '${EMQX_MQTT_PORT:-1883}:1883'
      - '${EMQX_DASHBOARD_PORT:-18083}:18083'
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD', '/opt/emqx/bin/emqx', 'ctl', 'status']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── VictoriaMetrics IoT — dedicated time-series for sensor data ─
  # Separate instance from victoriametrics (app metrics) to isolate IoT data.
  # retentionPeriod=24 months (vs 12 for app metrics — EU GMP Annex 11 §7.1).
  # Internal port 8428 (VM default); external port 8429 to avoid conflict.
  victoriametrics-iot:
    image: victoriametrics/victoria-metrics:v1.102.0
    container_name: gacp-victoriametrics-iot
    <<: *default-restart
    logging: *default-logging
    command:
      - '--storageDataPath=/storage'
      - '--retentionPeriod=24'
      - '--httpListenAddr=:8428'
    ports:
      - '${VM_IOT_PORT:-8429}:8428'
    volumes:
      - victoriametrics-iot-data:/storage
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8428/-/healthy || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Telegraf 1.30 — IoT metrics collector ────────────────────────
  telegraf:
    image: telegraf:1.30
    container_name: gacp-telegraf
    <<: *default-restart
    logging: *default-logging
    depends_on:
      emqx:
        condition: service_healthy
      victoriametrics-iot:
        condition: service_healthy
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - gacp-net

  # ─── Mayan-EDMS — Document Management System ────────────────────
  mayan-edms:
    image: mayanedms/mayanedms:s4
    container_name: gacp-mayan-edms
    <<: *default-restart
    logging: *default-logging
    environment:
      MAYAN_DATABASES: "{'default':{'ENGINE':'django.db.backends.postgresql','NAME':'mayan','USER':'${POSTGRES_USER:-gacp}','PASSWORD':'${POSTGRES_PASSWORD:-gacp_secret_2026}','HOST':'postgres','PORT':'5432'}}"
      MAYAN_CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_secret_2026}@redis:6379/2
      MAYAN_CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redis_secret_2026}@redis:6379/3
      MAYAN_SECRET_KEY: ${MAYAN_SECRET_KEY:-mayan_secret_key_change_in_production}
    ports:
      - '${MAYAN_PORT:-8000}:8000'
    volumes:
      - mayan-data:/var/lib/mayan
      - mayan-media:/usr/local/lib/python3.11/site-packages/mayan/media
    networks:
      - gacp-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:8000/en/authentication/login/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Loki — log aggregation backend ──────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    container_name: gacp-loki
    <<: *default-restart
    logging: *default-logging
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - '${LOKI_PORT:-3100}:3100'
    volumes:
      - loki-data:/loki
    networks:
      - gacp-net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3100/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
