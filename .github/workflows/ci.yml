name: CI

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10'
  NX_CLOUD_NO_TIMEOUTS: true

jobs:
  # ─── Commit Message Validation ────────────────────────────────────
  commit-lint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit messages
        run: |
          PATTERN="^(feat|fix|docs|test|refactor|compliance|chore|perf|ci|build|revert)(\([a-z0-9/_-]+\))?: .{1,100}$"
          git log --format="%s" ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | while read msg; do
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "❌ Invalid commit message: $msg"
              echo "   Required format: <type>(<scope>): <subject>"
              exit 1
            fi
          done
          echo "✅ All commit messages are valid"

  # ─── Setup & Dependency Install ──────────────────────────────────
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-pnpm.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        id: cache-pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache NX
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Upload node_modules artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-modules-${{ github.sha }}
          path: node_modules
          retention-days: 1

  # ─── Lint ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-${{ github.sha }}
          path: node_modules

      - name: Restore NX cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Set NX base/head SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: pnpm nx affected --target=lint --base=$NX_BASE --head=$NX_HEAD

  # ─── Type Check ───────────────────────────────────────────────────
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-${{ github.sha }}
          path: node_modules

      - name: Restore NX cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Set NX base/head SHAs
        uses: nrwl/nx-set-shas@v4

      - name: TypeCheck affected
        run: pnpm nx affected --target=typecheck --base=$NX_BASE --head=$NX_HEAD

  # ─── Test ─────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-${{ github.sha }}
          path: node_modules

      - name: Restore NX cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Set NX base/head SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Test affected
        run: pnpm nx affected --target=test --base=$NX_BASE --head=$NX_HEAD --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./coverage
          flags: unittests
          fail_ci_if_error: false

  # ─── Build ────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build-go]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-${{ github.sha }}
          path: node_modules

      - name: Restore NX cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Set NX base/head SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Build affected
        run: pnpm nx affected --target=build --base=$NX_BASE --head=$NX_HEAD --configuration=production

  # ─── Go: Audit Consumer ───────────────────────────────────────────
  build-go:
    name: Audit Consumer (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/audit-consumer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/audit-consumer/go.mod
          cache-dependency-path: apps/audit-consumer/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -o /dev/null ./...

      - name: Upload Go coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: apps/audit-consumer/coverage.out
          flags: go-unittests
          fail_ci_if_error: false
