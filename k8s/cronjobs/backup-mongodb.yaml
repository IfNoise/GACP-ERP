apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-mongodb
  namespace: gacp-data
  labels:
    app.kubernetes.io/name: backup-mongodb
    app.kubernetes.io/part-of: gacp-erp
    app.kubernetes.io/component: backup
spec:
  schedule: '30 3 * * *' # Daily at 03:30 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup-mongodb
        spec:
          restartPolicy: OnFailure
          serviceAccountName: backup-sa
          containers:
            - name: backup
              image: mongo:7
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail

                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_DIR="/tmp/mongodb-backup-${TIMESTAMP}"
                  BUCKET="gacp-erp-backups"
                  PREFIX="mongodb/${TIMESTAMP}"

                  echo "[$(date -Iseconds)] Starting MongoDB backup..."

                  # Create mongodump
                  mongodump \
                    --uri="${MONGODB_URI}" \
                    --out="${BACKUP_DIR}" \
                    --gzip

                  BACKUP_SIZE=$(du -sh "${BACKUP_DIR}" | cut -f1)
                  echo "[$(date -Iseconds)] Dump created: ${BACKUP_SIZE}"

                  # Archive
                  cd /tmp
                  tar -czf "mongodb-${TIMESTAMP}.tar.gz" "mongodb-backup-${TIMESTAMP}"

                  # Upload to MinIO
                  mc alias set minio http://minio.gacp-data:9000 "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"
                  mc cp "/tmp/mongodb-${TIMESTAMP}.tar.gz" "minio/${BUCKET}/${PREFIX}/mongodb-${TIMESTAMP}.tar.gz"

                  # Verify upload
                  mc stat "minio/${BUCKET}/${PREFIX}/mongodb-${TIMESTAMP}.tar.gz"

                  echo "[$(date -Iseconds)] MongoDB backup uploaded to s3://${BUCKET}/${PREFIX}/"

                  # Cleanup old backups (retain 30 days)
                  mc rm --recursive --force --older-than 30d "minio/${BUCKET}/mongodb/" || true

                  echo "[$(date -Iseconds)] MongoDB backup complete."
              env:
                - name: MONGODB_URI
                  valueFrom:
                    secretKeyRef:
                      name: mongodb-credentials
                      key: URI
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: ACCESS_KEY_ID
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-credentials
                      key: SECRET_ACCESS_KEY
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir:
                sizeLimit: 5Gi
