---
schema_version: "1.0.0"
schema_type: "checklist"

metadata:
  id: "CHKLST-ANLY-001"
  title: "Method Validation Checklist"
  version: "1.0"
  effective_date: "2025-01-15"
  related_sop: "SOP-ANLY-001"
  checklist_type: "validation"
  purpose: "Verify that all ICH Q2(R1) method validation requirements are completed and documented"
  frequency: "For each new analytical method validation or revalidation"
  required_by:
    - "Method Development Scientist"
    - "Laboratory Manager"
    - "QA Laboratory Specialist"

sections:
  - section_number: 1
    section_title: "Pre-Validation Documentation"
    description: "Verify that all required documentation is in place before starting validation"
    items:
      - item_id: "PRE-001"
        item_number: "1.1"
        description: "Analytical method protocol approved and current"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Protocol version controlled, dated, and approved by Laboratory Manager"
        reference: "SOP-DOC-001"
      - item_id: "PRE-002"
        item_number: "1.2"
        description: "Method validation protocol prepared and approved"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Validation protocol includes all applicable ICH Q2(R1) parameters"
        reference: "ICH Q2(R1)"
      - item_id: "PRE-003"
        item_number: "1.3"
        description: "Instrument qualification current (IQ/OQ/PQ)"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Instrument qualification within annual requalification date"
        reference: "USP <1058>, SOP-EQCAL-001"
      - item_id: "PRE-004"
        item_number: "1.4"
        description: "Reference standards obtained and documented"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Certified reference materials with CoA, >98% purity, stored per requirements"
        reference: "SOP-ANLY-001 Section 5.4"
      - item_id: "PRE-005"
        item_number: "1.5"
        description: "Analyst(s) trained and qualified on method"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Training records current, competency assessment passed"
        reference: "TRN-ANLY-001"
      - item_id: "PRE-006"
        item_number: "1.6"
        description: "Blank matrix samples available for validation"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Sufficient blank matrix confirmed free of target analytes"
        reference: "Validation Protocol"

  - section_number: 2
    section_title: "Specificity/Selectivity"
    description: "Verify method measures analyte without interference"
    items:
      - item_id: "SPEC-001"
        item_number: "2.1"
        description: "Blank matrix samples analyzed"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "No interference at analyte retention time, response <LOQ"
        reference: "ICH Q2(R1) Section 3.1"
        measurement_unit: "Peak area"
        target_value: "<LOQ"
      - item_id: "SPEC-002"
        item_number: "2.2"
        description: "Known impurities/related substances tested"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Resolution ≥2.0 between analyte and impurities"
        reference: "ICH Q2(R1)"
      - item_id: "SPEC-003"
        item_number: "2.3"
        description: "Matrix spike recovery demonstrated"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Recovery 95-105% for analyte in matrix"
        reference: "ICH Q2(R1)"
        measurement_unit: "% Recovery"
        target_value: "95-105%"
      - item_id: "SPEC-004"
        item_number: "2.4"
        description: "UV spectra or mass spectra confirms peak identity"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Spectral match or mass spectral library match >90%"
        reference: "SOP-ANLY-001"

  - section_number: 3
    section_title: "Linearity and Range"
    description: "Demonstrate proportional response over analytical range"
    items:
      - item_id: "LIN-001"
        item_number: "3.1"
        description: "Minimum 6 concentration levels prepared"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "At least 6 points spanning 50-150% of target concentration"
        reference: "ICH Q2(R1) Section 3.2"
      - item_id: "LIN-002"
        item_number: "3.2"
        description: "Calibration curve correlation coefficient calculated"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "r or r² >0.995 for quantitative methods"
        reference: "ICH Q2(R1)"
        measurement_unit: "r or r²"
        target_value: ">0.995"
      - item_id: "LIN-003"
        item_number: "3.3"
        description: "Visual inspection of residuals plot"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Residuals randomly distributed around zero, no systematic pattern"
        reference: "ICH Q2(R1)"
      - item_id: "LIN-004"
        item_number: "3.4"
        description: "Range covers expected sample concentrations"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Range extends at least 20% beyond expected sample values"
        reference: "ICH Q2(R1) Section 3.2.2"
      - item_id: "LIN-005"
        item_number: "3.5"
        description: "Statistical analysis of linearity performed"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "ANOVA or lack-of-fit test demonstrates linearity"
        reference: "ICH Q2(R1)"

  - section_number: 4
    section_title: "Accuracy"
    description: "Determine closeness of measured value to true value"
    items:
      - item_id: "ACC-001"
        item_number: "4.1"
        description: "Minimum 3 concentration levels tested"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Low (50%), medium (100%), high (150%) of target concentration"
        reference: "ICH Q2(R1) Section 3.3"
      - item_id: "ACC-002"
        item_number: "4.2"
        description: "Minimum 3 replicates per level analyzed"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "n=3 at each concentration level, total 9 determinations"
        reference: "ICH Q2(R1)"
      - item_id: "ACC-003"
        item_number: "4.3"
        description: "Mean recovery at each level calculated"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Mean recovery 95-105% at each level for quantitative methods"
        reference: "ICH Q2(R1)"
        measurement_unit: "% Recovery"
        target_value: "95-105%"
      - item_id: "ACC-004"
        item_number: "4.4"
        description: "Overall mean recovery across all levels"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Overall mean recovery 95-105%"
        reference: "ICH Q2(R1)"
        measurement_unit: "% Recovery"
        target_value: "95-105%"
      - item_id: "ACC-005"
        item_number: "4.5"
        description: "Certified reference material analyzed (if available)"
        item_type: "measurement"
        criticality: "major"
        acceptance_criteria: "Result within ±10% of certified value"
        reference: "SOP-ANLY-001"
        measurement_unit: "% of certified value"
        target_value: "90-110%"

  - section_number: 5
    section_title: "Precision - Repeatability"
    description: "Assess agreement among repeated measurements (same day, same analyst)"
    items:
      - item_id: "REP-001"
        item_number: "5.1"
        description: "Minimum 6 replicates analyzed on same day"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "n≥6 replicates at 100% target concentration"
        reference: "ICH Q2(R1) Section 3.4.1"
      - item_id: "REP-002"
        item_number: "5.2"
        description: "Same analyst performs all replicates"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Single analyst to eliminate inter-analyst variability"
        reference: "ICH Q2(R1)"
      - item_id: "REP-003"
        item_number: "5.3"
        description: "Relative standard deviation (RSD) calculated"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "RSD <5% for quantitative methods, <10% for limit tests"
        reference: "ICH Q2(R1)"
        measurement_unit: "% RSD"
        target_value: "<5%"
      - item_id: "REP-004"
        item_number: "5.4"
        description: "Mean and standard deviation calculated"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Statistical summary documented"
        reference: "ICH Q2(R1)"

  - section_number: 6
    section_title: "Precision - Intermediate Precision"
    description: "Assess agreement among measurements on different days and/or analysts"
    items:
      - item_id: "INT-001"
        item_number: "6.1"
        description: "Minimum 3 different days of analysis"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Analysis performed on 3 separate days (non-consecutive preferred)"
        reference: "ICH Q2(R1) Section 3.4.2"
      - item_id: "INT-002"
        item_number: "6.2"
        description: "Minimum 2 different analysts"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "At least 2 qualified analysts perform validation runs"
        reference: "ICH Q2(R1)"
      - item_id: "INT-003"
        item_number: "6.3"
        description: "Minimum 3 replicates per day"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "n=3 per day, total 9 determinations minimum"
        reference: "ICH Q2(R1)"
      - item_id: "INT-004"
        item_number: "6.4"
        description: "Overall RSD calculated"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "RSD <10% for quantitative methods, <15% for limit tests"
        reference: "ICH Q2(R1)"
        measurement_unit: "% RSD"
        target_value: "<10%"
      - item_id: "INT-005"
        item_number: "6.5"
        description: "ANOVA performed to assess variability sources"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Between-day and between-analyst variability evaluated"
        reference: "ICH Q2(R1)"

  - section_number: 7
    section_title: "Limit of Detection (LOD) and Quantitation (LOQ)"
    description: "Determine lowest detectable and quantifiable concentrations"
    items:
      - item_id: "LOD-001"
        item_number: "7.1"
        description: "LOD determination method selected"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Signal-to-noise (3:1) or standard deviation method used"
        reference: "ICH Q2(R1) Section 3.5"
      - item_id: "LOD-002"
        item_number: "7.2"
        description: "LOD experimentally confirmed"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Sample at LOD gives S/N ≥3:1"
        reference: "ICH Q2(R1)"
        measurement_unit: "S/N ratio"
        target_value: "≥3:1"
      - item_id: "LOD-003"
        item_number: "7.3"
        description: "LOQ determination method selected"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Signal-to-noise (10:1) or standard deviation method used"
        reference: "ICH Q2(R1) Section 3.6"
      - item_id: "LOD-004"
        item_number: "7.4"
        description: "LOQ experimentally confirmed"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Sample at LOQ gives S/N ≥10:1"
        reference: "ICH Q2(R1)"
        measurement_unit: "S/N ratio"
        target_value: "≥10:1"
      - item_id: "LOD-005"
        item_number: "7.5"
        description: "LOQ precision verified"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "RSD <10% at LOQ (n=6)"
        reference: "ICH Q2(R1)"
        measurement_unit: "% RSD"
        target_value: "<10%"
      - item_id: "LOD-006"
        item_number: "7.6"
        description: "LOQ accuracy verified"
        item_type: "measurement"
        criticality: "major"
        acceptance_criteria: "Recovery 80-120% at LOQ"
        reference: "ICH Q2(R1)"
        measurement_unit: "% Recovery"
        target_value: "80-120%"

  - section_number: 8
    section_title: "Robustness"
    description: "Evaluate method reliability under small parameter variations"
    items:
      - item_id: "ROB-001"
        item_number: "8.1"
        description: "Critical method parameters identified"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "List of parameters to vary (e.g., pH, temperature, flow rate)"
        reference: "ICH Q2(R1) Section 3.7"
      - item_id: "ROB-002"
        item_number: "8.2"
        description: "Variation ranges defined"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Small deliberate variations specified (e.g., ±2°C, ±0.1 pH)"
        reference: "ICH Q2(R1)"
      - item_id: "ROB-003"
        item_number: "8.3"
        description: "Robustness testing executed"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "All planned parameter variations tested"
        reference: "ICH Q2(R1)"
      - item_id: "ROB-004"
        item_number: "8.4"
        description: "Results compared to baseline"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "No significant impact on method performance"
        reference: "ICH Q2(R1)"
      - item_id: "ROB-005"
        item_number: "8.5"
        description: "Critical parameters documented in method SOP"
        item_type: "yes_no"
        criticality: "major"
        acceptance_criteria: "Method SOP specifies acceptable ranges for critical parameters"
        reference: "SOP-ANLY-001"

  - section_number: 9
    section_title: "System Suitability"
    description: "Define system suitability test parameters and acceptance criteria"
    items:
      - item_id: "SST-001"
        item_number: "9.1"
        description: "System suitability parameters defined"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Resolution, tailing, theoretical plates, RSD specified"
        reference: "SOP-ANLY-001 Section 5.2.2"
      - item_id: "SST-002"
        item_number: "9.2"
        description: "Acceptance criteria established"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Criteria based on validation data (e.g., Resolution >2.0, RSD <2%)"
        reference: "SOP-ANLY-001"
      - item_id: "SST-003"
        item_number: "9.3"
        description: "System suitability standard prepared"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Standard composition and concentration specified"
        reference: "Validation Protocol"
      - item_id: "SST-004"
        item_number: "9.4"
        description: "System suitability test frequency defined"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Beginning of each analytical sequence specified in method SOP"
        reference: "SOP-ANLY-001"

  - section_number: 10
    section_title: "Documentation and Reporting"
    description: "Ensure complete documentation of validation"
    items:
      - item_id: "DOC-001"
        item_number: "10.1"
        description: "Raw data retained and archived"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "All chromatograms, spectra, calculations retained per SOP-DOC-001"
        reference: "SOP-DOC-001"
      - item_id: "DOC-002"
        item_number: "10.2"
        description: "Statistical analysis documented"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "All calculations, tables, statistical tests included in report"
        reference: "Validation Protocol"
      - item_id: "DOC-003"
        item_number: "10.3"
        description: "Method validation report prepared"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Report follows standard template, includes all validation parameters"
        reference: "Validation Protocol"
      - item_id: "DOC-004"
        item_number: "10.4"
        description: "Deviations from protocol documented"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Any deviations justified and approved per SOP-DEV-001"
        reference: "SOP-DEV-001"
      - item_id: "DOC-005"
        item_number: "10.5"
        description: "Method SOP updated with validation data"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "SOP includes LOQ, linearity range, precision, accuracy data"
        reference: "SOP-DOC-001"
      - item_id: "DOC-006"
        item_number: "10.6"
        description: "QA review and approval obtained"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "QA Laboratory Specialist reviewed and approved validation report"
        reference: "SOP-ANLY-001"
      - item_id: "DOC-007"
        item_number: "10.7"
        description: "Method approved for routine use"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Laboratory Manager approval documented"
        reference: "SOP-ANLY-001"

completion_criteria:
  minimum_requirements:
    - "100% of critical items must be YES/Pass"
    - "≥95% of major items must be YES/Pass"
    - "≥90% of minor items must be YES/Pass"
  final_approval:
    - role: "Method Development Scientist"
      action: "Completes checklist and initial review"
    - role: "Laboratory Manager"
      action: "Reviews checklist and validation data"
    - role: "QA Laboratory Specialist"
      action: "Final approval and method release authorization"

instructions:
  general:
    - "Complete this checklist for each new analytical method validation"
    - "All critical items must be completed and meet acceptance criteria"
    - "Document any deviations or non-conformances with justification"
    - "Attach supporting documentation (chromatograms, statistical reports)"
    - "Obtain all required approvals before method implementation"
  scoring:
    - "YES/Pass: Item meets all acceptance criteria"
    - "NO/Fail: Item does not meet acceptance criteria, action required"
    - "N/A: Item not applicable to this method (justify)"

related_documents:
  - "SOP-ANLY-001: Analytical Methods"
  - "ICH Q2(R1): Validation of Analytical Procedures"
  - "USP <1058>: Analytical Instrument Qualification"
  - "SOP-EQCAL-001: Equipment Calibration"
  - "SOP-DEV-001: Deviation Management"
  - "SOP-DOC-001: Document Control"
  - "TRN-ANLY-001: Laboratory Analyst Training"

revision_history:
  - version: "1.0"
    date: "2025-01-15"
    description: "Initial release"
    author: "Laboratory Manager"
