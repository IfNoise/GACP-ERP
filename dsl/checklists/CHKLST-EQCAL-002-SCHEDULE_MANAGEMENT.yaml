schema_version: "1.0.0"
type: checklist
metadata:
  id: CHKLST-EQCAL-002
  title: Calibration Schedule Management Checklist
  version: "1.0"
  effective_date: "2025-09-14"
  related_process: SOP-EQCAL-001
  department: Engineering
  classification: Critical
  frequency: Monthly

sections:
  - section_number: 1
    section_title: Monthly Schedule Review
    items:
      - item_number: 1.1
        description: All equipment due for calibration this month identified
        verification_method: Query calibration database for due dates
        acceptance_criteria: Complete list generated, no equipment missed
        responsible_role: Calibration Manager

      - item_number: 1.2
        description: Equipment priorities assigned based on criticality
        verification_method: Review equipment classifications and usage
        acceptance_criteria: Class A equipment prioritized, critical equipment scheduled first
        responsible_role: Calibration Manager

      - item_number: 1.3
        description: Calibration workload balanced across available technicians
        verification_method: Review technician assignments and capacity
        acceptance_criteria: Work distributed evenly, no overloading
        responsible_role: Calibration Manager

      - item_number: 1.4
        description: External calibration services scheduled (if required)
        verification_method: Contact external labs, confirm scheduling
        acceptance_criteria: External calibrations scheduled before due dates
        responsible_role: Calibration Manager

      - item_number: 1.5
        description: Calibration standards recertification scheduled
        verification_method: Check standards due dates
        acceptance_criteria: Standards recertification scheduled 30 days before expiration
        responsible_role: Calibration Manager

  - section_number: 2
    section_title: Resource Planning
    items:
      - item_number: 2.1
        description: All required calibration standards available and current
        verification_method: Verify standards inventory and certification status
        acceptance_criteria: All standards have valid certifications, no expired standards
        responsible_role: Calibration Manager

      - item_number: 2.2
        description: Consumables inventory adequate (buffers, cleaning supplies)
        verification_method: Check consumables inventory levels
        acceptance_criteria: Adequate supply for month's calibrations
        responsible_role: Calibration Manager

      - item_number: 2.3
        description: Calibration equipment functional (baths, dead weight testers)
        verification_method: Verify calibration equipment operational
        acceptance_criteria: All calibration equipment functional and calibrated
        responsible_role: Calibration Technician

      - item_number: 2.4
        description: Technician training current and competencies verified
        verification_method: Review training records
        acceptance_criteria: All technicians current on required training
        responsible_role: Calibration Manager

  - section_number: 3
    section_title: Coordination with Operations
    items:
      - item_number: 3.1
        description: Operations notified of equipment scheduled for calibration
        verification_method: Send notification to equipment owners
        acceptance_criteria: 7-day advance notice provided to operations
        responsible_role: Calibration Manager

      - item_number: 3.2
        description: Equipment downtime coordinated to minimize production impact
        verification_method: Coordinate with production schedules
        acceptance_criteria: Calibrations scheduled during low-production periods
        responsible_role: Calibration Manager

      - item_number: 3.3
        description: Backup equipment availability confirmed (for critical equipment)
        verification_method: Verify backup equipment status
        acceptance_criteria: Backup equipment available and calibrated for Class A equipment
        responsible_role: Engineering Manager

  - section_number: 4
    section_title: Schedule Execution Tracking
    items:
      - item_number: 4.1
        description: Weekly calibration schedule distributed to technicians
        verification_method: Email or post weekly assignments
        acceptance_criteria: Technicians receive schedules by Monday each week
        responsible_role: Calibration Manager

      - item_number: 4.2
        description: Completed calibrations updated in database daily
        verification_method: Review database update status
        acceptance_criteria: All completed calibrations entered same day
        responsible_role: Calibration Technician

      - item_number: 4.3
        description: Overdue calibrations identified and escalated
        verification_method: Query database for overdue items
        acceptance_criteria: Management notified of any overdue calibrations within 24 hours
        responsible_role: Calibration Manager

      - item_number: 4.4
        description: Schedule adherence tracked against target (>98%)
        verification_method: Calculate on-time completion percentage
        acceptance_criteria: >98% of scheduled calibrations completed on time
        responsible_role: Calibration Manager

  - section_number: 5
    section_title: Non-Conformance Management
    items:
      - item_number: 5.1
        description: Out-of-tolerance equipment identified and quarantined
        verification_method: Review calibration results for failures
        acceptance_criteria: All out-of-tolerance equipment removed from service immediately
        responsible_role: Calibration Technician

      - item_number: 5.2
        description: Out-of-tolerance investigations initiated within 4 hours
        verification_method: Verify deviation reports opened
        acceptance_criteria: Formal investigation started within 4 hours of discovery
        responsible_role: Quality Assurance Representative

      - item_number: 5.3
        description: Impact assessments completed for out-of-tolerance equipment
        verification_method: Review affected lot identification
        acceptance_criteria: All potentially affected products identified within 24 hours
        responsible_role: Quality Assurance Representative

  - section_number: 6
    section_title: Performance Metrics and Reporting
    items:
      - item_number: 6.1
        description: Schedule adherence metrics calculated
        verification_method: Calculate on-time percentage
        acceptance_criteria: >98% target met or improvement plan developed
        responsible_role: Calibration Manager

      - item_number: 6.2
        description: First-pass calibration rate tracked
        verification_method: Calculate percentage passing without adjustment
        acceptance_criteria: >95% first-pass rate target
        responsible_role: Calibration Manager

      - item_number: 6.3
        description: Out-of-tolerance rate monitored
        verification_method: Calculate OOT percentage
        acceptance_criteria: <5% out-of-tolerance rate target
        responsible_role: Calibration Manager

      - item_number: 6.4
        description: Monthly performance report prepared
        verification_method: Compile metrics into REPORT-EQCAL-001
        acceptance_criteria: Report completed by 5th business day of following month
        responsible_role: Calibration Manager

completion:
  - field_name: review_month
    field_type: text
    required: true
    description: Month and year of schedule review

  - field_name: reviewed_by
    field_type: text
    required: true
    description: Name of Calibration Manager

  - field_name: review_date
    field_type: date
    required: true
    description: Date of review

  - field_name: reviewer_signature
    field_type: signature
    required: true
    description: Calibration Manager electronic signature

  - field_name: schedule_adherence_percentage
    field_type: number
    required: true
    description: Month's schedule adherence percentage

  - field_name: issues_identified
    field_type: textarea
    required: false
    description: Any scheduling issues or resource constraints identified

instructions:
  - Complete monthly review by last business day of preceding month
  - Identify all equipment due for calibration in coming month
  - Coordinate with operations to minimize production impact
  - Ensure adequate resources (standards, technicians, consumables) available
  - Track schedule execution daily and escalate any issues immediately
  - Target >98% schedule adherence - investigate and address any shortfalls
  - Update calibration database daily as calibrations are completed
  - Prepare monthly performance report within 5 business days of month end

validation_rules:
  - Review must be completed before month starts
  - All equipment due must be identified and scheduled
  - Operations must receive 7-day advance notice minimum
  - Schedule adherence percentage must be calculated monthly
  - All out-of-tolerance equipment must have investigations initiated
