---
schema_version: "1.0.0"
schema_type: "checklist"

metadata:
  id: "CHKLST-ANLY-002"
  title: "System Suitability Test Checklist"
  version: "1.0"
  effective_date: "2025-01-15"
  related_sop: "SOP-ANLY-001"
  checklist_type: "pre_operational"
  purpose: "Verify that analytical system is operating properly before sample analysis"
  frequency: "Beginning of each analytical sequence, before any sample analysis"
  required_by:
    - "Laboratory Analyst"
    - "Senior Analyst"

sections:
  - section_number: 1
    section_title: "Instrument Readiness"
    description: "Verify instrument is ready for analysis"
    items:
      - item_id: "INST-001"
        item_number: "1.1"
        description: "Instrument power on and warmed up"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Instrument powered on for minimum warm-up time per SOP"
        reference: "Instrument SOP"
      - item_id: "INST-002"
        item_number: "1.2"
        description: "Instrument software operational"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Data acquisition software running, no error messages"
        reference: "Instrument SOP"
      - item_id: "INST-003"
        item_number: "1.3"
        description: "Preventive maintenance current"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Last PM within scheduled interval"
        reference: "SOP-EQCAL-001"
      - item_id: "INST-004"
        item_number: "1.4"
        description: "Instrument calibration current"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Calibration within validity period"
        reference: "SOP-EQCAL-001"
      - item_id: "INST-005"
        item_number: "1.5"
        description: "Instrument logbook reviewed"
        item_type: "yes_no"
        criticality: "major"
        acceptance_criteria: "No unresolved issues noted in logbook"
        reference: "SOP-ANLY-001"

  - section_number: 2
    section_title: "Mobile Phase and Reagents (HPLC)"
    description: "Verify mobile phase preparation and quality for HPLC analysis"
    items:
      - item_id: "MP-001"
        item_number: "2.1"
        description: "Mobile phase prepared per method SOP"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Mobile phase composition matches method specification"
        reference: "SOP-ANLY-001 Section 5.2"
      - item_id: "MP-002"
        item_number: "2.2"
        description: "Mobile phase filtered and degassed"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Filtered through 0.45μm filter, degassed by sonication or vacuum"
        reference: "SOP-ANLY-001"
      - item_id: "MP-003"
        item_number: "2.3"
        description: "Mobile phase pH verified (if applicable)"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "pH within ±0.1 units of target value"
        reference: "Method SOP"
        measurement_unit: "pH units"
        target_value: "Per method specification"
      - item_id: "MP-004"
        item_number: "2.4"
        description: "Solvent purity verified"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "HPLC-grade solvents used, lot numbers documented"
        reference: "SOP-ANLY-001"
      - item_id: "MP-005"
        item_number: "2.5"
        description: "Mobile phase expiration checked"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Mobile phase within stability period (typically 7 days)"
        reference: "Method SOP"

  - section_number: 3
    section_title: "Column and Temperature Control (HPLC/GC)"
    description: "Verify column installation and temperature stability"
    items:
      - item_id: "COL-001"
        item_number: "3.1"
        description: "Column properly installed"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Column connections tight, no leaks detected"
        reference: "Instrument SOP"
      - item_id: "COL-002"
        item_number: "3.2"
        description: "Column identification verified"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Column serial number matches method specification or equivalent"
        reference: "Method SOP"
      - item_id: "COL-003"
        item_number: "3.3"
        description: "Column temperature set correctly"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Column temperature at target ±1°C"
        reference: "SOP-ANLY-001 Section 5.2"
        measurement_unit: "°C"
        target_value: "Per method specification"
      - item_id: "COL-004"
        item_number: "3.4"
        description: "Column temperature stable"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Temperature equilibrated for minimum 15 minutes"
        reference: "Instrument SOP"
      - item_id: "COL-005"
        item_number: "3.5"
        description: "Column performance history reviewed"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Column within expected usage life, backpressure normal"
        reference: "Instrument logbook"

  - section_number: 4
    section_title: "System Suitability Standard Preparation"
    description: "Prepare and verify system suitability test standard"
    items:
      - item_id: "SSS-001"
        item_number: "4.1"
        description: "Reference standards verified"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Reference standards with valid CoA, >98% purity, within expiry"
        reference: "SOP-ANLY-001 Section 5.4"
      - item_id: "SSS-002"
        item_number: "4.2"
        description: "System suitability standard prepared"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Standard prepared per method SOP, concentration documented"
        reference: "Method SOP"
      - item_id: "SSS-003"
        item_number: "4.3"
        description: "Standard preparation documented"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Lot numbers, weights, dilutions recorded in LIMS or logbook"
        reference: "SOP-ANLY-001"
      - item_id: "SSS-004"
        item_number: "4.4"
        description: "Standard storage verified"
        item_type: "conformance"
        criticality: "major"
        acceptance_criteria: "Standard stored at appropriate temperature per SOP"
        reference: "Method SOP"

  - section_number: 5
    section_title: "System Suitability Test Execution"
    description: "Perform system suitability test injections"
    items:
      - item_id: "SST-001"
        item_number: "5.1"
        description: "Minimum number of replicate injections"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Minimum 6 replicate injections of system suitability standard"
        reference: "SOP-ANLY-001 Section 5.2.2"
      - item_id: "SST-002"
        item_number: "5.2"
        description: "Injections completed without errors"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "No instrument errors, all injections successful"
        reference: "Instrument SOP"
      - item_id: "SST-003"
        item_number: "5.3"
        description: "Baseline stable"
        item_type: "observation"
        criticality: "critical"
        acceptance_criteria: "Baseline drift <5% of analyte response, noise within limits"
        reference: "SOP-ANLY-001"
      - item_id: "SST-004"
        item_number: "5.4"
        description: "Retention time consistency"
        item_type: "measurement"
        criticality: "major"
        acceptance_criteria: "RSD of retention times <1% (n=6)"
        reference: "Method SOP"
        measurement_unit: "% RSD"
        target_value: "<1%"

  - section_number: 6
    section_title: "System Suitability Acceptance Criteria - HPLC"
    description: "Verify all HPLC system suitability parameters meet acceptance criteria"
    items:
      - item_id: "HPLC-001"
        item_number: "6.1"
        description: "Resolution (Rs) between critical pairs"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Resolution ≥2.0 for all critical peak pairs"
        reference: "SOP-ANLY-001 Section 5.2.2"
        measurement_unit: "Rs"
        target_value: "≥2.0"
      - item_id: "HPLC-002"
        item_number: "6.2"
        description: "Tailing factor (T) for analyte peaks"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Tailing factor 0.8-2.0 for all analyte peaks"
        reference: "SOP-ANLY-001 Section 5.2.2"
        measurement_unit: "T"
        target_value: "0.8-2.0"
      - item_id: "HPLC-003"
        item_number: "6.3"
        description: "Theoretical plates (N) for primary analyte"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Theoretical plates ≥3000 for THC peak (cannabinoid method)"
        reference: "SOP-ANLY-001 Section 5.2.2"
        measurement_unit: "N"
        target_value: "≥3000"
      - item_id: "HPLC-004"
        item_number: "6.4"
        description: "Reproducibility (RSD) of peak area"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "RSD <2% for peak area (n=6 injections)"
        reference: "SOP-ANLY-001 Section 5.2.2"
        measurement_unit: "% RSD"
        target_value: "<2%"
      - item_id: "HPLC-005"
        item_number: "6.5"
        description: "Signal-to-noise ratio"
        item_type: "measurement"
        criticality: "major"
        acceptance_criteria: "S/N ≥10:1 at LOQ concentration"
        reference: "Validation Data"
        measurement_unit: "S/N"
        target_value: "≥10:1"
      - item_id: "HPLC-006"
        item_number: "6.6"
        description: "Baseline noise level"
        item_type: "measurement"
        criticality: "major"
        acceptance_criteria: "Baseline noise <5% of LOQ response"
        reference: "SOP-ANLY-001 Section 5.2.2"
        measurement_unit: "% of LOQ"
        target_value: "<5%"

  - section_number: 7
    section_title: "System Suitability Acceptance Criteria - GC-MS"
    description: "Verify all GC-MS system suitability parameters meet acceptance criteria"
    items:
      - item_id: "GCMS-001"
        item_number: "7.1"
        description: "Retention time reproducibility"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "RSD <1% for retention times (n=3 minimum)"
        reference: "Method SOP"
        measurement_unit: "% RSD"
        target_value: "<1%"
      - item_id: "GCMS-002"
        item_number: "7.2"
        description: "Peak area reproducibility"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "RSD <15% for peak areas (n=3 minimum)"
        reference: "Method SOP"
        measurement_unit: "% RSD"
        target_value: "<15%"
      - item_id: "GCMS-003"
        item_number: "7.3"
        description: "Qualifier ion ratios"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Ion ratios within ±20% of reference standard ratios"
        reference: "Method SOP"
        measurement_unit: "% deviation"
        target_value: "±20%"
      - item_id: "GCMS-004"
        item_number: "7.4"
        description: "Peak shape quality"
        item_type: "observation"
        criticality: "major"
        acceptance_criteria: "Gaussian peak shape, no splitting or shouldering"
        reference: "Method SOP"
      - item_id: "GCMS-005"
        item_number: "7.5"
        description: "Mass spectral match quality"
        item_type: "measurement"
        criticality: "major"
        acceptance_criteria: "Library match score ≥80% for target compounds"
        reference: "Method SOP"
        measurement_unit: "% match"
        target_value: "≥80%"

  - section_number: 8
    section_title: "System Suitability Acceptance Criteria - ICP-MS"
    description: "Verify ICP-MS system suitability parameters"
    items:
      - item_id: "ICP-001"
        item_number: "8.1"
        description: "Instrument tuning completed"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Daily tuning passed for sensitivity and mass calibration"
        reference: "Instrument SOP"
      - item_id: "ICP-002"
        item_number: "8.2"
        description: "Tuning solution performance"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Tuning elements (Li, Y, Tl, Ce) within acceptance ranges"
        reference: "Instrument SOP"
      - item_id: "ICP-003"
        item_number: "8.3"
        description: "Oxide formation rate"
        item_type: "measurement"
        criticality: "major"
        acceptance_criteria: "CeO/Ce ratio <2%"
        reference: "Instrument SOP"
        measurement_unit: "%"
        target_value: "<2%"
      - item_id: "ICP-004"
        item_number: "8.4"
        description: "Doubly charged ion formation"
        item_type: "measurement"
        criticality: "major"
        acceptance_criteria: "Ce++/Ce+ ratio <3%"
        reference: "Instrument SOP"
        measurement_unit: "%"
        target_value: "<3%"
      - item_id: "ICP-005"
        item_number: "8.5"
        description: "Background equivalent concentration (BEC)"
        item_type: "measurement"
        criticality: "major"
        acceptance_criteria: "BEC for target elements <0.1 LOD"
        reference: "Method SOP"
        measurement_unit: "BEC"
        target_value: "<0.1 LOD"

  - section_number: 9
    section_title: "Calibration Curve Verification"
    description: "Verify initial calibration curve is acceptable"
    items:
      - item_id: "CAL-001"
        item_number: "9.1"
        description: "Calibration standards prepared and analyzed"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Minimum 6 calibration levels (or per method) prepared and analyzed"
        reference: "Method SOP"
      - item_id: "CAL-002"
        item_number: "9.2"
        description: "Calibration curve correlation coefficient"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "r or r² ≥0.995 for all analytes"
        reference: "SOP-ANLY-001, Validation Data"
        measurement_unit: "r or r²"
        target_value: "≥0.995"
      - item_id: "CAL-003"
        item_number: "9.3"
        description: "Calibration curve accuracy check"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Back-calculated standards within ±15% (±20% at LOQ)"
        reference: "Method SOP"
        measurement_unit: "% Accuracy"
        target_value: "85-115%"
      - item_id: "CAL-004"
        item_number: "9.4"
        description: "Blank response acceptable"
        item_type: "measurement"
        criticality: "critical"
        acceptance_criteria: "Blank response <LOQ for all analytes"
        reference: "Method SOP"
        measurement_unit: "Response units"
        target_value: "<LOQ"

  - section_number: 10
    section_title: "Documentation and Action"
    description: "Document results and determine next steps"
    items:
      - item_id: "DOC-001"
        item_number: "10.1"
        description: "System suitability results documented"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "All SST results recorded in LIMS or instrument logbook"
        reference: "SOP-ANLY-001"
      - item_id: "DOC-002"
        item_number: "10.2"
        description: "Analyst signature and date"
        item_type: "yes_no"
        criticality: "critical"
        acceptance_criteria: "Analyst electronically signs and dates SST record"
        reference: "SOP-ANLY-001"
      - item_id: "DOC-003"
        item_number: "10.3"
        description: "Decision to proceed documented"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "Pass: Proceed with sample analysis. Fail: Do not proceed, troubleshoot"
        reference: "SOP-ANLY-001"
      - item_id: "DOC-004"
        item_number: "10.4"
        description: "Failures investigated and resolved"
        item_type: "conformance"
        criticality: "critical"
        acceptance_criteria: "If SST fails, root cause identified and corrected before proceeding"
        reference: "SOP-ANLY-001"

completion_criteria:
  minimum_requirements:
    - "100% of critical items must be YES/Pass/Within Limits"
    - "All system suitability parameters must meet acceptance criteria"
    - "Any failures must be investigated and resolved before sample analysis"
  final_approval:
    - role: "Laboratory Analyst"
      action: "Completes SST and documents results"
    - role: "Senior Analyst"
      action: "Reviews SST results if required or if any failures occurred"

instructions:
  general:
    - "Perform this checklist at the beginning of each analytical sequence"
    - "Do not proceed with sample analysis if any critical items fail"
    - "Document any failures and corrective actions in instrument logbook"
    - "Repeat system suitability test after any instrument maintenance or column change"
  failure_response:
    - "If SST fails, do not analyze samples"
    - "Investigate root cause (instrument, column, mobile phase, standards)"
    - "Take corrective action and repeat SST"
    - "Document failure and resolution in deviation system if applicable"

related_documents:
  - "SOP-ANLY-001: Analytical Methods"
  - "SOP-EQCAL-001: Equipment Calibration"
  - "Instrument-specific Operating Procedures"
  - "Method Validation Reports"

revision_history:
  - version: "1.0"
    date: "2025-01-15"
    description: "Initial release"
    author: "Laboratory Manager"
