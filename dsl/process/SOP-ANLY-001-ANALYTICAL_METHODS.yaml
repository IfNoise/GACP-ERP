---
schema_version: "1.0.0"
schema_type: "sop_process"

metadata:
  process_id: "SOP-ANLY-001"
  title: "Analytical Methods"
  version: "1.0"
  effective_date: "2025-01-15"
  review_date: "2026-01-15"
  process_owner: "Laboratory Manager"
  process_type: "sop"
  domain: "quality_control"
  classification: "critical"
  status: "active"
  applicable_regulations:
    - "ICH Q2(R1)"
    - "USP <1058>"
    - "USP <61>"
    - "USP <62>"
    - "ISO/IEC 17025"
    - "WHO GACP"
    - "EMA Guidelines"
  related_processes:
    - "SOP-SMPL-001"
    - "SOP-SMPHAND-001"
    - "SOP-EQCAL-001"
    - "SOP-OOS-001"
    - "SOP-DI-001"

purpose:
  objective: "Establish standardized, validated, and GACP-compliant analytical methods for testing cannabis products, ensuring accurate, reliable, and reproducible analytical results"
  rationale: "Analytical testing is critical to ensure product quality, safety, potency, and regulatory compliance throughout the cannabis production lifecycle"
  scope: "Applies to all analytical testing performed on cannabis raw materials, in-process samples, finished products, and environmental monitoring samples"
  exclusions:
    - "Field testing and rapid screening methods"
    - "Research and development method development"
    - "Non-GMP investigational studies"

objectives:
  primary:
    - "Provide validated analytical methods for cannabinoid quantitation"
    - "Establish standardized procedures for terpene profiling"
    - "Define microbiological testing requirements and limits"
    - "Specify heavy metals analysis protocols"
    - "Implement pesticide residue testing methods"
  secondary:
    - "Ensure compliance with ICH Q2(R1) validation requirements"
    - "Maintain ISO/IEC 17025 laboratory quality standards"
    - "Integrate analytical data with LIMS system"
    - "Support continuous method improvement and technology transfer"

definitions:
  - term: "Analytical Method"
    definition: "A validated procedure for measuring the concentration or presence of an analyte in a sample"
  - term: "Method Validation"
    definition: "Process of demonstrating that an analytical method is suitable for its intended purpose according to ICH Q2(R1) guidelines"
  - term: "System Suitability"
    definition: "Verification that the analytical system is performing adequately before and during sample analysis"
  - term: "Reference Standard"
    definition: "Substance of established purity used to calibrate analytical instruments or validate analytical methods"
  - term: "Certified Reference Material (CRM)"
    definition: "Reference material characterized by a metrologically valid procedure for one or more specified properties, accompanied by a certificate"
  - term: "Limit of Detection (LOD)"
    definition: "Lowest amount of analyte that can be detected but not necessarily quantified"
  - term: "Limit of Quantitation (LOQ)"
    definition: "Lowest concentration of analyte that can be quantitatively determined with acceptable precision and accuracy"
  - term: "Matrix Effect"
    definition: "Impact of sample components on analytical measurement accuracy"
  - term: "Internal Standard"
    definition: "Compound added to samples at known concentration to correct for variations in sample preparation and instrumental response"
  - term: "Quality Control Sample (QC)"
    definition: "Sample with known analyte concentration used to monitor method performance"
  - term: "Certificate of Analysis (CoA)"
    definition: "Document providing test results and certifying that product meets specifications"

roles_and_responsibilities:
  - role: "Laboratory Manager"
    responsibilities:
      - "Overall responsibility for laboratory operations and method validation"
      - "Approve analytical methods and validation protocols"
      - "Ensure laboratory compliance with regulatory requirements"
      - "Authorize release of Certificates of Analysis"
      - "Manage laboratory resources and personnel"
    authority: "final_approval"
  - role: "Method Development Scientist"
    responsibilities:
      - "Develop and optimize new analytical methods"
      - "Execute method validation protocols"
      - "Prepare validation reports and documentation"
      - "Support method transfer and technology transfer activities"
      - "Investigate analytical anomalies and OOS results"
    authority: "technical_expert"
  - role: "Senior Analyst"
    responsibilities:
      - "Perform routine and non-routine analytical testing"
      - "Review and approve analytical data from junior analysts"
      - "Execute system suitability tests daily"
      - "Maintain analytical instruments and troubleshoot issues"
      - "Train junior analysts on analytical methods"
    authority: "first_level_approval"
  - role: "Laboratory Analyst"
    responsibilities:
      - "Perform routine analytical testing according to validated methods"
      - "Prepare samples and standards"
      - "Maintain laboratory cleanliness and organization"
      - "Document all analytical work in laboratory notebooks and LIMS"
      - "Report equipment malfunctions and analytical issues"
    authority: "execution"
  - role: "QA Laboratory Specialist"
    responsibilities:
      - "Review and approve analytical data packages"
      - "Conduct laboratory audits and inspections"
      - "Investigate OOS results and laboratory deviations"
      - "Ensure data integrity and audit trail compliance"
      - "Approve method validations and revalidations"
    authority: "oversight"
  - role: "Instrument Technician"
    responsibilities:
      - "Perform preventive maintenance on analytical instruments"
      - "Execute instrument qualification protocols (IQ/OQ/PQ)"
      - "Troubleshoot instrument technical issues"
      - "Maintain instrument service logs and documentation"
      - "Coordinate with equipment vendors for repairs"
    authority: "technical_support"

process_steps:
  - step_number: 1
    step_name: "Method Selection and Development"
    description: "Select or develop appropriate analytical method for specific analyte and matrix"
    responsible: "Method Development Scientist"
    accountable: "Laboratory Manager"
    inputs:
      - "Analytical requirements specification"
      - "Sample matrix characteristics"
      - "Regulatory requirements"
      - "Literature and compendial methods"
    activities:
      - action: "Review analytical requirements"
        details: "Identify target analytes, concentration ranges, matrix types, and regulatory requirements"
      - action: "Literature search"
        details: "Review published methods, compendial procedures (USP, AOAC), and regulatory guidance"
      - action: "Method feasibility assessment"
        details: "Evaluate available instrumentation, reference standards, and analytical expertise"
      - action: "Initial method development"
        details: "Optimize sample preparation, chromatographic conditions, and detection parameters"
      - action: "Prepare method protocol"
        details: "Document complete method procedure including all critical parameters"
    outputs:
      - "Draft analytical method protocol"
      - "Method feasibility report"
    decision_points:
      - criterion: "Method meets analytical requirements?"
        if_yes: "Proceed to validation"
        if_no: "Continue method optimization or select alternative method"
    duration: "2-4 weeks"
    quality_checks:
      - "Method specificity demonstrated"
      - "Preliminary linearity and sensitivity acceptable"
      - "Sample preparation reproducible"

  - step_number: 2
    step_name: "Method Validation"
    description: "Execute comprehensive validation protocol according to ICH Q2(R1) guidelines"
    responsible: "Method Development Scientist"
    accountable: "Laboratory Manager"
    inputs:
      - "Validated method protocol"
      - "ICH Q2(R1) validation requirements"
      - "Reference standards and materials"
      - "Validation protocol template"
    activities:
      - action: "Prepare validation protocol"
        details: "Define validation parameters: specificity, linearity, range, accuracy, precision, LOD/LOQ, robustness"
      - action: "Execute specificity study"
        details: "Demonstrate method measures analyte without interference from matrix or other compounds"
      - action: "Perform linearity study"
        details: "Analyze minimum 6 concentration levels, correlation coefficient >0.995 required"
      - action: "Conduct accuracy study"
        details: "Matrix spike recovery at 3 concentration levels (low, medium, high), 95-105% recovery required"
      - action: "Execute precision study"
        details: "Repeatability (n=6 same day) and intermediate precision (3 days, 2 analysts), RSD <5% for quantitative methods"
      - action: "Determine LOD and LOQ"
        details: "Calculate based on signal-to-noise ratio (3:1 for LOD, 10:1 for LOQ) or standard deviation method"
      - action: "Assess robustness"
        details: "Evaluate method performance under small variations in critical parameters"
      - action: "Prepare validation report"
        details: "Document all validation data, statistical analysis, and acceptance criteria compliance"
    outputs:
      - "Method validation report"
      - "Validated analytical method SOP"
      - "Method validation certificate"
    decision_points:
      - criterion: "All validation parameters meet acceptance criteria?"
        if_yes: "Method approved for routine use"
        if_no: "Method revision and revalidation required"
    duration: "4-8 weeks"
    quality_checks:
      - "All ICH Q2(R1) parameters evaluated"
      - "Statistical analysis performed correctly"
      - "Acceptance criteria met"
      - "QA review and approval obtained"

  - step_number: 3
    step_name: "Cannabinoid Analysis by HPLC-UV/DAD"
    description: "Quantitative determination of major cannabinoids in cannabis products"
    responsible: "Laboratory Analyst"
    accountable: "Senior Analyst"
    inputs:
      - "Cannabis sample (flower, extract, or product)"
      - "Cannabinoid reference standards (THC, THCA, CBD, CBDA, CBG, CBN, CBC)"
      - "HPLC grade solvents and reagents"
      - "Validated method SOP-ANLY-001-HPLC"
    activities:
      - action: "System suitability test"
        details: "Analyze system suitability standard, verify resolution >2.0, tailing factor 0.8-2.0, theoretical plates >3000, RSD <2% (n=6)"
      - action: "Prepare calibration standards"
        details: "Prepare 6-point calibration curve (0.5-100 μg/mL) from stock solutions, include QC levels"
      - action: "Sample preparation - dried flower"
        details: "Grind sample through 20-mesh sieve, weigh 100mg ±1mg, add 10mL methanol, heat at 145°C for 30 min (decarboxylation), cool, sonicate 30 min, filter through 0.45μm PTFE"
      - action: "Sample preparation - extracts"
        details: "Weigh 10-50mg extract, dissolve in 10mL methanol, sonicate 15 min, filter through 0.22μm, dilute to appropriate concentration"
      - action: "HPLC analysis"
        details: "Inject 10μL sample, run 27-minute gradient method, detect at 220nm and 280nm, identify peaks by retention time and UV spectrum"
      - action: "Data analysis"
        details: "Integrate peaks, calculate concentrations from calibration curve, apply dilution factors, calculate cannabinoid content (mg/g or %)"
      - action: "QC evaluation"
        details: "Verify method blank <LOQ, continuing calibration verification within ±15%, duplicate RPD <20%, matrix spike recovery 80-120%"
    outputs:
      - "Cannabinoid concentration results (mg/g or %)"
      - "HPLC chromatograms"
      - "QC summary report"
    decision_points:
      - criterion: "QC samples within acceptance criteria?"
        if_yes: "Report results"
        if_no: "Investigate and re-analyze"
    duration: "4-6 hours per batch (20 samples)"
    quality_checks:
      - "System suitability passed before sample analysis"
      - "All QC samples within limits"
      - "Peer review of data integration"

  - step_number: 4
    step_name: "Terpene Profiling by GC-MS"
    description: "Identification and quantitation of terpenes in cannabis products"
    responsible: "Laboratory Analyst"
    accountable: "Senior Analyst"
    inputs:
      - "Fresh cannabis flower or extract sample"
      - "Terpene reference standards (α-pinene, β-pinene, myrcene, limonene, linalool, caryophyllene, humulene)"
      - "Internal standard solution"
      - "Validated method SOP-ANLY-001-GCMS"
    activities:
      - action: "System suitability and calibration"
        details: "Verify GC-MS performance, prepare 5-point calibration curve for each terpene"
      - action: "Sample preparation - fresh flower"
        details: "Weigh 1.0g ±0.1g fresh material into 20mL headspace vial, add internal standard, crimp seal, equilibrate at 80°C for 30 min"
      - action: "Sample preparation - extracts"
        details: "Dilute extract in pentane (1:100 to 1:1000), add internal standard, analyze immediately"
      - action: "GC-MS analysis"
        details: "Inject 1mL headspace or 1μL liquid sample, run 24-minute temperature program, acquire data in SIM mode for quantitation"
      - action: "Data analysis"
        details: "Identify terpenes by retention time and qualifier ions, quantify using internal standard method"
      - action: "Calculate terpene profile"
        details: "Report individual terpene concentrations (mg/g or %), total terpene content, terpene ratios"
    outputs:
      - "Terpene profile report"
      - "GC-MS chromatograms and mass spectra"
      - "Total terpene content"
    decision_points:
      - criterion: "Terpene identification confirmed by mass spectra?"
        if_yes: "Report quantitative results"
        if_no: "Flag as tentative identification"
    duration: "30 minutes per sample"
    quality_checks:
      - "Qualifier ions present and ratios correct"
      - "Internal standard recovery 70-130%"
      - "QC sample within ±20% of target"

  - step_number: 5
    step_name: "Microbiological Testing"
    description: "Perform mandatory microbiological tests according to USP <61> and <62>"
    responsible: "Microbiology Analyst"
    accountable: "Laboratory Manager"
    inputs:
      - "1g cannabis sample"
      - "Sterile diluent and culture media"
      - "USP <61> and <62> methods"
      - "Positive and negative control organisms"
    activities:
      - action: "Aseptic sample preparation"
        details: "Homogenize 1g sample in 9mL sterile diluent, prepare serial dilutions as needed"
      - action: "Total aerobic count"
        details: "Plate on tryptic soy agar, incubate at 30-35°C for 48-72 hours, count colonies, acceptance limit <10^5 CFU/g"
      - action: "Total yeast and mold"
        details: "Plate on Sabouraud dextrose agar, incubate at 20-25°C for 5-7 days, count colonies, acceptance limit <10^4 CFU/g"
      - action: "E. coli test"
        details: "Use selective media and confirmed biochemical tests, acceptance limit <10 CFU/g"
      - action: "Salmonella test"
        details: "Enrichment in selective broth, selective plating, biochemical confirmation, must be absent in 1g"
      - action: "STEC E. coli test"
        details: "Follow AOAC 2011.09 method for Shiga-toxin producing E. coli, must be absent in 1g"
      - action: "Document results"
        details: "Record colony counts, positive/negative results, control organism performance"
    outputs:
      - "Microbiological test results"
      - "Pass/Fail determination"
      - "Incubation records and photographs"
    decision_points:
      - criterion: "All microbial limits met?"
        if_yes: "Sample passes microbiological testing"
        if_no: "Sample fails, initiate OOS investigation"
    duration: "3-7 days (incubation time dependent)"
    quality_checks:
      - "Positive controls show growth"
      - "Negative controls show no growth"
      - "Aseptic technique maintained"

  - step_number: 6
    step_name: "Heavy Metals Analysis by ICP-MS"
    description: "Quantitative determination of lead, cadmium, mercury, and arsenic"
    responsible: "Laboratory Analyst"
    accountable: "Senior Analyst"
    inputs:
      - "0.5g dried cannabis sample"
      - "Heavy metal reference standards (Pb, Cd, Hg, As)"
      - "Concentrated HNO3 and 30% H2O2"
      - "Validated method SOP-ANLY-001-ICPMS"
    activities:
      - action: "Microwave digestion"
        details: "Weigh 0.5g sample into PTFE vessel, add 8mL HNO3 and 2mL H2O2, pre-digest 15 min, microwave: ramp to 180°C over 15 min, hold 15 min, cool, dilute to 50mL"
      - action: "ICP-MS calibration"
        details: "Prepare 5-point calibration curve for each element, include internal standards (Sc, Y, In, Bi)"
      - action: "Sample analysis"
        details: "Analyze digested samples by ICP-MS, measure Pb, Cd, Hg, As, use collision/reaction cell to reduce polyatomic interferences"
      - action: "Calculate concentrations"
        details: "Calculate element concentrations (μg/g) using calibration curve, apply dilution factors"
      - action: "Compare to action limits"
        details: "Pb <0.5 μg/g, Cd <0.2 μg/g, Hg <0.1 μg/g, As <0.2 μg/g"
    outputs:
      - "Heavy metals concentration report (μg/g)"
      - "Pass/Fail determination"
      - "Digestion and analysis records"
    decision_points:
      - criterion: "All metals below action limits?"
        if_yes: "Sample passes heavy metals testing"
        if_no: "Sample fails, initiate OOS investigation"
    duration: "6-8 hours per batch"
    quality_checks:
      - "Digestion blanks <LOQ"
      - "Matrix spike recovery 80-120%"
      - "Certified reference material within ±10%"

  - step_number: 7
    step_name: "Quality Control and Data Review"
    description: "Evaluate QC sample results and review analytical data for accuracy and compliance"
    responsible: "Senior Analyst"
    accountable: "QA Laboratory Specialist"
    inputs:
      - "Analytical results from LIMS"
      - "QC sample results"
      - "Method acceptance criteria"
      - "Historical QC control charts"
    activities:
      - action: "First level review (Analyst)"
        details: "Review data quality, verify calculations, evaluate QC results, check integration parameters, initial electronic signature"
      - action: "Second level review (Supervisor)"
        details: "Verify method compliance, review QC trends, assess data integrity and audit trail, final approval electronic signature"
      - action: "QC evaluation"
        details: "Plot QC results on control charts, identify trends or outliers, evaluate batch acceptance"
      - action: "Out of control investigation"
        details: "If QC fails, stop analysis, investigate root cause (instrument, reagent, analyst error), document findings, implement corrective action"
      - action: "Certificate of Analysis preparation"
        details: "Compile sample information, test methods, results with uncertainty, QC summary, approval signatures, release to customer"
    outputs:
      - "Approved analytical data package"
      - "Certificate of Analysis"
      - "QC control charts"
    decision_points:
      - criterion: "All QC samples passed?"
        if_yes: "Approve results and issue CoA"
        if_no: "Investigate, re-analyze if necessary"
    duration: "2-4 hours per batch"
    quality_checks:
      - "Two-level review completed"
      - "Electronic signatures applied"
      - "Audit trail intact"

  - step_number: 8
    step_name: "Out of Specification (OOS) Investigation"
    description: "Investigate and document analytical results outside specifications"
    responsible: "Method Development Scientist"
    accountable: "Laboratory Manager"
    inputs:
      - "OOS analytical result"
      - "Sample history and custody records"
      - "Method validation data"
      - "SOP-OOS-001 procedure"
    activities:
      - action: "Immediate notification"
        details: "Notify QA, Laboratory Manager, and customer (if required) of OOS result"
      - action: "Phase 1 investigation (Laboratory)"
        details: "Review calculations, examine chromatograms/spectra, assess system suitability, check calibration, review sample preparation, evaluate analyst technique"
      - action: "Determine laboratory error"
        details: "If calculation error or instrument malfunction found, invalidate result, re-analyze, document correction"
      - action: "Phase 2 investigation (Technical)"
        details: "If no laboratory error, conduct technical investigation: re-analyze retained sample, review sample stability, assess method suitability, evaluate matrix interference"
      - action: "Root cause determination"
        details: "Identify root cause: true OOS result, method limitation, sample issue, or confirmed laboratory error"
      - action: "Final report"
        details: "Document complete investigation, root cause analysis, corrective actions, final determination, QA approval"
      - action: "Customer notification"
        details: "Provide investigation summary and final result to customer"
    outputs:
      - "OOS investigation report"
      - "Corrective and preventive actions (CAPA)"
      - "Final analytical result determination"
    decision_points:
      - criterion: "Laboratory error identified?"
        if_yes: "Invalidate result, re-analyze"
        if_no: "Proceed to Phase 2 technical investigation"
      - criterion: "True OOS confirmed?"
        if_yes: "Report confirmed OOS to customer, quarantine material"
        if_no: "Report revised result with explanation"
    duration: "3-10 business days"
    quality_checks:
      - "Thorough investigation documented"
      - "Root cause identified"
      - "CAPA implemented if needed"

parameters:
  analytical_method_categories:
    - category: "Cannabinoid Analysis"
      technique: "HPLC-UV/DAD"
      turnaround_time: "Same day"
    - category: "Terpene Profiling"
      technique: "GC-MS"
      turnaround_time: "Same day"
    - category: "Microbiological Testing"
      technique: "USP <61>, <62>"
      turnaround_time: "3-7 days"
    - category: "Heavy Metals"
      technique: "ICP-MS"
      turnaround_time: "2-3 days"
    - category: "Pesticide Residues"
      technique: "LC-MS/MS"
      turnaround_time: "2-3 days"
    - category: "Residual Solvents"
      technique: "GC-FID"
      turnaround_time: "Same day"
    - category: "Moisture Content"
      technique: "Karl Fischer or Loss on Drying"
      turnaround_time: "Same day"
    - category: "Water Activity"
      technique: "Water Activity Meter"
      turnaround_time: "Same day"

  validation_parameters:
    - parameter: "Specificity"
      description: "Ability to measure analyte in presence of interferences"
      applicable_to: "All methods"
      acceptance_criteria: "No interference at analyte retention time"
    - parameter: "Linearity"
      description: "Direct proportional relationship between concentration and response"
      applicable_to: "Quantitative methods"
      acceptance_criteria: "Correlation coefficient r >0.995"
    - parameter: "Range"
      description: "Concentration interval demonstrating linearity, accuracy, and precision"
      applicable_to: "Quantitative methods"
      acceptance_criteria: "Covers expected sample concentrations ±20%"
    - parameter: "Accuracy"
      description: "Closeness of measured value to true value"
      applicable_to: "Quantitative and limit tests"
      acceptance_criteria: "95-105% recovery for quantitative, 80-120% for limit tests"
    - parameter: "Precision (Repeatability)"
      description: "Agreement among repeated measurements by same analyst, same day"
      applicable_to: "All methods"
      acceptance_criteria: "RSD <5% for quantitative, <10% for limit tests"
    - parameter: "Precision (Intermediate)"
      description: "Agreement among measurements on different days, different analysts"
      applicable_to: "All methods"
      acceptance_criteria: "RSD <10% for quantitative, <15% for limit tests"
    - parameter: "LOD"
      description: "Lowest concentration that can be detected"
      applicable_to: "Limit tests and trace analysis"
      acceptance_criteria: "Signal-to-noise ratio 3:1"
    - parameter: "LOQ"
      description: "Lowest concentration that can be quantified"
      applicable_to: "Quantitative methods"
      acceptance_criteria: "Signal-to-noise ratio 10:1, RSD <10%"
    - parameter: "Robustness"
      description: "Method reliability under small deliberate variations"
      applicable_to: "All methods"
      acceptance_criteria: "Results not significantly affected by parameter variations"

  quality_control_frequencies:
    - qc_type: "Method Blank"
      frequency: "Every 10 samples"
      acceptance: "<LOQ for all analytes"
    - qc_type: "Duplicate Sample"
      frequency: "Every 10 samples"
      acceptance: "RPD <20%"
    - qc_type: "Matrix Spike"
      frequency: "Every 20 samples"
      acceptance: "80-120% recovery"
    - qc_type: "Laboratory Control Sample"
      frequency: "Daily"
      acceptance: "Within ±10% of certified value"
    - qc_type: "Continuing Calibration Verification"
      frequency: "Every 10 samples"
      acceptance: "Within ±15% of initial calibration"
    - qc_type: "System Suitability Test"
      frequency: "Beginning of each sequence"
      acceptance: "All parameters within limits before proceeding"

  instrument_qualification_schedule:
    - instrument: "HPLC-UV/DAD"
      iq_oq: "At installation"
      pq: "Annually"
      pm: "Quarterly"
    - instrument: "GC-MS"
      iq_oq: "At installation"
      pq: "Annually"
      pm: "Quarterly"
    - instrument: "ICP-MS"
      iq_oq: "At installation"
      pq: "Annually"
      pm: "Semi-annually"
    - instrument: "Analytical Balances"
      iq_oq: "At installation"
      pq: "Annually"
      calibration: "Daily before use"
    - instrument: "pH Meters"
      iq_oq: "At installation"
      pq: "Annually"
      calibration: "Daily before use"

quality_controls:
  in_process_controls:
    - control: "System Suitability Test"
      frequency: "Beginning of each analytical sequence"
      acceptance_criteria: "All parameters within validated limits"
      action_if_failed: "Do not proceed with sample analysis until corrected"
    - control: "Calibration Verification"
      frequency: "Every 10 samples"
      acceptance_criteria: "Within ±15% of expected value"
      action_if_failed: "Recalibrate and re-analyze affected samples"
    - control: "QC Sample Analysis"
      frequency: "Per QC frequency table"
      acceptance_criteria: "Within established control limits"
      action_if_failed: "Investigate and re-analyze batch if necessary"

  post_process_controls:
    - control: "Data Review"
      description: "Two-level review of all analytical data"
      responsible: "Senior Analyst and QA Laboratory Specialist"
    - control: "Audit Trail Review"
      description: "Verify completeness and integrity of electronic records"
      responsible: "QA Laboratory Specialist"
    - control: "Control Chart Trending"
      description: "Monthly review of QC control charts for trends"
      responsible: "Laboratory Manager"

performance_metrics:
  - metric: "Sample Turnaround Time"
    measurement: "Time from sample receipt to CoA issuance"
    target: "Per method-specific commitments"
    monitoring_frequency: "Weekly"
  - metric: "First Time Analysis Success Rate"
    measurement: "Percentage of samples analyzed successfully without re-analysis"
    target: "≥95%"
    monitoring_frequency: "Monthly"
  - metric: "QC Sample Pass Rate"
    measurement: "Percentage of QC samples within acceptance criteria"
    target: "≥98%"
    monitoring_frequency: "Monthly"
  - metric: "OOS Investigation Closure Time"
    measurement: "Days from OOS detection to investigation closure"
    target: "≤10 business days"
    monitoring_frequency: "Monthly"
  - metric: "Instrument Uptime"
    measurement: "Percentage of scheduled time instruments are operational"
    target: "≥95%"
    monitoring_frequency: "Monthly"
  - metric: "Method Validation Timeline"
    measurement: "Days from protocol approval to validation report completion"
    target: "≤60 days"
    monitoring_frequency: "Per project"
  - metric: "Proficiency Testing Performance"
    measurement: "Percentage of proficiency samples within acceptable range"
    target: "≥95%"
    monitoring_frequency: "Per PT program (typically quarterly)"

documentation_requirements:
  required_records:
    - "Method validation protocols and reports"
    - "Analytical method SOPs"
    - "Calibration records and certificates"
    - "Raw analytical data (chromatograms, spectra)"
    - "Sample preparation records"
    - "QC sample results and control charts"
    - "System suitability test results"
    - "Instrument qualification and maintenance records"
    - "Analyst training and competency records"
    - "Certificates of Analysis"
    - "OOS investigation reports"
    - "Audit trail and electronic signatures"
  retention_period: "Product lifetime + 10 years or per regulatory requirement"
  storage_location: "Laboratory LIMS and electronic document management system"
  backup_frequency: "Daily automatic backup, monthly verification"

change_control:
  triggers:
    - "Method modification or optimization"
    - "New instrument or equipment"
    - "Change in reference standards or reagents"
    - "Regulatory requirement updates"
    - "OOS investigation findings requiring method changes"
  process:
