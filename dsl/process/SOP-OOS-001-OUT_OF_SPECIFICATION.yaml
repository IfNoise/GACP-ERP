change_control:
  - Procedure revisions require QA review and approval
  - Investigation process changes require validation of impact on data integrity
  - LIMS or system changes require change control and validation
  - Disposition criteria changes require regulatory assessment and senior management approval
  - Training materials updated whenever procedures changed

training_requirements:
  initial_training:
    - OOS investigation regulatory requirements (FDA, EU GMP, ICH) - 8 hours
    - OOS investigation process (Phase I and Phase II) - 16 hours
    - Root cause analysis methodology and tools - 12 hours
    - Data integrity and ALCOA+ principles - 4 hours
    - Documentation requirements and electronic records - 4 hours
    - CAPA development and effectiveness verification - 8 hours
    - Batch disposition decision making - 4 hours
    - Trending and statistical analysis - 8 hours
    - Total: 64 hours with practical exercises and case studies
  
  annual_refresher:
    - Regulatory updates and guidance - 2 hours
    - Procedure changes and enhancements - 2 hours
    - Case study reviews and lessons learned - 4 hours
    - Advanced topics and tools - 4 hours
    - Total: 12 hours annually
  
  competency_assessment:
    - Written examination on OOS investigation process (80% pass required)
    - Case study evaluation demonstrating investigation skills (85% pass required)
    - Practical demonstration of root cause analysis techniques
    - Documentation review for completeness and accuracy

  role_specific_training:
    - Laboratory Analysts: Initial OOS identification and notification, proper documentation practices
    - Laboratory Supervisors: Laboratory investigation leadership, report writing, re-testing strategy
    - QC Managers: Overall program management, trending and analysis, regulatory reporting
    - QA Personnel: Investigation adequacy review, CAPA oversight, disposition approval
    - Production Personnel: Phase II investigation participation, manufacturing data provision

