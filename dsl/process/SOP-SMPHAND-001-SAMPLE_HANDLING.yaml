---
schema_version: "1.0.0"
schema_type: "sop_process"

metadata:
  process_id: "SOP-SMPHAND-001"
  title: "Sample Handling and Chain of Custody"
  version: "1.0"
  effective_date: "2025-01-15"
  review_date: "2026-01-15"
  process_owner: "Laboratory Manager"
  process_type: "sop"
  domain: "quality_control"
  classification: "critical"
  status: "active"
  applicable_regulations:
    - "WHO GACP"
    - "ISO/IEC 17025"
    - "DEA Regulations (Controlled Substances)"
    - "DOT Hazardous Materials Regulations"
    - "FDA 21 CFR Part 11"
  related_processes:
    - "SOP-SMPL-001"
    - "SOP-ANLY-001"
    - "SOP-COC-001"
    - "SOP-DI-001"
    - "SOP-DOC-001"

purpose:
  objective: "Establish comprehensive protocols for proper handling, labeling, tracking, storage, and chain of custody management of all laboratory samples throughout the entire sample lifecycle, from collection through final disposal"
  rationale: "Proper sample handling is critical to ensure sample integrity, traceability, regulatory compliance, and accurate analytical results"
  scope: "Applies to all sample types including cannabis products, raw materials, environmental samples, reference standards, and quality control samples"
  exclusions:
    - "Sample collection procedures (covered in SOP-SMPL-001)"
    - "Analytical testing procedures (covered in SOP-ANLY-001)"
    - "Final product release procedures"

objectives:
  primary:
    - "Maintain sample integrity throughout the sample lifecycle"
    - "Ensure complete chain of custody documentation and traceability"
    - "Implement proper storage and preservation to prevent sample degradation"
    - "Prevent sample mix-ups, contamination, and loss"
    - "Ensure regulatory compliance for sample handling operations"
  secondary:
    - "Optimize sample handling efficiency and turnaround time"
    - "Minimize sample handling errors and deviations"
    - "Implement automated tracking and documentation systems"
    - "Support audit and inspection readiness"

definitions:
  - term: "Chain of Custody (CoC)"
    definition: "Chronological documentation tracking sample possession, transfer, and handling from collection to disposal"
  - term: "Sample Integrity"
    definition: "Preservation of sample identity, composition, and properties throughout the sample lifecycle"
  - term: "Accessioning"
    definition: "Process of receiving, inspecting, labeling, and registering samples into the laboratory system"
  - term: "Aliquot"
    definition: "A portion of a sample taken for specific analysis or testing"
  - term: "Parent Sample"
    definition: "Original sample from which aliquots are prepared"
  - term: "Retention Sample"
    definition: "Portion of sample retained for potential retesting or investigation"
  - term: "LIMS"
    definition: "Laboratory Information Management System for sample tracking and data management"
  - term: "Cold Chain"
    definition: "Continuous temperature-controlled environment for temperature-sensitive samples"
  - term: "Tamper-Evident"
    definition: "Packaging or seal designed to show visible evidence of unauthorized access"
  - term: "Hold Time"
    definition: "Maximum time allowed between sample collection and analysis"

roles_and_responsibilities:
  - role: "Laboratory Manager"
    responsibilities:
      - "Overall sample handling program oversight and strategic planning"
      - "Sample handling procedure development and approval"
      - "Staff training coordination and competency verification"
      - "Quality assurance and compliance monitoring"
      - "Vendor management for sample handling supplies"
    authority: "final_approval"
  - role: "Sample Coordinator"
    responsibilities:
      - "Daily sample receipt and accessioning coordination"
      - "Sample tracking system management and maintenance"
      - "Chain of custody documentation oversight"
      - "Sample storage and preservation monitoring"
      - "Sample disposition and disposal coordination"
    authority: "operational_management"
  - role: "Laboratory Technician"
    responsibilities:
      - "Sample receipt and initial inspection"
      - "Sample labeling and identification verification"
      - "Sample storage per specifications"
      - "Sample preparation and aliquoting"
      - "Chain of custody documentation completion"
    authority: "execution"
  - role: "QA Laboratory Specialist"
    responsibilities:
      - "Sample handling procedure compliance monitoring"
      - "Chain of custody audit and verification"
      - "Sample integrity investigation and problem resolution"
      - "Documentation review and approval"
      - "Training effectiveness assessment"
    authority: "oversight"
  - role: "LIMS Administrator"
    responsibilities:
      - "LIMS configuration and maintenance for sample tracking"
      - "Electronic record management and backup"
      - "Data integrity and audit trail maintenance"
      - "System integration with regulatory tracking systems"
      - "User access management and security"
    authority: "technical_support"

process_steps:
  - step_number: 1
    step_name: "Sample Receipt and Initial Inspection"
    description: "Receive samples, verify documentation, inspect condition, and document arrival"
    responsible: "Laboratory Technician"
    accountable: "Sample Coordinator"
    inputs:
      - "Sample containers with samples"
      - "Chain of custody documentation"
      - "Sample submission form (FORM-ANLY-001)"
      - "Shipping documentation"
    activities:
      - action: "Inspect shipping container"
        details: "Evaluate package integrity, check for damage, leaks, or tampering evidence"
      - action: "Verify temperature control"
        details: "For cold chain samples, verify temperature logging device or visual indicators, record temperature"
      - action: "Document receipt time"
        details: "Record accurate timestamp of sample arrival in LIMS"
      - action: "Review documentation"
        details: "Verify chain of custody completeness, sample submission form, and required information"
      - action: "Count and verify samples"
        details: "Confirm number of samples matches documentation, verify sample IDs on containers"
      - action: "Inspect sample containers"
        details: "Check for intact seals, proper labeling, no contamination, adequate volume"
      - action: "Photograph samples"
        details: "Take photographs documenting sample condition on arrival"
      - action: "Assess sample condition"
        details: "Visual inspection for contamination, degradation, or quality issues"
    outputs:
      - "Sample receipt log entry"
      - "Sample condition report"
      - "Photographic documentation"
      - "Temperature records for cold chain samples"
    decision_points:
      - criterion: "Samples meet acceptance criteria?"
        if_yes: "Proceed to accessioning"
        if_no: "Reject sample, notify submitter, document rejection reasons"
    duration: "15-30 minutes per batch"
    quality_checks:
      - "Documentation complete and accurate"
      - "Sample condition acceptable"
      - "Temperature requirements met"

  - step_number: 2
    step_name: "Sample Accessioning and Labeling"
    description: "Register samples in LIMS, assign unique laboratory IDs, generate and affix labels"
    responsible: "Laboratory Technician"
    accountable: "Sample Coordinator"
    inputs:
      - "Accepted samples from receipt"
      - "Chain of custody documentation"
      - "Sample submission form"
    activities:
      - action: "Enter sample information into LIMS"
        details: "Register sample with client ID, matrix type, requested tests, priority"
      - action: "Generate laboratory sample ID"
        details: "LIMS assigns unique sequential laboratory ID (e.g., LAB-2025-001234)"
      - action: "Generate barcode labels"
        details: "Print barcode labels with sample ID, receipt date, sample type, storage requirements"
      - action: "Affix primary label to sample"
        details: "Apply barcode label to sample container, ensuring visibility and durability"
      - action: "Affix secondary backup label"
        details: "Apply duplicate label for redundancy in case of primary label damage"
      - action: "Verify label accuracy"
        details: "Two-person verification: scan barcode, verify LIMS record matches physical sample"
      - action: "Apply tamper-evident seal"
        details: "For high-value or controlled samples, apply tamper-evident security seal"
      - action: "Update chain of custody"
        details: "Transfer custody to laboratory, record receiving technician name, date, time"
    outputs:
      - "Labeled samples with unique laboratory IDs"
      - "LIMS sample records created"
      - "Updated chain of custody documentation"
      - "Sample tracking barcode"
    decision_points:
      - criterion: "Label readable and barcode scannable?"
        if_yes: "Proceed to storage assignment"
        if_no: "Regenerate and reapply label"
    duration: "10-15 minutes per sample"
    quality_checks:
      - "Unique laboratory ID assigned"
      - "Barcode scans correctly"
      - "Two-person verification completed"
      - "Chain of custody updated and signed"

  - step_number: 3
    step_name: "Storage Assignment and Sample Placement"
    description: "Determine appropriate storage conditions and location, place sample in designated storage"
    responsible: "Laboratory Technician"
    accountable: "Sample Coordinator"
    inputs:
      - "Accessioned and labeled samples"
      - "Sample type and matrix information"
      - "Storage requirement specifications"
      - "Storage location inventory"
    activities:
      - action: "Determine storage conditions"
        details: "Based on sample type: Room temp (15-25°C), Refrigerated (2-8°C), Frozen (-20°C), or Ultra-low (-80°C)"
      - action: "Assign storage location"
        details: "LIMS assigns specific storage unit, shelf, and position"
      - action: "Verify storage unit conditions"
        details: "Check temperature monitoring device, verify conditions within range"
      - action: "Place sample in storage"
        details: "Place sample in assigned location, ensuring proper orientation and accessibility"
      - action: "Scan sample location"
        details: "Scan sample barcode and location barcode to link sample to physical location"
      - action: "Update LIMS location"
        details: "LIMS automatically records sample storage location and timestamp"
      - action: "Verify environmental conditions"
        details: "Document actual storage temperature, humidity if applicable"
      - action: "Set up hold time alert"
        details: "LIMS sets alert for maximum hold time before analysis required"
    outputs:
      - "Sample stored in appropriate conditions"
      - "LIMS location record updated"
      - "Storage condition documentation"
      - "Hold time alert activated"
    decision_points:
      - criterion: "Storage unit operating within specifications?"
        if_yes: "Complete storage placement"
        if_no: "Transfer to backup storage unit, initiate maintenance request"
    duration: "5-10 minutes per sample"
    quality_checks:
      - "Correct storage conditions assigned"
      - "Sample location recorded in LIMS"
      - "Temperature within acceptable range"
      - "Hold time alert set"

  - step_number: 4
    step_name: "Sample Preparation and Aliquoting"
    description: "Prepare samples for analysis, create aliquots for different tests, maintain sample integrity"
    responsible: "Laboratory Technician"
    accountable: "Senior Analyst"
    inputs:
      - "Stored samples ready for analysis"
      - "Test request from LIMS"
      - "Analytical method requirements"
      - "Aliquot containers and labels"
    activities:
      - action: "Retrieve sample from storage"
        details: "Use LIMS work order to locate sample, scan barcode upon retrieval"
      - action: "Equilibrate sample temperature"
        details: "Allow frozen or refrigerated samples to reach appropriate working temperature"
      - action: "Verify sample identity"
        details: "Confirm sample ID matches work order, check sample condition"
      - action: "Homogenize sample if needed"
        details: "For heterogeneous samples, mix thoroughly to ensure representative aliquots"
      - action: "Prepare aliquots"
        details: "Transfer appropriate amounts to labeled aliquot containers for each test"
      - action: "Label aliquots"
        details: "Apply labels with parent sample ID, aliquot number, test designation, date prepared"
      - action: "Record aliquot information"
        details: "Enter aliquot details into LIMS, link to parent sample"
      - action: "Return parent sample to storage"
        details: "Return remaining sample to appropriate storage, update LIMS"
      - action: "Transfer aliquots to analysts"
        details: "Deliver aliquots to assigned analysts or testing areas, document transfer"
    outputs:
      - "Aliquots prepared for each requested test"
      - "Parent sample returned to storage"
      - "Aliquot tracking records in LIMS"
      - "Chain of custody updated for aliquot transfers"
    decision_points:
      - criterion: "Sufficient sample volume for all tests?"
        if_yes: "Complete aliquoting"
        if_no: "Contact sample submitter, prioritize tests, document insufficient volume"
    duration: "15-30 minutes per sample"
    quality_checks:
      - "Sample homogeneity verified"
      - "Aliquot volumes sufficient for testing"
      - "All aliquots properly labeled"
      - "Parent sample integrity maintained"

  - step_number: 5
    step_name: "Sample Tracking During Analysis"
    description: "Track sample location and status throughout analytical testing process"
    responsible: "Laboratory Analyst"
    accountable: "Senior Analyst"
    inputs:
      - "Aliquots transferred to analysts"
      - "Analytical method procedures"
      - "LIMS work orders"
    activities:
      - action: "Scan sample at analysis start"
        details: "Scan barcode to indicate analysis in progress, update LIMS status"
      - action: "Monitor sample during analysis"
        details: "Track sample through analytical workflow, scan at each process step"
      - action: "Document sample condition changes"
        details: "Note any changes in sample appearance, issues, or anomalies"
      - action: "Update LIMS analysis status"
        details: "Update status as analysis progresses: in progress, complete, pending review"
      - action: "Handle remaining aliquot"
        details: "Return unused aliquot to storage or properly dispose per method"
      - action: "Update chain of custody"
        details: "Document analyst name, analysis date/time, sample disposition"
    outputs:
      - "Real-time sample location and status in LIMS"
      - "Analysis progress tracking"
      - "Sample disposition records"
    decision_points:
      - criterion: "Sample sufficient for re-analysis if needed?"
        if_yes: "Retain remaining aliquot"
        if_no: "Document insufficient sample for re-analysis"
    duration: "Variable based on analysis"
    quality_checks:
      - "LIMS status updated in real-time"
      - "Sample location always known"
      - "Chain of custody continuous"

  - step_number: 6
    step_name: "Sample Storage During Testing Hold"
    description: "Maintain samples in appropriate conditions during multi-day testing or awaiting results"
    responsible: "Sample Coordinator"
    accountable: "Laboratory Manager"
    inputs:
      - "Samples awaiting analysis or results"
      - "Storage condition requirements"
      - "Hold time specifications"
    activities:
      - action: "Monitor storage conditions continuously"
        details: "Automated temperature and humidity monitoring with alert systems"
      - action: "Perform daily visual inspections"
        details: "Check sample storage areas for anomalies, spills, or equipment issues"
      - action: "Track hold times"
        details: "LIMS alerts when samples approach maximum hold time limits"
      - action: "Conduct weekly inventory"
        details: "Physical inventory count to verify LIMS records match actual samples"
      - action: "Investigate discrepancies"
        details: "Immediate investigation of missing samples or location mismatches"
      - action: "Document environmental conditions"
        details: "Continuous data logging of storage unit temperatures and conditions"
    outputs:
      - "Storage condition logs"
      - "Sample inventory records"
      - "Alert notifications for issues"
    decision_points:
      - criterion: "Storage conditions within specifications?"
        if_yes: "Continue normal storage"
        if_no: "Transfer samples to backup unit, initiate deviation investigation"
    duration: "Ongoing monitoring"
    quality_checks:
      - "Temperature within ±2°C of target"
      - "No temperature excursions >4 hours"
      - "Inventory accuracy >99%"

  - step_number: 7
    step_name: "Sample Transportation (Internal/External)"
    description: "Transport samples between locations while maintaining integrity and chain of custody"
    responsible: "Laboratory Technician"
    accountable: "Sample Coordinator"
    inputs:
      - "Samples requiring transport"
      - "Destination location and requirements"
      - "Transportation equipment"
    activities:
      - action: "Prepare sample for transport"
        details: "Verify container integrity, secure closure, appropriate packaging"
      - action: "Select transport method"
        details: "Internal: hand carry, cart, pneumatic tube. External: courier, shipping service"
      - action: "Prepare temperature control"
        details: "For cold chain samples, use insulated containers with ice packs or dry ice"
      - action: "Complete transport documentation"
        details: "Update chain of custody with transporter name, time, destination"
      - action: "Scan sample at departure"
        details: "LIMS records sample leaving location with timestamp"
      - action: "Monitor during transport"
        details: "For external shipments, use temperature loggers and GPS tracking"
      - action: "Scan sample at arrival"
        details: "LIMS records sample arrival at destination with timestamp"
      - action: "Verify sample condition"
        details: "Receiving personnel inspect sample condition and temperature"
      - action: "Update chain of custody"
        details: "Receiving personnel sign and timestamp custody transfer"
    outputs:
      - "Sample delivered to destination"
      - "Transport chain of custody documentation"
      - "Temperature monitoring records (if applicable)"
      - "Updated LIMS location records"
    decision_points:
      - criterion: "Sample condition acceptable at destination?"
        if_yes: "Accept sample at new location"
        if_no: "Reject sample, document condition issues, investigate"
    duration: "Variable based on distance and method"
    quality_checks:
      - "Temperature maintained during transport"
      - "No physical damage during transport"
      - "Chain of custody unbroken"
      - "Delivery within expected timeframe"

  - step_number: 8
    step_name: "Sample Disposition and Disposal"
    description: "Determine final disposition of samples after testing complete, execute proper disposal"
    responsible: "Sample Coordinator"
    accountable: "Laboratory Manager"
    inputs:
      - "Samples with completed testing"
      - "Retention requirements"
      - "Disposal procedures"
      - "Regulatory requirements"
    activities:
      - action: "Review sample status"
        details: "Verify all requested tests completed, results reported, no hold for investigation"
      - action: "Determine retention period"
        details: "Apply retention requirements: regulatory, client, or internal quality requirements"
      - action: "Authorize disposal"
        details: "Laboratory Manager or designee approves sample disposal"
      - action: "Classify waste type"
        details: "Determine if hazardous, controlled substance, or non-hazardous waste"
      - action: "Select disposal method"
        details: "Incineration, chemical treatment, secure landfill, or DEA-witnessed destruction"
      - action: "Execute disposal"
        details: "Dispose per approved method, witness and document destruction"
      - action: "Complete disposal documentation"
        details: "Document disposal date, method, personnel, witness signatures"
      - action: "Update LIMS"
        details: "Mark sample as disposed in LIMS with disposal information"
      - action: "Archive records"
        details: "Archive all sample records, chain of custody, and disposal documentation"
    outputs:
      - "Sample properly disposed"
      - "Disposal documentation completed"
      - "LIMS records updated"
      - "Records archived per retention policy"
    decision_points:
      - criterion: "Controlled substance or hazardous waste?"
        if_yes: "Follow special disposal procedures (DEA, EPA)"
        if_no: "Standard disposal procedures"
      - criterion: "Retention period expired?"
        if_yes: "Proceed with disposal"
        if_no: "Continue storage until retention period met"
    duration: "30-60 minutes for disposal batch"
    quality_checks:
      - "Disposal authorization documented"
      - "Appropriate disposal method used"
      - "Witness verification for controlled substances"
      - "Complete disposal documentation"

parameters:
  sample_acceptance_criteria:
    - criterion: "Container Integrity"
      specification: "No leaks, cracks, or damage"
    - criterion: "Labeling"
      specification: "Sample ID clearly legible and matches documentation"
    - criterion: "Temperature"
      specification: "Cold chain samples: 0-10°C on arrival"
    - criterion: "Volume"
      specification: "Sufficient volume for all requested tests plus 20% overage"
    - criterion: "Documentation"
      specification: "Complete chain of custody and sample submission form"
    - criterion: "Hold Time"
      specification: "Sample collected within maximum hold time for requested tests"

  storage_conditions_by_sample_type:
    - sample_type: "Cannabis Flower (dried)"
      temperature: "Room temperature (15-25°C)"
      humidity: "<60% RH"
      container: "Amber glass jar or barrier bag"
      max_hold_time: "6 months"
    - sample_type: "Cannabis Extract (solvent)"
      temperature: "Refrigerated (2-8°C) or frozen (-20°C)"
      humidity: "Not critical"
      container: "Amber glass vial, Teflon-lined cap"
      max_hold_time: "1 year frozen"
    - sample_type: "Reference Standards"
      temperature: "-20°C or per manufacturer"
      humidity: "Desiccated"
      container: "Manufacturer original packaging"
      max_hold_time: "Per certificate of analysis"
    - sample_type: "Environmental Samples"
      temperature: "2-8°C"
      humidity: "Not critical"
      container: "Sterile container"
      max_hold_time: "48 hours"
    - sample_type: "Microbiological Samples"
      temperature: "2-8°C (do not freeze)"
      humidity: "Not critical"
      container: "Sterile container"
      max_hold_time: "24 hours"

  sample_disposal_methods:
    - waste_type: "Non-hazardous cannabis waste"
      method: "Rendering unusable (mix with inedible material), landfill disposal"
      documentation: "Disposal log, photographic evidence"
    - waste_type: "Hazardous waste (solvents, acids)"
      method: "Containerize, label, manifest to licensed hazardous waste disposal facility"
      documentation: "Hazardous waste manifest, certificate of disposal"
    - waste_type: "Controlled substance samples (DEA Schedule I)"
      method: "DEA-witnessed destruction or reverse distributor"
      documentation: "DEA Form 41, witness signatures, photographic evidence"
    - waste_type: "Biological waste"
      method: "Autoclave sterilization, then landfill disposal"
      documentation: "Autoclave cycle records, disposal log"

quality_controls:
  in_process_controls:
    - control: "Sample Identity Verification"
      frequency: "Every sample transfer"
      acceptance_criteria: "100% match between barcode scan and LIMS record"
      action_if_failed: "Stop transfer, investigate discrepancy, correct before proceeding"
    - control: "Storage Temperature Monitoring"
      frequency: "Continuous with alerts"
      acceptance_criteria: "Within ±2°C of target temperature"
      action_if_failed: "Alert triggered, samples transferred to backup unit, maintenance called"
    - control: "Chain of Custody Completeness"
      frequency: "Every custody transfer"
      acceptance_criteria: "All fields completed with signatures and timestamps"
      action_if_failed: "Return document for completion before accepting sample"
    - control: "Sample Inventory Accuracy"
      frequency: "Weekly"
      acceptance_criteria: ">99% match between physical count and LIMS records"
      action_if_failed: "Investigate discrepancies, update LIMS, initiate deviation if sample missing"

  post_process_controls:
    - control: "Chain of Custody Audit"
      description: "Monthly audit of random chain of custody records for completeness and compliance"
      responsible: "QA Laboratory Specialist"
    - control: "Storage Condition Trend Analysis"
      description: "Monthly review of storage unit temperature logs for trends and excursions"
      responsible: "Sample Coordinator"
    - control: "Sample Handling Error Review"
      description: "Monthly review of sample handling deviations and corrective actions"
      responsible: "Laboratory Manager"

performance_metrics:
  - metric: "Sample Receipt Accuracy"
    measurement: "Percentage of samples accessioned without errors"
    target: "≥99%"
    monitoring_frequency: "Weekly"
  - metric: "Chain of Custody Completeness"
    measurement: "Percentage of complete and accurate CoC documentation"
    target: "100%"
    monitoring_frequency: "Monthly audit"
  - metric: "Sample Location Accuracy"
    measurement: "Inventory accuracy (LIMS vs. physical location)"
    target: ">99%"
    monitoring_frequency: "Weekly"
  - metric: "Storage Temperature Compliance"
    measurement: "Percentage of time storage units within specification"
    target: "≥99.5%"
    monitoring_frequency: "Continuous"
  - metric: "Hold Time Compliance"
    measurement: "Percentage of samples analyzed within hold time"
    target: "≥95%"
    monitoring_frequency: "Monthly"
  - metric: "Sample Loss Rate"
    measurement: "Number of lost samples per 1000 samples handled"
    target: "<1 per 1000"
    monitoring_frequency: "Monthly"

documentation_requirements:
  required_records:
    - "Sample receipt log"
    - "Chain of custody documentation"
    - "Sample condition reports and photographs"
    - "LIMS sample tracking records"
    - "Storage condition monitoring logs"
    - "Sample inventory records"
    - "Sample transfer and transport records"
    - "Sample disposal and destruction records"
    - "Deviation and investigation reports"
    - "Training and competency records"
  retention_period: "Sample lifetime + 5 years or per regulatory requirement"
  storage_location: "LIMS electronic records and secure document management system"
  backup_frequency: "Daily automatic backup with weekly verification"

change_control:
  triggers:
    - "New sample types or matrices"
    - "Changes to storage equipment or facilities"
    - "LIMS system upgrades or changes"
    - "Regulatory requirement updates"
    - "Deviation investigation findings requiring process changes"
  process:
    - "Submit change request via SOP-CHG-001"
    - "Impact assessment by Laboratory Manager and QA"
    - "Update procedures and documentation"
    - "Retrain affected personnel"
    - "QA approval before implementation"
    - "Monitor effectiveness post-implementation"
  documentation: "Link to change control record in SOP header"

training_requirements:
  initial_training:
    - role: "Laboratory Technician"
      duration: "40 hours"
      content: "Sample handling procedures, LIMS operation, chain of custody, storage requirements, safety"
      assessment: "Written exam (≥80%) and practical demonstration (≥85%)"
    - role: "Sample Coordinator"
      duration: "60 hours"
      content: "All technician training plus inventory management, deviation investigation, auditing"
      assessment: "Written exam (≥85%) and practical competency evaluation"
  ongoing_training:
    - requirement: "Annual refresher training (8 hours minimum)"
    - requirement: "Training on any new procedures or equipment before use"
    - requirement: "Quarterly safety and security training"
  competency_verification:
    - method: "Annual practical competency assessment"
    - method: "Quarterly performance review (error rates, compliance metrics)"
    - method: "Observation during sample handling activities"

references:
  internal:
    - "SOP-SMPL-001: Sampling Procedures"
    - "SOP-ANLY-001: Analytical Methods"
    - "SOP-COC-001: Chain of Custody"
    - "SOP-DI-001: Data Integrity"
    - "SOP-DOC-001: Document Control"
    - "SOP-CHG-001: Change Control"
    - "SOP-DEV-001: Deviation Management"
  external:
    - "ISO/IEC 17025: General Requirements for the Competence of Testing and Calibration Laboratories"
    - "WHO Good Agricultural and Collection Practices (GACP)"
    - "21 CFR Part 11: Electronic Records and Electronic Signatures"
    - "DEA Regulations: Controlled Substances Handling and Storage"
    - "DOT 49 CFR: Hazardous Materials Regulations"

attachments:
  - id: "ATT-SMPHAND-001-A"
    title: "Sample Receipt and Inspection Checklist"
    description: "Checklist for sample receipt and initial inspection"
  - id: "ATT-SMPHAND-001-B"
    title: "Chain of Custody Templates"
    description: "Standard chain of custody forms and templates"
  - id: "ATT-SMPHAND-001-C"
    title: "Sample Storage Condition Specifications"
    description: "Detailed storage requirements for all sample types"
  - id: "ATT-SMPHAND-001-D"
    title: "Sample Disposal Procedures"
    description: "Detailed procedures for sample disposal by waste type"
  - id: "ATT-SMPHAND-001-E"
    title: "LIMS User Guide for Sample Handling"
    description: "Step-by-step LIMS procedures for sample tracking"

revision_history:
  - version: "1.0"
    date: "2025-01-15"
    description: "Initial release of Sample Handling and Chain of Custody SOP"
    author: "Laboratory Manager"
    approved_by: "Quality Director"
