# DSL: Audit Trail and e-Signatures Training Module
# Version: 1.0
# Source: SOP_AuditTrail.md v2.0 Section 14
# Date: 2026-01-08

schema_version: "1.0.0"
schema_type: "training"

# ==============================================================================
# METADATA
# ==============================================================================
metadata:
  id: "TRN-AUD-001"
  training_type: "mandatory"
  category: "compliance"

  title: "Audit Trail and e-Signatures Training"
  version: "1.0"
  status: "active"

  related_sop: "SOP-AUDIT-001"
  regulatory_refs:
    - "FDA 21 CFR Part 11"
    - "EU GMP Annex 11"
    - "MHRA Data Integrity Guidance"
    - "ALCOA+ Principles"

# ==============================================================================
# TRAINING DETAILS
# ==============================================================================
training_details:
  purpose: "Ensure all ERP users understand data integrity principles, audit trail function, electronic signature requirements, and individual responsibilities for maintaining compliant records"

  target_audience:
    - "All ERP system users"
    - "New employees before system access"
    - "Existing employees (annual refresher)"
    - "Contractors and temporary staff with system access"

  prerequisites:
    - "TRN-GMP-001: Good Manufacturing Practice Basics"
    - "TRN-DI-001: Data Integrity Fundamentals"

  duration_hours: 8

  delivery_method: "blended"

  delivery_components:
    - "E-learning modules (4 hours)"
    - "Instructor-led workshop (3 hours)"
    - "Practical exercises (1 hour)"

  recertification_period_months: 12

  passing_score: 80

# ==============================================================================
# LEARNING OBJECTIVES
# ==============================================================================
learning_objectives:
  - objective_id: "LO-001"
    objective: "Explain the nine ALCOA+ principles and their application to audit trail records"
    bloom_level: "understanding"

  - objective_id: "LO-002"
    objective: "Identify which actions in ERP system generate audit trail entries"
    bloom_level: "applying"

  - objective_id: "LO-003"
    objective: "Demonstrate proper electronic signature use and meaning of signatures"
    bloom_level: "applying"

  - objective_id: "LO-004"
    objective: "Recognize data integrity violations and know reporting procedures"
    bloom_level: "evaluating"

  - objective_id: "LO-005"
    objective: "Explain regulatory requirements (FDA 21 CFR Part 11, EU GMP Annex 11)"
    bloom_level: "understanding"

  - objective_id: "LO-006"
    objective: "Apply best practices for maintaining data integrity in daily work"
    bloom_level: "applying"

# ==============================================================================
# TRAINING MODULES
# ==============================================================================
training_modules:
  # ----------------------------------------------------------------------------
  # MODULE 1: INTRODUCTION TO DATA INTEGRITY
  # ----------------------------------------------------------------------------
  - module_id: "MOD-001"
    module_title: "Introduction to Data Integrity and Regulatory Requirements"
    module_order: 1
    duration_minutes: 60
    delivery_method: "e-learning"

    topics:
      - topic_id: "MOD-001-T01"
        topic_title: "What is Data Integrity?"
        content_summary: "Definition of data integrity, importance in GxP environments, consequences of poor data integrity"
        duration_minutes: 15

      - topic_id: "MOD-001-T02"
        topic_title: "Regulatory Landscape"
        content_summary: "FDA 21 CFR Part 11, EU GMP Annex 11, MHRA Guidance, WHO GACP requirements"
        duration_minutes: 20

      - topic_id: "MOD-001-T03"
        topic_title: "ALCOA+ Principles Overview"
        content_summary: "Introduction to nine principles: Attributable, Legible, Contemporaneous, Original, Accurate, Complete, Consistent, Enduring, Available"
        duration_minutes: 25

    assessment:
      - question_id: "MOD-001-Q01"
        question_type: "multiple_choice"
        question_text: "What does ALCOA+ stand for?"
        correct_answer: "Attributable, Legible, Contemporaneous, Original, Accurate + Complete, Consistent, Enduring, Available"

      - question_id: "MOD-001-Q02"
        question_type: "multiple_choice"
        question_text: "Which regulation governs electronic records in US pharmaceutical manufacturing?"
        correct_answer: "FDA 21 CFR Part 11"

      - question_id: "MOD-001-Q03"
        question_type: "true_false"
        question_text: "Data integrity is only important for quality control records"
        correct_answer: "False"

  # ----------------------------------------------------------------------------
  # MODULE 2: ALCOA+ PRINCIPLES IN DETAIL
  # ----------------------------------------------------------------------------
  - module_id: "MOD-002"
    module_title: "ALCOA+ Principles in Detail"
    module_order: 2
    duration_minutes: 90
    delivery_method: "e-learning"

    topics:
      - topic_id: "MOD-002-T01"
        topic_title: "Attributable: Who Did It?"
        content_summary: "Unique user IDs, authentication, role documentation, no shared accounts"
        duration_minutes: 10

      - topic_id: "MOD-002-T02"
        topic_title: "Legible: Can It Be Read?"
        content_summary: "Readable format, clear field names, permanent legibility"
        duration_minutes: 10

      - topic_id: "MOD-002-T03"
        topic_title: "Contemporaneous: When Was It Recorded?"
        content_summary: "Real-time recording, auto-timestamps, NTP synchronization"
        duration_minutes: 10

      - topic_id: "MOD-002-T04"
        topic_title: "Original: Is It the First Recording?"
        content_summary: "Original vs copy, direct capture, preserving raw data"
        duration_minutes: 10

      - topic_id: "MOD-002-T05"
        topic_title: "Accurate: Is It Error-Free?"
        content_summary: "Validation, verification, minimizing manual entry"
        duration_minutes: 10

      - topic_id: "MOD-002-T06"
        topic_title: "Complete: Is All Data Captured?"
        content_summary: "Full lifecycle, context, no gaps in sequence"
        duration_minutes: 10

      - topic_id: "MOD-002-T07"
        topic_title: "Consistent: Is It Uniform?"
        content_summary: "Standardized timestamps, data format, terminology"
        duration_minutes: 10

      - topic_id: "MOD-002-T08"
        topic_title: "Enduring: Will It Last?"
        content_summary: "Immutable storage, backups, media lifecycle, tamper-evidence"
        duration_minutes: 10

      - topic_id: "MOD-002-T09"
        topic_title: "Available: Can It Be Accessed?"
        content_summary: "Authorized access, system uptime, archive retrieval, export formats"
        duration_minutes: 10

    assessment:
      - question_id: "MOD-002-Q01"
        question_type: "matching"
        question_text: "Match each ALCOA+ principle to its definition"
        correct_answer: "Attributable → Clear data ownership | Contemporaneous → Recorded at time of activity | Enduring → Preserved throughout retention"

      - question_id: "MOD-002-Q02"
        question_type: "scenario"
        question_text: "A colleague asks to borrow your login to enter test results while their account is being fixed. What should you do?"
        correct_answer: "Refuse and report to supervisor - shared accounts violate Attributable principle"

      - question_id: "MOD-002-Q03"
        question_type: "multiple_choice"
        question_text: "Which ALCOA+ principle ensures audit trail records cannot be deleted or altered?"
        correct_answer: "Enduring"

  # ----------------------------------------------------------------------------
  # MODULE 3: AUDIT TRAIL SYSTEM OVERVIEW
  # ----------------------------------------------------------------------------
  - module_id: "MOD-003"
    module_title: "Audit Trail System Architecture and Function"
    module_order: 3
    duration_minutes: 60
    delivery_method: "e-learning"

    topics:
      - topic_id: "MOD-003-T01"
        topic_title: "What is an Audit Trail?"
        content_summary: "Definition, components, automatic vs manual recording"
        duration_minutes: 15

      - topic_id: "MOD-003-T02"
        topic_title: "What Gets Logged?"
        content_summary: "Event categories: authentication, business data, system config, security, quality, regulatory"
        duration_minutes: 20

      - topic_id: "MOD-003-T03"
        topic_title: "System Architecture"
        content_summary: "ImmuDB, Kafka, Elasticsearch, NTP - high-level overview for non-technical users"
        duration_minutes: 15

      - topic_id: "MOD-003-T04"
        topic_title: "Immutability and Hash Verification"
        content_summary: "How system prevents tampering, cryptographic hashes, WORM storage"
        duration_minutes: 10

    assessment:
      - question_id: "MOD-003-Q01"
        question_type: "multiple_choice"
        question_text: "Can audit trail records be edited or deleted after creation?"
        correct_answer: "No - they are stored in immutable database (WORM)"

      - question_id: "MOD-003-Q02"
        question_type: "multiple_select"
        question_text: "Which of the following actions generate audit trail entries? (Select all that apply)"
        correct_answer:
          [
            "Login to ERP",
            "Approve batch release",
            "Change system configuration",
            "View quality reports",
          ]

  # ----------------------------------------------------------------------------
  # MODULE 4: ELECTRONIC SIGNATURES
  # ----------------------------------------------------------------------------
  - module_id: "MOD-004"
    module_title: "Electronic Signatures and Their Meaning"
    module_order: 4
    duration_minutes: 45
    delivery_method: "instructor-led"

    topics:
      - topic_id: "MOD-004-T01"
        topic_title: "E-Signature Basics"
        content_summary: "What is an e-signature, legal equivalence to handwritten signature"
        duration_minutes: 10

      - topic_id: "MOD-004-T02"
        topic_title: "Meaning of Your Signature"
        content_summary: "Understanding what you certify when you sign: accuracy, completeness, compliance"
        duration_minutes: 15

      - topic_id: "MOD-004-T03"
        topic_title: "Multi-Signature Workflows"
        content_summary: "Prepared by, Reviewed by, Approved by - roles and responsibilities"
        duration_minutes: 10

      - topic_id: "MOD-004-T04"
        topic_title: "Password Security"
        content_summary: "Never share passwords, secure password management, token duration"
        duration_minutes: 10

    assessment:
      - question_id: "MOD-004-Q01"
        question_type: "true_false"
        question_text: "An electronic signature is legally equivalent to a handwritten signature"
        correct_answer: "True"

      - question_id: "MOD-004-Q02"
        question_type: "scenario"
        question_text: "You are asked to review and approve a batch record. You notice a data entry error. What should you do?"
        correct_answer: "Do NOT approve. Report error and initiate correction per deviation procedure. Only sign when data is accurate and complete."

  # ----------------------------------------------------------------------------
  # MODULE 5: USER RESPONSIBILITIES AND BEST PRACTICES
  # ----------------------------------------------------------------------------
  - module_id: "MOD-005"
    module_title: "User Responsibilities and Best Practices"
    module_order: 5
    duration_minutes: 60
    delivery_method: "instructor-led"

    topics:
      - topic_id: "MOD-005-T01"
        topic_title: "Individual Accountability"
        content_summary: "Every action is logged and attributed to you, personal responsibility"
        duration_minutes: 15

      - topic_id: "MOD-005-T02"
        topic_title: "Data Entry Best Practices"
        content_summary: "Accuracy, timeliness, completeness, double-checking critical data"
        duration_minutes: 15

      - topic_id: "MOD-005-T03"
        topic_title: "Recognizing Data Integrity Violations"
        content_summary: "What constitutes a violation: backdating, falsification, deletion, shared accounts"
        duration_minutes: 15

      - topic_id: "MOD-005-T04"
        topic_title: "Reporting Procedures"
        content_summary: "How and when to report violations, whistleblower protection, incident reporting"
        duration_minutes: 15

    assessment:
      - question_id: "MOD-005-Q01"
        question_type: "scenario"
        question_text: "You witness a colleague manually changing a timestamp on a record to make it appear entered earlier. What should you do?"
        correct_answer: "Report to supervisor immediately - this is data falsification and a critical GMP violation"

      - question_id: "MOD-005-Q02"
        question_type: "multiple_select"
        question_text: "Which of these are data integrity violations? (Select all that apply)"
        correct_answer:
          [
            "Sharing login credentials",
            "Backdating records",
            "Deleting audit trail entries",
            "Entering data without proper training",
          ]

  # ----------------------------------------------------------------------------
  # MODULE 6: PRACTICAL EXERCISES
  # ----------------------------------------------------------------------------
  - module_id: "MOD-006"
    module_title: "Hands-On Practice and Scenarios"
    module_order: 6
    duration_minutes: 60
    delivery_method: "practical"

    topics:
      - topic_id: "MOD-006-T01"
        topic_title: "Viewing Your Own Audit Trail"
        content_summary: "How to access and review your activity log in ERP system"
        duration_minutes: 15

      - topic_id: "MOD-006-T02"
        topic_title: "Searching Audit Trail"
        content_summary: "Using search filters: date range, user, event type, module"
        duration_minutes: 15

      - topic_id: "MOD-006-T03"
        topic_title: "Electronic Signature Practice"
        content_summary: "Practice signing documents in test environment, understanding signature meaning"
        duration_minutes: 15

      - topic_id: "MOD-006-T04"
        topic_title: "Case Study Analysis"
        content_summary: "Review real-world data integrity cases, discuss lessons learned"
        duration_minutes: 15

    assessment:
      - question_id: "MOD-006-Q01"
        question_type: "practical"
        question_text: "Demonstrate: Log into test environment, perform action, view resulting audit trail entry, verify ALCOA+ compliance"
        correct_answer: "Instructor observation checklist completed"

  # ----------------------------------------------------------------------------
  # MODULE 7: INSPECTION READINESS
  # ----------------------------------------------------------------------------
  - module_id: "MOD-007"
    module_title: "Regulatory Inspection Readiness"
    module_order: 7
    duration_minutes: 45
    delivery_method: "instructor-led"

    topics:
      - topic_id: "MOD-007-T01"
        topic_title: "What Inspectors Look For"
        content_summary: "Common inspector questions, audit trail demonstration expectations"
        duration_minutes: 15

      - topic_id: "MOD-007-T02"
        topic_title: "How to Respond to Inspector Questions"
        content_summary: "Dos and don'ts, honesty and transparency, escalation to management"
        duration_minutes: 15

      - topic_id: "MOD-007-T03"
        topic_title: "Your Role During Inspection"
        content_summary: "Be prepared, know your responsibilities, maintain composure"
        duration_minutes: 15

    assessment:
      - question_id: "MOD-007-Q01"
        question_type: "scenario"
        question_text: "An inspector asks you to explain how you ensure data integrity in your daily work. How do you respond?"
        correct_answer: "Explain: unique login, real-time data entry, understanding of e-signature meaning, reporting violations, following SOPs"

# ==============================================================================
# ASSESSMENT STRATEGY
# ==============================================================================
assessment_strategy:
  formative_assessment:
    - "Quiz at end of each module"
    - "Scenario-based questions"
    - "Discussion participation"

  summative_assessment:
    - assessment_id: "FINAL-001"
      assessment_type: "final_exam"
      format: "computer-based"
      duration_minutes: 60
      questions_count: 40
      passing_score: 80

      question_breakdown:
        multiple_choice: 20
        multiple_select: 10
        true_false: 5
        scenario_based: 5

    - assessment_id: "FINAL-002"
      assessment_type: "practical_demonstration"
      format: "instructor_observation"
      duration_minutes: 15
      passing_criteria: "All critical steps performed correctly"

  remediation:
    on_fail: "Re-take failed modules and final exam after review session with trainer"
    max_attempts: 3

# ==============================================================================
# TRAINING MATERIALS
# ==============================================================================
training_materials:
  required_materials:
    - "Training slides (electronic)"
    - "SOP-AUDIT-001 (read-only copy)"
    - "ALCOA+ Quick Reference Card"
    - "Audit Trail User Guide"
    - "Data Integrity Case Studies"

  optional_materials:
    - "FDA 21 CFR Part 11 (reference)"
    - "MHRA Data Integrity Guidance (reference)"
    - "Audit Trail FAQ Document"

# ==============================================================================
# TRAINER QUALIFICATIONS
# ==============================================================================
trainer_qualifications:
  required:
    - "Train-the-Trainer certification"
    - "GMP/GACP knowledge"
    - "Data integrity expertise"
    - "Familiarity with ERP audit trail system"

  preferred:
    - "Regulatory auditing experience"
    - "Teaching or facilitation experience"

# ==============================================================================
# TRAINING RECORD
# ==============================================================================
training_record:
  documentation_required:
    - "Attendance record (date, time, location)"
    - "Final exam score"
    - "Practical assessment result"
    - "Trainer signature"
    - "Trainee signature"

  storage_location: "Learning Management System (LMS)"
  retention_period: "30_years"

  record_fields:
    - field: "employee_id"
      required: true
    - field: "employee_name"
      required: true
    - field: "training_date"
      required: true
    - field: "final_exam_score"
      required: true
    - field: "practical_result"
      required: true
    - field: "trainer_name"
      required: true
    - field: "trainer_signature"
      required: true
    - field: "trainee_signature"
      required: true
    - field: "next_recertification_date"
      required: true

# ==============================================================================
# EFFECTIVENESS EVALUATION
# ==============================================================================
effectiveness_evaluation:
  methods:
    - method: "Post-training knowledge assessment"
      timing: "Immediately after training"
      target: ">= 80% average score"

    - method: "On-the-job observation"
      timing: "30 days post-training"
      target: "No data integrity violations observed"

    - method: "Audit trail review"
      timing: "90 days post-training"
      target: "Proper use of e-signatures, no violations"

    - method: "Annual survey"
      timing: "Annually"
      target: "Trainee feedback on training quality"

  continuous_improvement:
    review_frequency: "annually"
    responsible_role: "ROLE-COMP-001"
    update_triggers:
      - "Regulatory changes"
      - "System updates"
      - "Audit findings"
      - "Training effectiveness below target"

