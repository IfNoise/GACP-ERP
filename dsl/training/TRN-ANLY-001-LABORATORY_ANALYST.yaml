---
schema_version: "1.0.0"
schema_type: "training"

metadata:
  id: "TRN-ANLY-001"
  title: "Laboratory Analyst Training Program - Analytical Methods"
  version: "1.0"
  effective_date: "2025-01-15"
  related_sop: "SOP-ANLY-001"
  training_type: "initial"
  level: "intermediate"
  target_audience:
    - "New Laboratory Analysts"
    - "Existing analysts cross-training to new methods"
    - "Analysts requiring refresher training"
  prerequisites:
    - "Basic chemistry knowledge (Bachelor's degree or equivalent)"
    - "Laboratory safety training completed"
    - "Good Documentation Practices (GDP) training"
    - "LIMS basic user training"
  duration: "120 hours (3 weeks)"
  training_owner: "Laboratory Manager"
  instructors:
    - "Senior Analysts"
    - "Method Development Scientists"
    - "Laboratory Manager"

objectives:
  primary:
    - "Understand principles of analytical testing for cannabis products"
    - "Perform cannabinoid analysis by HPLC-UV/DAD according to validated methods"
    - "Conduct terpene profiling by GC-MS"
    - "Execute microbiological testing per USP standards"
    - "Perform heavy metals analysis by ICP-MS"
    - "Apply ICH Q2(R1) validation principles"
    - "Maintain data integrity and proper documentation"
  secondary:
    - "Troubleshoot common analytical problems"
    - "Interpret analytical results and QC data"
    - "Use LIMS for sample tracking and result reporting"
    - "Recognize and report out-of-specification results"

modules:
  - module_number: 1
    module_title: "Introduction to Analytical Laboratory Operations"
    duration: "8 hours"
    delivery_method: "classroom"
    topics:
      - topic_id: "intro-001"
        topic_title: "Laboratory Organization and Quality System"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Laboratory organizational structure and roles"
          - "Quality management system overview (ISO/IEC 17025)"
          - "Regulatory requirements (WHO GACP, EMA, FDA)"
          - "Good Laboratory Practices (GLP)"
          - "Data integrity principles (ALCOA+)"
          - "Audit trail and electronic signatures"
      - topic_id: "intro-002"
        topic_title: "Cannabis Analytical Testing Overview"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Cannabis plant chemistry (cannabinoids, terpenes)"
          - "Required testing for cannabis products"
          - "Safety testing (microbiology, heavy metals, pesticides)"
          - "Potency and quality testing"
          - "Sample types and matrices"
          - "Regulatory compliance requirements"
      - topic_id: "intro-003"
        topic_title: "Laboratory Safety and Hazard Communication"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Chemical safety and SDS review"
          - "Personal protective equipment (PPE)"
          - "Solvent handling and storage"
          - "Biological hazards (microbiological samples)"
          - "Emergency procedures and spill response"
          - "Waste disposal procedures"
      - topic_id: "intro-004"
        topic_title: "LIMS and Data Management Systems"
        content_type: "hands_on"
        duration: "2 hours"
        content:
          - "LIMS navigation and sample login"
          - "Test assignment and result entry"
          - "Electronic signatures and audit trail"
          - "Report generation and Certificate of Analysis"
          - "Data backup and archiving"
    practical_exercises:
      - exercise_id: "intro-prac-001"
        title: "LIMS Sample Login and Tracking"
        duration: "1 hour"
        steps:
          - "Log into LIMS system with assigned credentials"
          - "Create new sample record from test request form"
          - "Assign tests to sample"
          - "Navigate through sample workflow"
          - "Generate sample tracking reports"
        success_criteria:
          - "Correctly enter sample information with 100% accuracy"
          - "Demonstrate understanding of LIMS workflow"
          - "Generate accurate sample tracking report"
    assessments:
      - assessment_id: "intro-quiz"
        assessment_type: "written_exam"
        duration: "30 minutes"
        passing_score: 80
        questions: 20
        topics_covered:
          - "Laboratory quality system"
          - "Cannabis testing requirements"
          - "Safety procedures"
          - "LIMS functionality"

  - module_number: 2
    module_title: "Method Validation and ICH Q2(R1) Principles"
    duration: "8 hours"
    delivery_method: "classroom"
    topics:
      - topic_id: "valid-001"
        topic_title: "Introduction to Method Validation"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Purpose and importance of method validation"
          - "ICH Q2(R1) guideline overview"
          - "Validation vs. verification vs. qualification"
          - "When validation is required"
          - "Validation protocol and report structure"
      - topic_id: "valid-002"
        topic_title: "Validation Parameters"
        content_type: "lecture"
        duration: "4 hours"
        content:
          - "Specificity/Selectivity: Measuring analyte without interference"
          - "Linearity and Range: Proportional response over concentration range"
          - "Accuracy: Closeness to true value"
          - "Precision: Repeatability and intermediate precision"
          - "Limit of Detection (LOD) and Quantitation (LOQ)"
          - "Robustness: Method reliability under variations"
          - "System Suitability: Daily system verification"
      - topic_id: "valid-003"
        topic_title: "Statistical Analysis in Validation"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Correlation coefficient and linearity assessment"
          - "Mean, standard deviation, RSD calculations"
          - "Percent recovery calculations"
          - "Control charts and trending"
          - "Outlier detection (Grubbs test)"
    practical_exercises:
      - exercise_id: "valid-prac-001"
        title: "Validation Data Analysis Exercise"
        duration: "2 hours"
        steps:
          - "Review example validation data set"
          - "Calculate linearity (r²) from calibration data"
          - "Calculate accuracy (% recovery) from spike data"
          - "Calculate precision (RSD) from replicate data"
          - "Determine if method meets acceptance criteria"
        success_criteria:
          - "Correctly calculate all validation parameters"
          - "Interpret results correctly"
          - "Determine pass/fail based on ICH criteria"
    assessments:
      - assessment_id: "valid-exam"
        assessment_type: "written_exam"
        duration: "1 hour"
        passing_score: 80
        questions: 25
        topics_covered:
          - "ICH Q2(R1) parameters"
          - "Acceptance criteria"
          - "Statistical calculations"

  - module_number: 3
    module_title: "HPLC-UV/DAD: Theory and Operation"
    duration: "16 hours"
    delivery_method: "mixed"
    topics:
      - topic_id: "hplc-001"
        topic_title: "HPLC Theory and Principles"
        content_type: "lecture"
        duration: "4 hours"
        content:
          - "Chromatography principles (retention, resolution, selectivity)"
          - "HPLC components (pump, injector, column, detector)"
          - "Reverse phase chromatography"
          - "Mobile phase selection and optimization"
          - "Gradient vs. isocratic elution"
          - "UV/DAD detection principles"
      - topic_id: "hplc-002"
        topic_title: "HPLC Instrument Operation"
        content_type: "demonstration"
        duration: "4 hours"
        content:
          - "Instrument startup and shutdown procedures"
          - "Mobile phase preparation and degassing"
          - "Column installation and care"
          - "Method programming in instrument software"
          - "Sample injection techniques"
          - "Basic troubleshooting (pressure, peaks, baseline)"
      - topic_id: "hplc-003"
        topic_title: "Cannabinoid Analysis Method"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Target cannabinoids (THC, CBD, CBG, CBN, CBC, and acids)"
          - "Chromatographic conditions (column, mobile phase, gradient)"
          - "Decarboxylation process for flower samples"
          - "Sample preparation for extracts"
          - "Calibration and standard preparation"
          - "System suitability requirements"
      - topic_id: "hplc-004"
        topic_title: "HPLC Data Analysis and Integration"
        content_type: "hands_on"
        duration: "6 hours"
        content:
          - "Chromatogram review and peak identification"
          - "Manual integration techniques"
          - "Baseline correction"
          - "Peak purity assessment using DAD"
          - "Quantitation using external standard method"
          - "Calculation of cannabinoid content"
    practical_exercises:
      - exercise_id: "hplc-prac-001"
        title: "HPLC System Suitability Test"
        duration: "3 hours"
        steps:
          - "Prepare mobile phases per SOP-ANLY-001"
          - "Install and equilibrate column"
          - "Prepare system suitability standard"
          - "Perform 6 replicate injections"
          - "Calculate resolution, tailing factor, theoretical plates, RSD"
          - "Determine pass/fail per acceptance criteria"
        success_criteria:
          - "System suitability completed without supervisor assistance"
          - "All parameters meet acceptance criteria"
          - "Proper documentation in LIMS"
      - exercise_id: "hplc-prac-002"
        title: "Cannabinoid Analysis - Dried Flower"
        duration: "6 hours"
        steps:
          - "Perform system suitability test (SST)"
          - "Prepare calibration standards (6 levels)"
          - "Prepare sample: weigh, decarboxylate, extract, filter"
          - "Analyze calibration curve and samples"
          - "Integrate chromatograms and calculate results"
          - "Evaluate QC samples"
          - "Generate Certificate of Analysis"
        success_criteria:
          - "SST passes on first attempt"
          - "Calibration r² >0.995"
          - "QC samples within ±10%"
          - "Results calculated correctly"
      - exercise_id: "hplc-prac-003"
        title: "Cannabinoid Analysis - Extract"
        duration: "4 hours"
        steps:
          - "Perform SST"
          - "Prepare sample: weigh, dissolve, dilute, filter"
          - "Analyze sample and QC"
          - "Calculate results with dilution factors"
          - "Document in LIMS"
        success_criteria:
          - "Proper sample preparation technique"
          - "Accurate dilution calculations"
          - "Results within expected range"
    assessments:
      - assessment_id: "hplc-practical"
        assessment_type: "skill_demonstration"
        duration: "4 hours"
        passing_score: 85
        description: "Independently perform complete cannabinoid analysis from SST through result reporting, including unknown sample"
        evaluation_criteria:
          - "Proper mobile phase preparation"
          - "Correct system suitability execution and evaluation"
          - "Accurate sample preparation"
          - "Correct chromatogram integration"
          - "Accurate calculations"
          - "Proper documentation"
      - assessment_id: "hplc-written"
        assessment_type: "written_exam"
        duration: "1 hour"
        passing_score: 80
        questions: 30
        topics_covered:
          - "HPLC theory"
          - "Instrument operation"
          - "Cannabinoid method specifics"
          - "Troubleshooting"

  - module_number: 4
    module_title: "GC-MS: Terpene Profiling"
    duration: "12 hours"
    delivery_method: "mixed"
    topics:
      - topic_id: "gcms-001"
        topic_title: "Gas Chromatography and Mass Spectrometry Principles"
        content_type: "lecture"
        duration: "3 hours"
        content:
          - "Gas chromatography theory"
          - "Capillary columns and stationary phases"
          - "Temperature programming"
          - "Mass spectrometry: Electron ionization, quadrupole analyzer"
          - "Scan vs. Selected Ion Monitoring (SIM) modes"
          - "Mass spectral libraries and compound identification"
      - topic_id: "gcms-002"
        topic_title: "GC-MS Instrument Operation"
        content_type: "demonstration"
        duration: "3 hours"
        content:
          - "Instrument startup and vacuum system"
          - "Column installation and conditioning"
          - "Injector types (split, splitless, headspace)"
          - "Method development and optimization"
          - "Tuning and calibration"
          - "Troubleshooting common issues"
      - topic_id: "gcms-003"
        topic_title: "Terpene Analysis Method"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Cannabis terpene profile overview"
          - "Major terpenes (α-pinene, myrcene, limonene, caryophyllene, etc.)"
          - "Headspace vs. direct injection methods"
          - "Internal standard quantitation"
          - "Temperature program optimization"
          - "Qualifier and quantifier ions"
      - topic_id: "gcms-004"
        topic_title: "GC-MS Data Analysis"
        content_type: "hands_on"
        duration: "4 hours"
        content:
          - "Chromatogram review and peak identification"
          - "Mass spectral interpretation"
          - "Library searching"
          - "Ion ratio verification"
          - "Quantitation using internal standard method"
          - "Terpene profile reporting"
    practical_exercises:
      - exercise_id: "gcms-prac-001"
        title: "GC-MS System Suitability and Calibration"
        duration: "3 hours"
        steps:
          - "Perform daily instrument tune"
          - "Prepare terpene calibration standards with internal standard"
          - "Analyze calibration curve (5 levels)"
          - "Verify linearity (r² >0.995)"
          - "Analyze QC sample to verify system"
        success_criteria:
          - "Instrument tuning passes"
          - "Calibration acceptable for all terpenes"
          - "QC sample within ±20% of target"
      - exercise_id: "gcms-prac-002"
        title: "Terpene Analysis - Fresh Flower (Headspace)"
        duration: "4 hours"
        steps:
          - "Prepare fresh flower sample (1g in headspace vial)"
          - "Add internal standard"
          - "Equilibrate sample at 80°C"
          - "Analyze by headspace GC-MS"
          - "Identify terpenes by RT and mass spectrum"
          - "Quantify using internal standard calibration"
          - "Calculate total terpene content"
        success_criteria:
          - "Proper sample preparation"
          - "Correct terpene identification (qualifier ions verified)"
          - "Accurate quantitation"
          - "Complete terpene profile report"
      - exercise_id: "gcms-prac-003"
        title: "Terpene Analysis - Extract (Direct Injection)"
        duration: "3 hours"
        steps:
          - "Prepare extract sample (dilution in pentane)"
          - "Add internal standard"
          - "Analyze by GC-MS direct injection"
          - "Process data and calculate results"
        success_criteria:
          - "Appropriate dilution factor selected"
          - "Internal standard recovery acceptable"
          - "Results properly calculated and reported"
    assessments:
      - assessment_id: "gcms-practical"
        assessment_type: "skill_demonstration"
        duration: "4 hours"
        passing_score: 85
        description: "Independently perform terpene analysis including unknown sample identification and quantitation"
      - assessment_id: "gcms-written"
        assessment_type: "written_exam"
        duration: "45 minutes"
        passing_score: 80
        questions: 25

  - module_number: 5
    module_title: "Microbiological Testing"
    duration: "12 hours"
    delivery_method: "mixed"
    topics:
      - topic_id: "micro-001"
        topic_title: "Microbiology Fundamentals"
        content_type: "lecture"
        duration: "3 hours"
        content:
          - "Bacterial and fungal morphology"
          - "Growth requirements and culture conditions"
          - "Aseptic technique principles"
          - "Sterilization and disinfection"
          - "Culture media types and preparation"
          - "Incubation conditions"
      - topic_id: "micro-002"
        topic_title: "USP <61> and <62> Methods"
        content_type: "lecture"
        duration: "3 hours"
        content:
          - "Total Aerobic Microbial Count (TAMC)"
          - "Total Yeast and Mold Count (TYMC)"
          - "Absence tests: E. coli, Salmonella, STEC E. coli"
          - "Sample preparation and dilution schemes"
          - "Acceptance criteria for cannabis products"
          - "Positive and negative controls"
      - topic_id: "micro-003"
        topic_title: "Aseptic Technique and Contamination Control"
        content_type: "demonstration"
        duration: "2 hours"
        content:
          - "Laminar flow hood operation"
          - "Proper sterile technique"
          - "Flame sterilization"
          - "Sample transfer techniques"
          - "Avoiding cross-contamination"
      - topic_id: "micro-004"
        topic_title: "Colony Counting and Identification"
        content_type: "hands_on"
        duration: "4 hours"
        content:
          - "Colony counting techniques"
          - "Distinguishing bacterial vs. fungal colonies"
          - "Calculating CFU/g"
          - "Biochemical identification methods"
          - "Confirmatory tests for pathogen"
    practical_exercises:
      - exercise_id: "micro-prac-001"
        title: "Aseptic Technique Practice"
        duration: "2 hours"
        steps:
          - "Demonstrate sterile technique in laminar flow hood"
          - "Perform serial dilutions of control organism"
          - "Plate dilutions on TSA"
          - "Incubate and count colonies"
          - "Calculate CFU/mL"
        success_criteria:
          - "No contamination in negative control"
          - "Colony counts within expected range (±10%)"
          - "Proper aseptic technique throughout"
      - exercise_id: "micro-prac-002"
        title: "Total Aerobic Count and Yeast/Mold - Cannabis Sample"
        duration: "5 days (sample prep + incubation)"
        steps:
          - "Prepare 1g cannabis sample homogenate (aseptic)"
          - "Perform serial dilutions"
          - "Plate on TSA for TAMC (incubate 30-35°C, 48-72 hr)"
          - "Plate on SDA for TYMC (incubate 20-25°C, 5-7 days)"
          - "Count colonies and calculate CFU/g"
          - "Compare to acceptance limits (<10^5 for TAMC, <10^4 for TYMC)"
        success_criteria:
          - "Aseptic technique maintained (negative control clean)"
          - "Positive control shows expected growth"
          - "Accurate colony counts"
          - "Correct CFU/g calculations"
          - "Pass/Fail determination correct"
      - exercise_id: "micro-prac-003"
        title: "Pathogen Testing - E. coli and Salmonella"
        duration: "3 days"
        steps:
          - "Perform enrichment for E. coli and Salmonella"
          - "Selective plating"
          - "Biochemical confirmation"
          - "Report presence/absence per acceptance criteria"
        success_criteria:
          - "Correct enrichment and plating procedures"
          - "Proper biochemical test interpretation"
          - "Accurate reporting"
    assessments:
      - assessment_id: "micro-practical"
        assessment_type: "skill_demonstration"
        duration: "Ongoing over 5-7 days"
        passing_score: 85
        description: "Perform complete microbiological testing on unknown cannabis sample including TAMC, TYMC, and pathogens"
      - assessment_id: "micro-written"
        assessment_type: "written_exam"
        duration: "45 minutes"
        passing_score: 80
        questions: 25

  - module_number: 6
    module_title: "ICP-MS: Heavy Metals Analysis"
    duration: "12 hours"
    delivery_method: "mixed"
    topics:
      - topic_id: "icpms-001"
        topic_title: "ICP-MS Theory and Principles"
        content_type: "lecture"
        duration: "3 hours"
        content:
          - "Inductively Coupled Plasma fundamentals"
          - "Mass spectrometry for elemental analysis"
          - "Quadrupole and collision/reaction cell technology"
          - "Polyatomic interferences and how to overcome them"
          - "Internal standard correction"
      - topic_id: "icpms-002"
        topic_title: "Sample Preparation: Microwave Digestion"
        content_type: "demonstration"
        duration: "3 hours"
        content:
          - "Acid digestion theory"
          - "Microwave digestion vessels and safety"
          - "Digestion protocols for plant materials"
          - "Dilution and matrix matching"
          - "Contamination prevention"
      - topic_id: "icpms-003"
        topic_title: "ICP-MS Instrument Operation"
        content_type: "hands_on"
        duration: "4 hours"
        content:
          - "Instrument startup and tuning"
          - "Method programming"
          - "Calibration standards preparation"
          - "Sample introduction system"
          - "Data acquisition and processing"
          - "Troubleshooting"
      - topic_id: "icpms-004"
        topic_title: "Heavy Metals Method for Cannabis"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Target heavy metals (Pb, Cd, Hg, As)"
          - "Action limits and regulatory requirements"
          - "Quality control requirements"
          - "Matrix spike and duplicate requirements"
          - "Certified reference materials"
    practical_exercises:
      - exercise_id: "icpms-prac-001"
        title: "Microwave Digestion of Cannabis Sample"
        duration: "4 hours"
        steps:
          - "Weigh 0.5g dried cannabis sample"
          - "Add HNO3 and H2O2 to digestion vessel"
          - "Pre-digest at room temperature (15 min)"
          - "Perform microwave digestion program"
          - "Cool and dilute to 50mL"
          - "Prepare blank and matrix spike"
        success_criteria:
          - "Proper safety procedures followed"
          - "Complete digestion (clear solution)"
          - "Blank prepared identically"
          - "Sample ready for ICP-MS analysis"
      - exercise_id: "icpms-prac-002"
        title: "ICP-MS Analysis of Heavy Metals"
        duration: "6 hours"
        steps:
          - "Perform instrument tuning"
          - "Prepare calibration curve (5 levels) with internal standards"
          - "Analyze samples, blank, matrix spike, CRM"
          - "Calculate metal concentrations (μg/g)"
          - "Evaluate matrix spike recovery (80-120%)"
          - "Verify CRM within ±10% of certified value"
          - "Compare results to action limits"
        success_criteria:
          - "Instrument tuning passes"
          - "Calibration r² >0.995 for all elements"
          - "Matrix spike recovery acceptable"
          - "CRM result accurate"
          - "Results correctly reported and interpreted"
    assessments:
      - assessment_id: "icpms-practical"
        assessment_type: "skill_demonstration"
        duration: "1 day"
        passing_score: 85
        description: "Perform complete heavy metals analysis from digestion through reporting"
      - assessment_id: "icpms-written"
        assessment_type: "written_exam"
        duration: "45 minutes"
        passing_score: 80
        questions: 25

  - module_number: 7
    module_title: "Quality Control and Data Review"
    duration: "8 hours"
    delivery_method: "mixed"
    topics:
      - topic_id: "qc-001"
        topic_title: "Quality Control Sample Types and Frequencies"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Method blank: contamination monitoring"
          - "Duplicate samples: precision assessment"
          - "Matrix spike: accuracy and matrix effect"
          - "Laboratory Control Sample (LCS): method accuracy"
          - "Continuing Calibration Verification (CCV)"
          - "QC frequencies per SOP-ANLY-001"
      - topic_id: "qc-002"
        topic_title: "Control Charts and Statistical Process Control"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Shewhart control charts"
          - "Control limits (mean ±2SD and ±3SD)"
          - "Warning and action limits"
          - "Trending and outliers"
          - "Westgard rules"
          - "Out of control response"
      - topic_id: "qc-003"
        topic_title: "Data Review Process"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "First level review (analyst responsibilities)"
          - "Second level review (supervisor responsibilities)"
          - "Checklist for data review"
          - "Common errors to look for"
          - "Electronic signatures and audit trail"
          - "Certificate of Analysis generation"
      - topic_id: "qc-004"
        topic_title: "Out of Specification (OOS) Recognition and Response"
        content_type: "hands_on"
        duration: "2 hours"
        content:
          - "Recognizing OOS results"
          - "Immediate actions (notify, stop analysis, retain sample)"
          - "Phase 1 investigation (laboratory error assessment)"
          - "When to initiate formal OOS investigation (SOP-OOS-001)"
          - "Documentation requirements"
    practical_exercises:
      - exercise_id: "qc-prac-001"
        title: "QC Sample Preparation and Analysis"
        duration: "3 hours"
        steps:
          - "Prepare method blank"
          - "Prepare matrix spike sample"
          - "Prepare laboratory control sample"
          - "Analyze all QC samples with batch"
          - "Evaluate results against acceptance criteria"
          - "Plot LCS result on control chart"
        success_criteria:
          - "QC samples prepared correctly"
          - "Results calculated accurately"
          - "Control chart interpretation correct"
      - exercise_id: "qc-prac-002"
        title: "Data Review Exercise"
        duration: "2 hours"
        steps:
          - "Review provided analytical data package"
          - "Check calibration acceptance"
          - "Evaluate QC sample results"
          - "Review chromatogram integration"
          - "Verify calculations"
          - "Identify any issues or errors"
          - "Make approval/rejection decision"
        success_criteria:
          - "All errors identified"
          - "Correct approval decision"
          - "Proper documentation of review"
    assessments:
      - assessment_id: "qc-written"
        assessment_type: "written_exam"
        duration: "1 hour"
        passing_score: 80
        questions: 25

  - module_number: 8
    module_title: "Documentation, Data Integrity, and Compliance"
    duration: "8 hours"
    delivery_method: "classroom"
    topics:
      - topic_id: "doc-001"
        topic_title: "Good Documentation Practices (GDP)"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Importance of accurate documentation"
          - "ALCOA+ principles (Attributable, Legible, Contemporaneous, Original, Accurate + Complete, Consistent, Enduring, Available)"
          - "Laboratory notebook requirements"
          - "Corrections and amendments (single line strikethrough, initials, date)"
          - "Electronic records and electronic signatures"
      - topic_id: "doc-002"
        topic_title: "Data Integrity in the Laboratory"
        content_type: "lecture"
        duration: "3 hours"
        content:
          - "Data integrity principles per SOP-DI-001"
          - "Audit trail requirements"
          - "Preventing data manipulation"
          - "Raw data retention"
          - "System backups and disaster recovery"
          - "Common data integrity violations"
          - "Consequences of data integrity failures"
      - topic_id: "doc-003"
        topic_title: "Regulatory Compliance and Inspections"
        content_type: "lecture"
        duration: "2 hours"
        content:
          - "Regulatory authorities (FDA, EMA, WHO, state agencies)"
          - "What inspectors look for"
