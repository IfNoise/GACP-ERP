---
schema_version: "1.0.0"
schema_type: "report"

metadata:
  id: "REPORT-SMPHAND-001"
  title: "Monthly Sample Handling Performance Report"
  version: "1.0"
  effective_date: "2025-01-15"
  related_process: "SOP-SMPHAND-001"
  report_category: "quality_metrics"
  classification: "internal"
  frequency: "Monthly"
  distribution:
    - "Laboratory Manager"
    - "Quality Director"
    - "Operations Management"
    - "Sample Coordinators"

purpose: "Provide comprehensive monthly assessment of sample handling operations performance, identify trends, document compliance with procedures, and support continuous improvement initiatives"

data_sources:
  - "Laboratory Information Management System (LIMS)"
  - "Sample receipt logs"
  - "Chain of custody documentation"
  - "Temperature monitoring systems"
  - "Deviation management system"
  - "Training records database"

reporting_period: "Calendar month (1st - last day)"

report_preparation:
  responsible: "Sample Coordinator"
  review: "Laboratory Manager"
  approval: "Quality Director"
  due_date: "10th day of following month"

sections:
  - section_id: "SEC-001"
    section_name: "Executive Summary"
    description: "High-level overview of sample handling performance for the month"
    data_elements:
      - element_id: "total_samples_received"
        element_name: "Total Samples Received"
        data_type: "integer"
        calculation: "COUNT of samples received during reporting period"
        target: "# UNDEFINED:"
        visualization: "Trend chart"

      - element_id: "total_samples_accessioned"
        element_name: "Total Samples Accessioned"
        data_type: "integer"
        calculation: "COUNT of samples accepted and accessioned"
        target: "≥95% of received"
        visualization: "Bar chart"

      - element_id: "sample_rejection_rate"
        element_name: "Sample Rejection Rate"
        data_type: "percentage"
        calculation: "(Rejected samples / Total received) × 100"
        target: "≤5%"
        visualization: "Trend chart with target line"

      - element_id: "chain_of_custody_compliance"
        element_name: "Chain of Custody Completeness"
        data_type: "percentage"
        calculation: "(Complete CoC docs / Total samples) × 100"
        target: "100%"
        visualization: "Gauge chart"

      - element_id: "storage_temperature_compliance"
        element_name: "Storage Temperature Compliance"
        data_type: "percentage"
        calculation: "(Time within spec / Total monitored time) × 100"
        target: "≥99.5%"
        visualization: "Trend chart"

      - element_id: "sample_location_accuracy"
        element_name: "Sample Location Accuracy"
        data_type: "percentage"
        calculation: "(Correct locations / Total inventoried) × 100"
        target: ">99%"
        visualization: "Gauge chart"

      - element_id: "key_issues"
        element_name: "Key Issues and Actions"
        data_type: "text"
        calculation: "Narrative summary of major issues and corrective actions"
        target: "# UNDEFINED:"
        visualization: "Text summary"

  - section_id: "SEC-002"
    section_name: "Sample Receipt Performance"
    description: "Detailed metrics on sample receipt and accessioning activities"
    data_elements:
      - element_id: "samples_by_type"
        element_name: "Samples Received by Type"
        data_type: "table"
        calculation: "COUNT by sample_type"
        target: "# UNDEFINED:"
        visualization: "Pie chart and table"
        breakdown:
          - "Cannabis Flower"
          - "Cannabis Extract/Concentrate"
          - "Edible Product"
          - "Raw Material"
          - "Environmental Sample"
          - "Reference Standard"
          - "Quality Control Sample"

      - element_id: "samples_by_client"
        element_name: "Top 10 Clients by Sample Volume"
        data_type: "table"
        calculation: "COUNT by client, TOP 10"
        target: "# UNDEFINED:"
        visualization: "Horizontal bar chart"

      - element_id: "average_receipt_time"
        element_name: "Average Time from Arrival to Accessioning"
        data_type: "decimal"
        unit: "hours"
        calculation: "AVERAGE(accession_timestamp - arrival_timestamp)"
        target: "≤4 hours"
        visualization: "Trend chart"

      - element_id: "receipt_accuracy"
        element_name: "Receipt Documentation Accuracy"
        data_type: "percentage"
        calculation: "(Error-free receipts / Total receipts) × 100"
        target: "≥99%"
        visualization: "Trend chart"

      - element_id: "cold_chain_compliance"
        element_name: "Cold Chain Samples - Temperature Compliance on Arrival"
        data_type: "percentage"
        calculation: "(Within spec on arrival / Total cold chain) × 100"
        target: "≥95%"
        visualization: "Bar chart"

      - element_id: "rejection_reasons"
        element_name: "Sample Rejection Reasons"
        data_type: "table"
        calculation: "COUNT by rejection_reason"
        target: "# UNDEFINED:"
        visualization: "Pareto chart"
        breakdown:
          - "Damaged Container"
          - "Temperature Excursion"
          - "Incomplete Documentation"
          - "Insufficient Volume"
          - "Contamination"
          - "Expired Hold Time"
          - "Other"

  - section_id: "SEC-003"
    section_name: "Storage Conditions Performance"
    description: "Performance of sample storage conditions and equipment"
    data_elements:
      - element_id: "storage_unit_compliance"
        element_name: "Storage Unit Temperature Compliance by Unit"
        data_type: "table"
        calculation: "(Time within spec / Total time) × 100 by unit"
        target: "≥99.5%"
        visualization: "Table with conditional formatting"

      - element_id: "temperature_excursions"
        element_name: "Temperature Excursion Events"
        data_type: "table"
        calculation: "COUNT and details of excursion events"
        target: "≤2 per month"
        visualization: "Table with trend"
        details:
          - "Unit ID"
          - "Date/Time"
          - "Duration"
          - "Temperature Range"
          - "Samples Affected"
          - "Corrective Action"

      - element_id: "alarm_response_time"
        element_name: "Average Alarm Response Time"
        data_type: "decimal"
        unit: "minutes"
        calculation: "AVERAGE(response_timestamp - alarm_timestamp)"
        target: "≤30 minutes"
        visualization: "Trend chart"

      - element_id: "equipment_downtime"
        element_name: "Storage Equipment Downtime"
        data_type: "table"
        calculation: "SUM of downtime hours by unit"
        target: "≤24 hours per unit per month"
        visualization: "Table and bar chart"

      - element_id: "backup_transfer_events"
        element_name: "Emergency Backup Transfer Events"
        data_type: "integer"
        calculation: "COUNT of sample transfers due to equipment failure"
        target: "# UNDEFINED:"
        visualization: "Count with details"

  - section_id: "SEC-004"
    section_name: "Chain of Custody Compliance"
    description: "Chain of custody documentation and compliance metrics"
    data_elements:
      - element_id: "coc_completeness"
        element_name: "Chain of Custody Documentation Completeness"
        data_type: "percentage"
        calculation: "(Complete CoC / Total samples) × 100"
        target: "100%"
        visualization: "Monthly trend"

      - element_id: "coc_issues"
        element_name: "Chain of Custody Issues"
        data_type: "table"
        calculation: "COUNT and categorization of CoC issues"
        target: "0 issues"
        visualization: "Table with issue categories"
        categories:
          - "Missing Signature"
          - "Missing Date/Time"
          - "Incomplete Fields"
          - "Illegible Information"
          - "Break in Custody"
          - "Other"

      - element_id: "sample_transfers"
        element_name: "Total Sample Transfers"
        data_type: "integer"
        calculation: "COUNT of FORM-SMPHAND-002 completed"
        target: "# UNDEFINED:"
        visualization: "Count and trend"

      - element_id: "transfer_documentation_compliance"
        element_name: "Sample Transfer Documentation Compliance"
        data_type: "percentage"
        calculation: "(Complete transfer records / Total transfers) × 100"
        target: "100%"
        visualization: "Gauge chart"

      - element_id: "time_gap_analysis"
        element_name: "Chain of Custody Time Gap Analysis"
        data_type: "table"
        calculation: "AVERAGE and MAX time between custody signatures"
        target: "AVERAGE ≤15 min, MAX ≤60 min"
        visualization: "Statistical summary"

  - section_id: "SEC-005"
    section_name: "Sample Tracking and Location Accuracy"
    description: "Sample tracking system performance and inventory accuracy"
    data_elements:
      - element_id: "inventory_accuracy"
        element_name: "Physical Inventory Accuracy"
        data_type: "percentage"
        calculation: "(Samples in correct location / Total inventoried) × 100"
        target: ">99%"
        visualization: "Weekly trend chart"

      - element_id: "lims_accuracy"
        element_name: "LIMS Data Accuracy"
        data_type: "percentage"
        calculation: "(LIMS matches physical / Total verified) × 100"
        target: "100%"
        visualization: "Gauge chart"

      - element_id: "missing_samples"
        element_name: "Missing or Misplaced Samples"
        data_type: "integer"
        calculation: "COUNT of samples not found during inventory"
        target: "0"
        visualization: "Count with investigation status"

      - element_id: "barcode_scan_errors"
        element_name: "Barcode Scanning Errors"
        data_type: "integer"
        calculation: "COUNT of barcode scan failures or manual overrides"
        target: "≤10 per 1000 scans"
        visualization: "Error rate trend"

      - element_id: "sample_location_updates"
        element_name: "Sample Location Updates"
        data_type: "integer"
        calculation: "COUNT of location corrections made"
        target: "# UNDEFINED:"
        visualization: "Count and reasons"

  - section_id: "SEC-006"
    section_name: "Hold Time Compliance"
    description: "Compliance with maximum sample hold times before analysis"
    data_elements:
      - element_id: "hold_time_compliance_rate"
        element_name: "Hold Time Compliance Rate"
        data_type: "percentage"
        calculation: "(Samples analyzed within hold time / Total analyzed) × 100"
        target: "≥95%"
        visualization: "Trend chart with target"

      - element_id: "samples_exceeding_hold_time"
        element_name: "Samples Exceeding Hold Time"
        data_type: "table"
        calculation: "LIST of samples exceeding maximum hold time"
        target: "0 or documented justification"
        visualization: "Table with details"
        details:
          - "Sample ID"
          - "Sample Type"
          - "Receipt Date"
          - "Hold Time Limit"
          - "Analysis Date"
          - "Days Over"
          - "Justification"

      - element_id: "average_time_to_analysis"
        element_name: "Average Time from Receipt to Analysis Start"
        data_type: "decimal"
        unit: "days"
        calculation: "AVERAGE(analysis_start_date - receipt_date) by sample_type"
        target: "≤50% of hold time limit"
        visualization: "Bar chart by sample type"

      - element_id: "hold_time_alerts"
        element_name: "Hold Time Alerts Generated"
        data_type: "integer"
        calculation: "COUNT of LIMS hold time alerts"
        target: "# UNDEFINED:"
        visualization: "Count and response summary"

  - section_id: "SEC-007"
    section_name: "Sample Disposal Activities"
    description: "Sample disposal performance and regulatory compliance"
    data_elements:
      - element_id: "samples_disposed"
        element_name: "Total Samples Disposed"
        data_type: "integer"
        calculation: "COUNT of samples disposed during period"
        target: "# UNDEFINED:"
        visualization: "Count and trend"

      - element_id: "disposal_by_method"
        element_name: "Samples Disposed by Method"
        data_type: "table"
        calculation: "COUNT by disposal_method"
        target: "# UNDEFINED:"
        visualization: "Pie chart"
        breakdown:
          - "Rendering Unusable + Landfill"
          - "Incineration"
          - "Chemical Treatment"
          - "DEA Reverse Distributor"
          - "Hazardous Waste Facility"
          - "Other"

      - element_id: "controlled_substance_disposal"
        element_name: "Controlled Substance Disposal Events"
        data_type: "integer"
        calculation: "COUNT of disposal events for DEA controlled substances"
        target: "100% witnessed and documented"
        visualization: "Count with compliance status"

      - element_id: "disposal_documentation_compliance"
        element_name: "Disposal Documentation Completeness"
        data_type: "percentage"
        calculation: "(Complete disposal records / Total disposals) × 100"
        target: "100%"
        visualization: "Gauge chart"

      - element_id: "average_retention_time"
        element_name: "Average Sample Retention Time"
        data_type: "decimal"
        unit: "days"
        calculation: "AVERAGE(disposal_date - receipt_date)"
        target: "# UNDEFINED:"
        visualization: "Trend chart"

  - section_id: "SEC-008"
    section_name: "Deviations and Investigations"
    description: "Sample handling deviations and corrective actions"
    data_elements:
      - element_id: "total_deviations"
        element_name: "Total Sample Handling Deviations"
        data_type: "integer"
        calculation: "COUNT of deviations related to sample handling"
        target: "# UNDEFINED:"
        visualization: "Trend chart"

      - element_id: "deviations_by_category"
        element_name: "Deviations by Category"
        data_type: "table"
        calculation: "COUNT by deviation_category"
        target: "# UNDEFINED:"
        visualization: "Pareto chart"
        categories:
          - "Temperature Excursion"
          - "Chain of Custody Break"
          - "Sample Loss/Misplacement"
          - "Labeling Error"
          - "Documentation Incomplete"
          - "Contamination"
          - "Hold Time Exceeded"
          - "Other"

      - element_id: "deviation_closure_rate"
        element_name: "Deviation Closure Rate"
        data_type: "percentage"
        calculation: "(Closed deviations / Total deviations opened in period) × 100"
        target: "≥80% within 30 days"
        visualization: "Bar chart"

      - element_id: "repeat_deviations"
        element_name: "Repeat Deviations"
        data_type: "integer"
        calculation: "COUNT of deviations repeating within 90 days"
        target: "0"
        visualization: "Count with details"

      - element_id: "capa_effectiveness"
        element_name: "CAPA Effectiveness for Sample Handling"
        data_type: "percentage"
        calculation: "(Effective CAPAs / Total CAPAs closed) × 100"
        target: "≥95%"
        visualization: "Gauge chart"

  - section_id: "SEC-009"
    section_name: "Personnel Performance and Training"
    description: "Sample handling personnel performance and training compliance"
    data_elements:
      - element_id: "personnel_error_rate"
        element_name: "Personnel Error Rate by Technician"
        data_type: "table"
        calculation: "(Errors / Total activities) × 100 by technician"
        target: "≤1%"
        visualization: "Table with conditional formatting"

      - element_id: "training_compliance"
        element_name: "Sample Handling Training Compliance"
        data_type: "percentage"
        calculation: "(Personnel current on training / Total personnel) × 100"
        target: "100%"
        visualization: "Gauge chart"

      - element_id: "competency_assessments"
        element_name: "Competency Assessments Completed"
        data_type: "integer"
        calculation: "COUNT of competency assessments performed"
        target: "Per schedule"
        visualization: "Count vs. target"

      - element_id: "new_personnel_trained"
        element_name: "New Personnel Trained"
        data_type: "integer"
        calculation: "COUNT of personnel completing initial training"
        target: "# UNDEFINED:"
        visualization: "Count with pass rate"

  - section_id: "SEC-010"
    section_name: "Audit and Inspection Readiness"
    description: "Sample handling audit findings and compliance status"
    data_elements:
      - element_id: "internal_audit_findings"
        element_name: "Internal Audit Findings"
        data_type: "table"
        calculation: "LIST of sample handling findings from internal audits"
        target: "0 critical findings"
        visualization: "Table by severity"

      - element_id: "corrective_action_status"
        element_name: "Audit Corrective Action Status"
        data_type: "table"
        calculation: "Status of open corrective actions from audits"
        target: "100% on schedule"
        visualization: "Status dashboard"

      - element_id: "sop_compliance"
        element_name: "SOP Compliance Assessment"
        data_type: "percentage"
        calculation: "(Compliant observations / Total observations) × 100"
        target: "≥98%"
        visualization: "Trend chart"

      - element_id: "documentation_review_findings"
        element_name: "Documentation Review Findings"
        data_type: "integer"
        calculation: "COUNT of documentation issues identified"
        target: "≤5 per month"
        visualization: "Count by type"

  - section_id: "SEC-011"
    section_name: "Continuous Improvement Initiatives"
    description: "Ongoing improvement projects and innovations"
    data_elements:
      - element_id: "improvement_projects"
        element_name: "Active Improvement Projects"
        data_type: "table"
        calculation: "LIST of active sample handling improvement projects"
        target: "# UNDEFINED:"
        visualization: "Project status table"
        details:
          - "Project Name"
          - "Objective"
          - "Start Date"
          - "Target Completion"
          - "Status"
          - "Expected Impact"

      - element_id: "process_efficiency_gains"
        element_name: "Process Efficiency Improvements"
        data_type: "text"
        calculation: "Narrative description of efficiency improvements achieved"
        target: "# UNDEFINED:"
        visualization: "Text with metrics"

      - element_id: "cost_savings"
        element_name: "Cost Savings from Process Improvements"
        data_type: "currency"
        calculation: "SUM of documented cost savings"
        target: "# UNDEFINED:"
        visualization: "Year-to-date trend"

      - element_id: "technology_implementations"
        element_name: "Technology Implementations"
        data_type: "text"
        calculation: "Description of new technologies implemented"
        target: "# UNDEFINED:"
        visualization: "Text summary"

  - section_id: "SEC-012"
    section_name: "Key Performance Indicators Summary"
    description: "Dashboard of all critical KPIs at a glance"
    data_elements:
      - element_id: "kpi_dashboard"
        element_name: "Sample Handling KPI Dashboard"
        data_type: "dashboard"
        calculation: "Compilation of all critical KPIs with status indicators"
        target: "All KPIs green or yellow"
        visualization: "Multi-panel dashboard"
        kpis:
          - name: "Sample Rejection Rate"
            target: "≤5%"
            status_indicators:
              green: "≤3%"
              yellow: "3-5%"
              red: ">5%"
          - name: "Chain of Custody Completeness"
            target: "100%"
            status_indicators:
              green: "100%"
              yellow: "98-99%"
              red: "<98%"
          - name: "Storage Temperature Compliance"
            target: "≥99.5%"
            status_indicators:
              green: "≥99.5%"
              yellow: "98-99.4%"
              red: "<98%"
          - name: "Sample Location Accuracy"
            target: ">99%"
            status_indicators:
              green: ">99%"
              yellow: "97-99%"
              red: "<97%"
          - name: "Hold Time Compliance"
            target: "≥95%"
            status_indicators:
              green: "≥95%"
              yellow: "90-94%"
              red: "<90%"
          - name: "Disposal Documentation Completeness"
            target: "100%"
            status_indicators:
              green: "100%"
              yellow: "95-99%"
              red: "<95%"

  - section_id: "SEC-013"
    section_name: "Action Items and Recommendations"
    description: "Priority actions and management recommendations"
    data_elements:
      - element_id: "priority_actions"
        element_name: "Priority Action Items for Next Month"
        data_type: "table"
        calculation: "Manual entry of priority actions"
        target: "# UNDEFINED:"
        visualization: "Action item table"
        details:
          - "Action Item"
          - "Priority (High/Medium/Low)"
          - "Responsible Person"
          - "Target Date"
          - "Resources Required"

      - element_id: "management_recommendations"
        element_name: "Management Recommendations"
        data_type: "text"
        calculation: "Narrative recommendations from Sample Coordinator and Laboratory Manager"
        target: "# UNDEFINED:"
        visualization: "Text summary"

      - element_id: "resource_needs"
        element_name: "Resource Needs Identified"
        data_type: "text"
        calculation: "Description of equipment, personnel, or training needs"
        target: "# UNDEFINED:"
        visualization: "Text summary"

      - element_id: "next_month_goals"
        element_name: "Goals for Next Month"
        data_type: "text"
        calculation: "Specific measurable goals for following month"
        target: "# UNDEFINED:"
        visualization: "Bulleted list"

approval_workflow:
  - step: 1
    action: "Sample Coordinator compiles data and prepares draft report"
    responsible: "Sample Coordinator"
    deadline: "5th of following month"
  - step: 2
    action: "Laboratory Manager reviews and adds management commentary"
    responsible: "Laboratory Manager"
    deadline: "8th of following month"
  - step: 3
    action: "Quality Director reviews and approves"
    responsible: "Quality Director"
    deadline: "10th of following month"
  - step: 4
    action: "Report distributed to stakeholders"
    responsible: "Document Control"
    deadline: "10th of following month"

review_and_action:
  - "Monthly management review meeting to discuss report findings"
  - "Action items tracked through completion"
  - "Trends analyzed quarterly for strategic planning"
  - "Annual compilation for regulatory submissions and management review"

record_retention: "7 years"

related_documents:
  - "SOP-SMPHAND-001: Sample Handling and Chain of Custody"
  - "FORM-SMPHAND-001: Sample Receipt and Accessioning Record"
  - "FORM-SMPHAND-002: Sample Transfer and Chain of Custody Record"
  - "FORM-SMPHAND-003: Sample Disposal and Destruction Record"
  - "SOP-DEV-001: Deviation Management"
  - "SOP-CAPA-001: Corrective and Preventive Action"

revision_history:
  - version: "1.0"
    date: "2025-01-15"
    changes: "Initial release of Monthly Sample Handling Performance Report"
    author: "Laboratory Manager"
