# DSL: Data Integrity Assessment Form
# Version: 1.0
# Source: SOP_DataIntegrity.md v2.0
# Date: 2026-01-08

schema_version: "1.0.0"
schema_type: "form"

metadata:
  id: "FORM-DI-001"
  title: "Data Integrity Assessment Form"
  version: "1.0"
  status: "active"
  form_type: "assessment"
  related_sop: "SOP-DI-001"
  department: "Quality Assurance"

form_context:
  purpose: "Assess data integrity risks and controls for new systems, processes, or data types to ensure ALCOA+ compliance and regulatory requirements"

  when_to_use:
    - "Implementation of new computerized system"
    - "Significant modification to existing system"
    - "Introduction of new data type or process"
    - "Change in data handling procedures"
    - "Response to audit finding related to data integrity"
    - "Periodic review of existing systems (annual)"

  completion_requirements:
    estimated_time: "60-120 minutes depending on system complexity"
    required_participants:
      - "System/Process Owner"
      - "Quality Assurance Representative"
      - "IT Representative (for computerized systems)"
      - "Subject Matter Expert (as needed)"
    authorization_required: "Data Integrity Manager, Quality Manager"

form_sections:
  - section_id: "SEC-001"
    section_title: "Assessment Information"
    section_order: 1
    instructions: "Provide basic information about the assessment and system/process being evaluated"

    fields:
      - field_id: "ASIS-001"
        field_label: "Assessment ID"
        field_type: "text"
        required: true
        autogenerated: true
        format: "DIA-YYYY-NNNN"
        description: "Unique assessment identifier automatically generated"
        validation_rules:
          - "Format: DIA-YYYY-NNNN where YYYY is year and NNNN is sequential number"

      - field_id: "ASIS-002"
        field_label: "Assessment Date"
        field_type: "date"
        required: true
        default_value: "current_date"
        description: "Date assessment initiated"

      - field_id: "ASIS-003"
        field_label: "Assessment Type"
        field_type: "dropdown"
        required: true
        options:
          - "New System Implementation"
          - "System Modification"
          - "New Process/Procedure"
          - "Process Modification"
          - "New Data Type"
          - "Periodic Review"
          - "Audit Follow-Up"
          - "Incident Investigation"
        description: "Type of assessment being conducted"

      - field_id: "ASIS-004"
        field_label: "Assessment Trigger"
        field_type: "textarea"
        required: true
        max_length: 1000
        description: "Describe what triggered this assessment (project, finding, schedule, etc.)"

      - field_id: "ASIS-005"
        field_label: "Assessment Team"
        field_type: "table"
        required: true
        columns:
          - column_id: "AT-001"
            column_label: "Name"
            column_type: "text"
          - column_id: "AT-002"
            column_label: "Role"
            column_type: "dropdown"
            options:
              [
                "System Owner",
                "Process Owner",
                "QA Representative",
                "IT Representative",
                "SME",
                "Other",
              ]
          - column_id: "AT-003"
            column_label: "Department"
            column_type: "text"
          - column_id: "AT-004"
            column_label: "Contact"
            column_type: "email"
        min_rows: 2
        description: "Team members participating in assessment"

  - section_id: "SEC-002"
    section_title: "System/Process Information"
    section_order: 2
    instructions: "Provide detailed information about the system or process being assessed"

    fields:
      - field_id: "SYSP-001"
        field_label: "System/Process Name"
        field_type: "text"
        required: true
        max_length: 200
        description: "Official name of system or process"

      - field_id: "SYSP-002"
        field_label: "System/Process Description"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Detailed description including purpose, scope, and functionality"

      - field_id: "SYSP-003"
        field_label: "System Type"
        field_type: "dropdown"
        required: true
        options:
          - "LIMS (Laboratory Information Management System)"
          - "ERP (Enterprise Resource Planning)"
          - "Document Management System"
          - "Manufacturing Execution System"
          - "Quality Management System"
          - "Environmental Monitoring System"
          - "Analytical Instrument System"
          - "Database System"
          - "Manual Process"
          - "Hybrid (Manual + Computerized)"
          - "Other"
        description: "Type of system or process"

      - field_id: "SYSP-004"
        field_label: "Vendor/Manufacturer"
        field_type: "text"
        required: false
        max_length: 200
        description: "Vendor name for commercial systems (N/A for internal or manual processes)"

      - field_id: "SYSP-005"
        field_label: "System Version"
        field_type: "text"
        required: false
        max_length: 50
        description: "Software version number"

      - field_id: "SYSP-006"
        field_label: "Implementation Status"
        field_type: "dropdown"
        required: true
        options:
          - "Planning/Design"
          - "Development/Configuration"
          - "Testing"
          - "Validation"
          - "Production (Existing)"
          - "Retirement/Decommissioning"
        description: "Current status of system or process"

      - field_id: "SYSP-007"
        field_label: "GMP/GACP Impact"
        field_type: "dropdown"
        required: true
        options:
          - "Critical: Direct impact on product quality, patient safety, or regulatory compliance"
          - "High: Significant impact on operations or indirect quality impact"
          - "Medium: Supporting functions with quality system relevance"
          - "Low: Administrative functions with minimal quality impact"
        description: "Level of GMP/GACP impact"

  - section_id: "SEC-003"
    section_title: "Data Types and Criticality"
    section_order: 3
    instructions: "Identify all data types handled by the system/process and assess their criticality"

    fields:
      - field_id: "DATA-001"
        field_label: "Data Types Inventory"
        field_type: "table"
        required: true
        columns:
          - column_id: "DTI-001"
            column_label: "Data Type"
            column_type: "text"
            description: "Type of data (e.g., Analytical Results, Batch Records)"
          - column_id: "DTI-002"
            column_label: "Data Description"
            column_type: "textarea"
            description: "Detailed description of data"
          - column_id: "DTI-003"
            column_label: "Data Criticality"
            column_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low"]
            description: "Data criticality per SOP-DI-001"
          - column_id: "DTI-004"
            column_label: "Regulatory Impact"
            column_type: "dropdown"
            options:
              [
                "Direct Regulatory",
                "GMP/GACP Quality",
                "Supporting",
                "Administrative",
              ]
            description: "Regulatory relevance"
          - column_id: "DTI-005"
            column_label: "Volume"
            column_type: "dropdown"
            options:
              ["High (>1000/day)", "Medium (100-1000/day)", "Low (<100/day)"]
            description: "Expected data volume"
        min_rows: 1
        description: "Comprehensive inventory of all data types"

      - field_id: "DATA-002"
        field_label: "Data Sources"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Describe all sources of data (manual entry, instrument interfaces, system integrations, imports)"

      - field_id: "DATA-003"
        field_label: "Data Destinations"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Describe where data flows to (storage, reports, integrated systems, exports, regulatory submissions)"

  - section_id: "SEC-004"
    section_title: "ALCOA+ Assessment"
    section_order: 4
    instructions: "Assess compliance with each ALCOA+ principle. For each principle, indicate current state and identify gaps"

    fields:
      - field_id: "ALC-001"
        field_label: "Attributable (A)"
        field_type: "assessment_block"
        required: true
        sub_fields:
          - sub_field_id: "ALC-001-A"
            sub_field_label: "User Attribution Controls"
            sub_field_type: "dropdown"
            options:
              [
                "Fully Implemented",
                "Partially Implemented",
                "Not Implemented",
                "Not Applicable",
              ]
            required: true
          - sub_field_id: "ALC-001-B"
            sub_field_label: "Description of Attribution Controls"
            sub_field_type: "textarea"
            max_length: 1500
            required: true
            description: "Describe how user attribution is achieved (unique IDs, authentication, session management, device tracking, etc.)"
          - sub_field_id: "ALC-001-C"
            sub_field_label: "Identified Gaps"
            sub_field_type: "textarea"
            max_length: 1500
            required: false
            description: "Describe any gaps or weaknesses in attribution controls"
          - sub_field_id: "ALC-001-D"
            sub_field_label: "Risk Level if Gaps Exist"
            sub_field_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low", "N/A"]
            required: true

      - field_id: "ALC-002"
        field_label: "Legible (L)"
        field_type: "assessment_block"
        required: true
        sub_fields:
          - sub_field_id: "ALC-002-A"
            sub_field_label: "Legibility Controls"
            sub_field_type: "dropdown"
            options:
              [
                "Fully Implemented",
                "Partially Implemented",
                "Not Implemented",
                "Not Applicable",
              ]
            required: true
          - sub_field_id: "ALC-002-B"
            sub_field_label: "Description of Legibility Controls"
            sub_field_type: "textarea"
            max_length: 1500
            required: true
            description: "Describe legibility standards (fonts, resolution, format preservation, encoding, accessibility)"
          - sub_field_id: "ALC-002-C"
            sub_field_label: "Identified Gaps"
            sub_field_type: "textarea"
            max_length: 1500
            required: false
          - sub_field_id: "ALC-002-D"
            sub_field_label: "Risk Level if Gaps Exist"
            sub_field_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low", "N/A"]
            required: true

      - field_id: "ALC-003"
        field_label: "Contemporaneous (C)"
        field_type: "assessment_block"
        required: true
        sub_fields:
          - sub_field_id: "ALC-003-A"
            sub_field_label: "Contemporaneous Controls"
            sub_field_type: "dropdown"
            options:
              [
                "Fully Implemented",
                "Partially Implemented",
                "Not Implemented",
                "Not Applicable",
              ]
            required: true
          - sub_field_id: "ALC-003-B"
            sub_field_label: "Description of Contemporaneous Controls"
            sub_field_type: "textarea"
            max_length: 1500
            required: true
            description: "Describe real-time data capture (automated timestamps, workflow integration, immediate storage, acceptable delays)"
          - sub_field_id: "ALC-003-C"
            sub_field_label: "Identified Gaps"
            sub_field_type: "textarea"
            max_length: 1500
            required: false
          - sub_field_id: "ALC-003-D"
            sub_field_label: "Risk Level if Gaps Exist"
            sub_field_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low", "N/A"]
            required: true

      - field_id: "ALC-004"
        field_label: "Original (O)"
        field_type: "assessment_block"
        required: true
        sub_fields:
          - sub_field_id: "ALC-004-A"
            sub_field_label: "Original Data Preservation"
            sub_field_type: "dropdown"
            options:
              [
                "Fully Implemented",
                "Partially Implemented",
                "Not Implemented",
                "Not Applicable",
              ]
            required: true
          - sub_field_id: "ALC-004-B"
            sub_field_label: "Description of Original Data Controls"
            sub_field_type: "textarea"
            max_length: 1500
            required: true
            description: "Describe original data preservation (WORM storage, hashing, version control, copy certification)"
          - sub_field_id: "ALC-004-C"
            sub_field_label: "Identified Gaps"
            sub_field_type: "textarea"
            max_length: 1500
            required: false
          - sub_field_id: "ALC-004-D"
            sub_field_label: "Risk Level if Gaps Exist"
            sub_field_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low", "N/A"]
            required: true

      - field_id: "ALC-005"
        field_label: "Accurate (A)"
        field_type: "assessment_block"
        required: true
        sub_fields:
          - sub_field_id: "ALC-005-A"
            sub_field_label: "Accuracy Controls"
            sub_field_type: "dropdown"
            options:
              [
                "Fully Implemented",
                "Partially Implemented",
                "Not Implemented",
                "Not Applicable",
              ]
            required: true
          - sub_field_id: "ALC-005-B"
            sub_field_label: "Description of Accuracy Controls"
            sub_field_type: "textarea"
            max_length: 1500
            required: true
            description: "Describe accuracy validation (input validation, calculation verification, cross-validation, statistical controls)"
          - sub_field_id: "ALC-005-C"
            sub_field_label: "Identified Gaps"
            sub_field_type: "textarea"
            max_length: 1500
            required: false
          - sub_field_id: "ALC-005-D"
            sub_field_label: "Risk Level if Gaps Exist"
            sub_field_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low", "N/A"]
            required: true

      - field_id: "ALC-006"
        field_label: "Complete (C)"
        field_type: "assessment_block"
        required: true
        sub_fields:
          - sub_field_id: "ALC-006-A"
            sub_field_label: "Completeness Controls"
            sub_field_type: "dropdown"
            options:
              [
                "Fully Implemented",
                "Partially Implemented",
                "Not Implemented",
                "Not Applicable",
              ]
            required: true
          - sub_field_id: "ALC-006-B"
            sub_field_label: "Description of Completeness Controls"
            sub_field_type: "textarea"
            max_length: 1500
            required: true
            description: "Describe completeness controls (schema validation, mandatory fields, relationship integrity, audit trail completeness)"
          - sub_field_id: "ALC-006-C"
            sub_field_label: "Identified Gaps"
            sub_field_type: "textarea"
            max_length: 1500
            required: false
          - sub_field_id: "ALC-006-D"
            sub_field_label: "Risk Level if Gaps Exist"
            sub_field_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low", "N/A"]
            required: true

      - field_id: "ALC-007"
        field_label: "Consistent (C)"
        field_type: "assessment_block"
        required: true
        sub_fields:
          - sub_field_id: "ALC-007-A"
            sub_field_label: "Consistency Controls"
            sub_field_type: "dropdown"
            options:
              [
                "Fully Implemented",
                "Partially Implemented",
                "Not Implemented",
                "Not Applicable",
              ]
            required: true
          - sub_field_id: "ALC-007-B"
            sub_field_label: "Description of Consistency Controls"
            sub_field_type: "textarea"
            max_length: 1500
            required: true
            description: "Describe consistency controls (format standardization, terminology management, unit consistency, cross-system consistency)"
          - sub_field_id: "ALC-007-C"
            sub_field_label: "Identified Gaps"
            sub_field_type: "textarea"
            max_length: 1500
            required: false
          - sub_field_id: "ALC-007-D"
            sub_field_label: "Risk Level if Gaps Exist"
            sub_field_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low", "N/A"]
            required: true

      - field_id: "ALC-008"
        field_label: "Enduring (E)"
        field_type: "assessment_block"
        required: true
        sub_fields:
          - sub_field_id: "ALC-008-A"
            sub_field_label: "Endurance Controls"
            sub_field_type: "dropdown"
            options:
              [
                "Fully Implemented",
                "Partially Implemented",
                "Not Implemented",
                "Not Applicable",
              ]
            required: true
          - sub_field_id: "ALC-008-B"
            sub_field_label: "Description of Endurance Controls"
            sub_field_type: "textarea"
            max_length: 1500
            required: true
            description: "Describe preservation controls (tiered storage, format migration, redundant storage, integrity monitoring, retention management)"
          - sub_field_id: "ALC-008-C"
            sub_field_label: "Identified Gaps"
            sub_field_type: "textarea"
            max_length: 1500
            required: false
          - sub_field_id: "ALC-008-D"
            sub_field_label: "Risk Level if Gaps Exist"
            sub_field_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low", "N/A"]
            required: true

      - field_id: "ALC-009"
        field_label: "Available (A)"
        field_type: "assessment_block"
        required: true
        sub_fields:
          - sub_field_id: "ALC-009-A"
            sub_field_label: "Availability Controls"
            sub_field_type: "dropdown"
            options:
              [
                "Fully Implemented",
                "Partially Implemented",
                "Not Implemented",
                "Not Applicable",
              ]
            required: true
          - sub_field_id: "ALC-009-B"
            sub_field_label: "Description of Availability Controls"
            sub_field_type: "textarea"
            max_length: 1500
            required: true
            description: "Describe availability controls (rapid retrieval, intelligent search, access control, performance optimization, uptime)"
          - sub_field_id: "ALC-009-C"
            sub_field_label: "Identified Gaps"
            sub_field_type: "textarea"
            max_length: 1500
            required: false
          - sub_field_id: "ALC-009-D"
            sub_field_label: "Risk Level if Gaps Exist"
            sub_field_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low", "N/A"]
            required: true

  - section_id: "SEC-005"
    section_title: "Risk Assessment and Mitigation"
    section_order: 5
    instructions: "Assess overall data integrity risks and define mitigation strategies"

    fields:
      - field_id: "RISK-001"
        field_label: "Overall Risk Assessment"
        field_type: "dropdown"
        required: true
        options:
          - "Critical: Multiple critical gaps, immediate remediation required"
          - "High: Significant gaps requiring prompt remediation"
          - "Medium: Moderate gaps requiring planned remediation"
          - "Low: Minor gaps or opportunities for improvement"
          - "Acceptable: No significant gaps identified"
        description: "Overall data integrity risk level for system/process"

      - field_id: "RISK-002"
        field_label: "Risk Summary and Justification"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Summarize key risks identified and justification for overall risk rating"

      - field_id: "RISK-003"
        field_label: "Identified Risks and Mitigations"
        field_type: "table"
        required: true
        columns:
          - column_id: "IRM-001"
            column_label: "Risk Description"
            column_type: "textarea"
            description: "Specific data integrity risk"
          - column_id: "IRM-002"
            column_label: "ALCOA+ Principle(s)"
            column_type: "multi_select"
            options:
              [
                "Attributable",
                "Legible",
                "Contemporaneous",
                "Original",
                "Accurate",
                "Complete",
                "Consistent",
                "Enduring",
                "Available",
              ]
            description: "Affected ALCOA+ principles"
          - column_id: "IRM-003"
            column_label: "Risk Level"
            column_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low"]
          - column_id: "IRM-004"
            column_label: "Mitigation Strategy"
            column_type: "textarea"
            description: "Proposed mitigation"
          - column_id: "IRM-005"
            column_label: "Mitigation Owner"
            column_type: "text"
            description: "Person responsible"
          - column_id: "IRM-006"
            column_label: "Target Completion"
            column_type: "date"
            description: "Completion date"
        min_rows: 0
        description: "All identified risks with mitigation plans"

      - field_id: "RISK-004"
        field_label: "Residual Risk After Mitigation"
        field_type: "dropdown"
        required: true
        options:
          - "Acceptable: All risks mitigated to acceptable level"
          - "Acceptable with Monitoring: Low residual risk with ongoing monitoring"
          - "Requires Further Action: Medium/high residual risk requiring additional mitigation"
          - "Unacceptable: Critical residual risk, system/process cannot proceed"
        description: "Expected residual risk after all mitigations implemented"

  - section_id: "SEC-006"
    section_title: "Audit Trail and Electronic Signature Assessment"
    section_order: 6
    instructions: "Assess audit trail and electronic signature capabilities per FDA 21 CFR Part 11"

    fields:
      - field_id: "AUDIT-001"
        field_label: "Audit Trail Capability"
        field_type: "dropdown"
        required: true
        options:
          - "Comprehensive: Complete audit trail for all data activities (create, read, update, delete)"
          - "Partial: Audit trail for some but not all activities"
          - "Limited: Basic logging only"
          - "None: No audit trail capability"
        description: "System audit trail capability"

      - field_id: "AUDIT-002"
        field_label: "Audit Trail Details"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Describe audit trail: What is captured (who, what, when, why, from/to values)? Is it immutable? Retention period? Review procedures?"

      - field_id: "AUDIT-003"
        field_label: "Electronic Signature Capability"
        field_type: "dropdown"
        required: true
        options:
          - "21 CFR Part 11 Compliant: Meets all FDA requirements for electronic signatures"
          - "Partial Compliance: Some electronic signature capabilities, gaps exist"
          - "None: No electronic signature capability"
          - "Not Applicable: Manual process, no e-signature needed"
        description: "Electronic signature compliance status"

      - field_id: "AUDIT-004"
        field_label: "Electronic Signature Details"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Describe e-signature implementation: Authentication method? Signature meaning captured? Linked to signed record? Non-repudiation?"

      - field_id: "AUDIT-005"
        field_label: "Audit Trail and E-Signature Gaps"
        field_type: "textarea"
        required: false
        max_length: 1500
        description: "Describe any gaps or non-compliance with 21 CFR Part 11 requirements"

  - section_id: "SEC-007"
    section_title: "Validation and Testing Requirements"
    section_order: 7
    instructions: "Define validation and testing requirements for data integrity controls"

    fields:
      - field_id: "VAL-001"
        field_label: "Validation Required"
        field_type: "dropdown"
        required: true
        options:
          - "Full Validation: GAMP 5 Category 4/5 system requiring extensive validation"
          - "Risk-Based Validation: Moderate validation based on risk assessment"
          - "Verification: Low-risk system requiring functional verification"
          - "Not Required: Manual process or administrative control"
        description: "Level of validation required per GAMP 5 and risk assessment"

      - field_id: "VAL-002"
        field_label: "Validation Strategy"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Describe validation approach: Validation plan? IQ/OQ/PQ? Data integrity testing? Traceability matrix? Expected timeline?"

      - field_id: "VAL-003"
        field_label: "Data Integrity Test Cases Required"
        field_type: "table"
        required: true
        columns:
          - column_id: "DIT-001"
            column_label: "Test Case Description"
            column_type: "textarea"
            description: "What will be tested"
          - column_id: "DIT-002"
            column_label: "ALCOA+ Principle"
            column_type: "dropdown"
            options:
              [
                "Attributable",
                "Legible",
                "Contemporaneous",
                "Original",
                "Accurate",
                "Complete",
                "Consistent",
                "Enduring",
                "Available",
              ]
          - column_id: "DIT-003"
            column_label: "Test Type"
            column_type: "dropdown"
            options:
              [
                "Functional Test",
                "Security Test",
                "Performance Test",
                "Disaster Recovery Test",
                "User Acceptance Test",
              ]
          - column_id: "DIT-004"
            column_label: "Priority"
            column_type: "dropdown"
            options: ["Critical", "High", "Medium", "Low"]
        min_rows: 1
        description: "Key data integrity test cases to be executed"

  - section_id: "SEC-008"
    section_title: "Training Requirements"
    section_order: 8
    instructions: "Define training requirements for personnel using the system/process"

    fields:
      - field_id: "TRN-001"
        field_label: "Training Required"
        field_type: "dropdown"
        required: true
        options:
          - "Comprehensive Training: Detailed training program required"
          - "Standard Training: Standard SOP training"
          - "Awareness Training: Basic awareness only"
          - "No Training: Administrative change, no training needed"
        description: "Level of training required"

      - field_id: "TRN-002"
        field_label: "Training Scope"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Describe training content: ALCOA+ principles? System operation? Data integrity procedures? Who needs training (roles)? Estimated duration?"

      - field_id: "TRN-003"
        field_label: "Training Completion Requirement"
        field_type: "dropdown"
        required: true
        options:
          - "Before Go-Live: Training must be completed before system/process use"
          - "Within 30 Days: Training within 30 days of go-live"
          - "As Needed: Training on demand"
          - "Not Applicable"
        description: "When training must be completed"

  - section_id: "SEC-009"
    section_title: "Recommendations and Action Plan"
    section_order: 9
    instructions: "Provide overall recommendations and action plan to achieve acceptable data integrity"

    fields:
      - field_id: "REC-001"
        field_label: "Overall Assessment Conclusion"
        field_type: "dropdown"
        required: true
        options:
          - "Acceptable: System/process acceptable for use with current controls"
          - "Acceptable with Conditions: Acceptable if specified conditions met"
          - "Requires Remediation: Significant gaps requiring remediation before use"
          - "Not Acceptable: Critical gaps, system/process cannot be used"
        description: "Overall conclusion and recommendation"

      - field_id: "REC-002"
        field_label: "Assessment Summary and Recommendations"
        field_type: "textarea"
        required: true
        max_length: 3000
        description: "Summarize key findings, overall data integrity posture, and primary recommendations"

      - field_id: "REC-003"
        field_label: "Action Plan"
        field_type: "table"
        required: true
        columns:
          - column_id: "AP-001"
            column_label: "Action Item"
            column_type: "textarea"
            description: "Specific action to be taken"
          - column_id: "AP-002"
            column_label: "Priority"
            column_type: "dropdown"
            options:
              [
                "Critical (Before Go-Live)",
                "High (Within 30 days)",
                "Medium (Within 90 days)",
                "Low (Opportunity for Improvement)",
              ]
          - column_id: "AP-003"
            column_label: "Responsible Party"
            column_type: "text"
          - column_id: "AP-004"
            column_label: "Target Completion"
            column_type: "date"
          - column_id: "AP-005"
            column_label: "Status"
            column_type: "dropdown"
            options: ["Not Started", "In Progress", "Completed", "Delayed"]
        min_rows: 0
        description: "Detailed action plan with responsibilities and timelines"

      - field_id: "REC-004"
        field_label: "Monitoring and Follow-Up"
        field_type: "textarea"
        required: true
        max_length: 1500
        description: "Describe ongoing monitoring and follow-up plan: KPIs? Review frequency? Reassessment schedule?"

  - section_id: "SEC-010"
    section_title: "Approvals"
    section_order: 10
    instructions: "Required approvals for data integrity assessment"

    fields:
      - field_id: "APP-001"
        field_label: "Assessment Completed By"
        field_type: "signature"
        required: true
        signature_meaning: "I certify that I have completed this data integrity assessment to the best of my knowledge and ability"
        fields:
          - "Name"
          - "Title"
          - "Date"
          - "Electronic Signature"

      - field_id: "APP-002"
        field_label: "Data Integrity Manager Review"
        field_type: "signature"
        required: true
        signature_meaning: "I have reviewed this assessment and concur with the findings and recommendations"
        fields:
          - "Name"
          - "Title"
          - "Date"
          - "Electronic Signature"
          - "Comments (optional)"

      - field_id: "APP-003"
        field_label: "Quality Manager Approval"
        field_type: "signature"
        required: true
        signature_meaning: "I approve this data integrity assessment and authorize implementation per the action plan"
        fields:
          - "Name"
          - "Title"
          - "Date"
          - "Electronic Signature"
          - "Conditions or Comments (if applicable)"

workflow:
  - step: 1
    action: "Initiate assessment and complete Sections 1-3 (Assessment Info, System/Process Info, Data Types)"
    responsibility: "System/Process Owner"
    system: "Assessment Form"
    duration: "30-60 minutes"

  - step: 2
    action: "Complete ALCOA+ assessment (Section 4) with QA Representative"
    responsibility: "System/Process Owner + QA Representative"
    system: "Assessment Form"
    duration: "60-90 minutes"

  - step: 3
    action: "Complete risk assessment and mitigation plan (Section 5)"
    responsibility: "Assessment Team"
    system: "Assessment Form"
    duration: "30-60 minutes"

  - step: 4
    action: "Complete audit trail, validation, and training sections (Sections 6-8)"
    responsibility: "Assessment Team"
    system: "Assessment Form"
    duration: "30-45 minutes"

  - step: 5
    action: "Develop recommendations and action plan (Section 9)"
    responsibility: "Assessment Team"
    system: "Assessment Form"
    duration: "30-45 minutes"

  - step: 6
    action: "Assessment completed and submitted for review"
    responsibility: "System/Process Owner"
    system: "Workflow System"
    duration: "Immediate"

  - step: 7
    action: "Data Integrity Manager reviews assessment"
    responsibility: "Data Integrity Manager"
    system: "Workflow System"
    duration: "3-5 business days"

  - step: 8
    action: "Quality Manager approves assessment"
    responsibility: "Quality Manager"
    system: "Workflow System"
    duration: "2-3 business days"

  - step: 9
    action: "Action plan implementation and monitoring"
    responsibility: "Action Owners"
    system: "CAPA System / Project Management"
    duration: "Per action plan timelines"

storage:
  location: "Mayan-EDMS under Data Integrity Assessments folder"
  retention_period: "7_years"
  backup_requirement: "automated_daily"

change_history:
  - version: "1.0"
    date: "2026-01-08"
    author: "DSL Conversion Team"
    description: "Initial DSL conversion from SOP-DI-001"
    approved_by: "Pending"
