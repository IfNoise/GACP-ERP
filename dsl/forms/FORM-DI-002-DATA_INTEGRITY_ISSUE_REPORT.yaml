# DSL: Data Integrity Issue Report
# Version: 1.0
# Source: SOP_DataIntegrity.md v2.0
# Date: 2026-01-08

schema_version: "1.0.0"
schema_type: "form"

metadata:
  id: "FORM-DI-002"
  title: "Data Integrity Issue Report"
  version: "1.0"
  status: "active"
  form_type: "incident_report"
  related_sop: "SOP-DI-001"
  department: "Quality Assurance"

form_context:
  purpose: "Document and investigate data integrity issues, non-conformances, or potential breaches of ALCOA+ principles to enable prompt corrective and preventive actions"

  when_to_use:
    - "Discovery of data integrity violation or suspected violation"
    - "Audit finding related to data integrity"
    - "System-generated alert for data integrity anomaly"
    - "Manual identification of ALCOA+ non-compliance"
    - "Regulatory inspection observation"
    - "Internal quality review finding"

  completion_requirements:
    estimated_time: "30-90 minutes for initial report, additional time for investigation"
    required_participants:
      - "Issue Reporter/Discoverer"
      - "Quality Assurance Representative"
      - "Subject Matter Expert (system/process owner)"
      - "Investigation Team (as needed)"
    authorization_required: "Quality Manager"
    reporting_timeframe: "Within 24 hours of discovery for high/critical issues, 48 hours for medium, 72 hours for low"

form_sections:
  - section_id: "SEC-001"
    section_title: "Issue Identification"
    section_order: 1
    instructions: "Provide basic information about the data integrity issue"

    fields:
      - field_id: "ISID-001"
        field_label: "Issue Report ID"
        field_type: "text"
        required: true
        autogenerated: true
        format: "DII-YYYY-NNNN"
        description: "Unique data integrity issue identifier automatically generated"
        validation_rules:
          - "Format: DII-YYYY-NNNN where YYYY is year and NNNN is sequential number"

      - field_id: "ISID-002"
        field_label: "Discovery Date and Time"
        field_type: "datetime"
        required: true
        description: "Date and time when issue was discovered"

      - field_id: "ISID-003"
        field_label: "Reporter Name"
        field_type: "text"
        required: true
        autopopulated: "current_user"
        description: "Person reporting the issue"

      - field_id: "ISID-004"
        field_label: "Reporter Department"
        field_type: "dropdown"
        required: true
        options:
          - "Quality Assurance"
          - "Production"
          - "Laboratory"
          - "IT"
          - "Regulatory Affairs"
          - "Warehouse"
          - "Other"
        description: "Reporter's department"

      - field_id: "ISID-005"
        field_label: "Discovery Method"
        field_type: "dropdown"
        required: true
        options:
          - "System-Generated Alert"
          - "Routine Quality Review"
          - "Internal Audit"
          - "External Audit"
          - "Regulatory Inspection"
          - "User Observation"
          - "Data Review Activity"
          - "Deviation Investigation"
          - "CAPA Follow-Up"
          - "Other"
        description: "How the issue was discovered"

      - field_id: "ISID-006"
        field_label: "Related Event Reference"
        field_type: "text"
        required: false
        max_length: 100
        description: "Reference to related audit, deviation, CAPA, inspection, etc. (if applicable)"

  - section_id: "SEC-002"
    section_title: "Issue Classification"
    section_order: 2
    instructions: "Classify the data integrity issue by severity, impact, and affected ALCOA+ principles"

    fields:
      - field_id: "ISCL-001"
        field_label: "Issue Severity"
        field_type: "dropdown"
        required: true
        options:
          - "Critical: Significant impact on product quality, patient safety, or regulatory compliance"
          - "Major: Substantial data integrity concern requiring prompt remediation"
          - "Moderate: Notable issue with moderate compliance or quality impact"
          - "Minor: Low-impact issue requiring attention but minimal risk"
        description: "Severity level of the data integrity issue"
        help_text: "Critical: Immediate Quality Manager notification. Major: QA review within 24h. Moderate: Standard investigation. Minor: Document and monitor."

      - field_id: "ISCL-002"
        field_label: "Affected ALCOA+ Principles"
        field_type: "multi_select"
        required: true
        options:
          - "Attributable: User attribution compromised"
          - "Legible: Data readability issue"
          - "Contemporaneous: Delayed or backdated data entry"
          - "Original: Original data not preserved or modified"
          - "Accurate: Data accuracy compromised"
          - "Complete: Missing or incomplete data"
          - "Consistent: Data inconsistency across systems/formats"
          - "Enduring: Data preservation or retention issue"
          - "Available: Data inaccessible or unavailable"
        description: "Which ALCOA+ principles are compromised (select all that apply)"

      - field_id: "ISCL-003"
        field_label: "Regulatory Impact"
        field_type: "dropdown"
        required: true
        options:
          - "Direct Regulatory Impact: Data used in regulatory submissions or compliance documentation"
          - "GMP/GACP Quality Impact: Affects product quality or safety data"
          - "Supporting Documentation Impact: Affects supporting quality system records"
          - "Administrative Impact: Administrative data with minimal regulatory relevance"
        description: "Level of regulatory impact"

      - field_id: "ISCL-004"
        field_label: "Issue Category"
        field_type: "dropdown"
        required: true
        options:
          - "Missing Data"
          - "Inaccurate Data"
          - "Backdated/Predated Data Entry"
          - "Unauthorized Data Modification"
          - "Audit Trail Gap or Failure"
          - "System Malfunction Affecting Data"
          - "Improper Data Deletion"
          - "Incomplete Data"
          - "Data Format/Consistency Issue"
          - "Access Control Violation"
          - "Electronic Signature Non-Compliance"
          - "Data Retention/Archival Issue"
          - "Other"
        description: "Primary category of the issue"

  - section_id: "SEC-003"
    section_title: "Issue Description"
    section_order: 3
    instructions: "Provide detailed description of the data integrity issue"

    fields:
      - field_id: "ISDS-001"
        field_label: "Detailed Issue Description"
        field_type: "textarea"
        required: true
        max_length: 3000
        description: "Describe the issue in detail: What was observed? When did it occur? What data is affected? What are the circumstances?"

      - field_id: "ISDS-002"
        field_label: "Affected System/Process"
        field_type: "text"
        required: true
        max_length: 200
        description: "Name of system, process, or procedure where issue occurred"

      - field_id: "ISDS-003"
        field_label: "Affected Data Type"
        field_type: "dropdown"
        required: true
        options:
          - "Analytical/Laboratory Data"
          - "Batch Production Records"
          - "Equipment/Calibration Records"
          - "Environmental Monitoring Data"
          - "Quality Event Records (Deviations, CAPAs)"
          - "Training Records"
          - "Validation Documentation"
          - "Inventory Records"
          - "Financial Records"
          - "Audit Trail/System Logs"
          - "Document Control Records"
          - "Regulatory Submission Data"
          - "Other"
        description: "Type of data affected by the issue"

      - field_id: "ISDS-004"
        field_label: "Affected Data Records"
        field_type: "table"
        required: true
        columns:
          - column_id: "ADR-001"
            column_label: "Record ID/Reference"
            column_type: "text"
            description: "Unique identifier of affected record"
          - column_id: "ADR-002"
            column_label: "Record Type"
            column_type: "text"
            description: "Type of record"
          - column_id: "ADR-003"
            column_label: "Record Date"
            column_type: "date"
            description: "Date of record"
          - column_id: "ADR-004"
            column_label: "Impact Description"
            column_type: "textarea"
            description: "How this specific record is affected"
        min_rows: 1
        description: "List all data records affected by this issue"

      - field_id: "ISDS-005"
        field_label: "Timeframe of Issue"
        field_type: "date_range"
        required: true
        fields:
          - "Start Date (earliest affected data)"
          - "End Date (most recent affected data)"
        description: "Time period during which data was affected"

      - field_id: "ISDS-006"
        field_label: "Extent of Issue"
        field_type: "dropdown"
        required: true
        options:
          - "Isolated: Single occurrence or single record"
          - "Limited: Multiple occurrences but specific scope (e.g., specific system, date range, user)"
          - "Widespread: Multiple occurrences across systems or extended period"
          - "Systemic: Systematic issue indicating process or control failure"
        description: "Extent and scope of the data integrity issue"

      - field_id: "ISDS-007"
        field_label: "Evidence and Supporting Documentation"
        field_type: "file_attachment"
        required: true
        max_files: 10
        accepted_formats: ["pdf", "xlsx", "docx", "png", "jpg", "msg", "eml"]
        description: "Attach screenshots, audit trail excerpts, system logs, or other evidence"

  - section_id: "SEC-004"
    section_title: "Immediate Actions Taken"
    section_order: 4
    instructions: "Document any immediate containment or corrective actions taken upon discovery"

    fields:
      - field_id: "IMAC-001"
        field_label: "Immediate Actions"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Describe any immediate actions taken to contain the issue, preserve evidence, prevent recurrence, or mitigate impact"

      - field_id: "IMAC-002"
        field_label: "Notification Log"
        field_type: "table"
        required: true
        columns:
          - column_id: "NL-001"
            column_label: "Person Notified"
            column_type: "text"
            description: "Name and title"
          - column_id: "NL-002"
            column_label: "Notification Date/Time"
            column_type: "datetime"
          - column_id: "NL-003"
            column_label: "Notification Method"
            column_type: "dropdown"
            options: ["Email", "Phone", "In-Person", "System Alert"]
          - column_id: "NL-004"
            column_label: "Response/Acknowledgment"
            column_type: "textarea"
        min_rows: 0
        description: "Log of key personnel notified (Quality Manager, Senior Management, Regulatory Affairs if required)"

      - field_id: "IMAC-003"
        field_label: "Affected Product/Batch Disposition"
        field_type: "textarea"
        required: false
        max_length: 1500
        description: "If issue affects released product or batches, describe disposition actions (quarantine, recall consideration, risk assessment, etc.)"

  - section_id: "SEC-005"
    section_title: "Investigation"
    section_order: 5
    instructions: "Conduct root cause investigation following quality system procedures"

    fields:
      - field_id: "INV-001"
        field_label: "Investigation Team"
        field_type: "table"
        required: true
        columns:
          - column_id: "IT-001"
            column_label: "Name"
            column_type: "text"
          - column_id: "IT-002"
            column_label: "Role"
            column_type: "text"
          - column_id: "IT-003"
            column_label: "Department"
            column_type: "text"
        min_rows: 2
        description: "Team members conducting investigation (minimum: QA + Subject Matter Expert)"

      - field_id: "INV-002"
        field_label: "Investigation Start Date"
        field_type: "date"
        required: true
        description: "Date investigation formally initiated"

      - field_id: "INV-003"
        field_label: "Root Cause Analysis Method"
        field_type: "dropdown"
        required: true
        options:
          - "5 Whys"
          - "Fishbone Diagram (Ishikawa)"
          - "Failure Mode and Effects Analysis (FMEA)"
          - "Fault Tree Analysis"
          - "Is/Is Not Analysis"
          - "Timeline Analysis"
          - "Combination of Methods"
          - "Other"
        description: "Root cause analysis methodology used"

      - field_id: "INV-004"
        field_label: "Root Cause Analysis"
        field_type: "textarea"
        required: true
        max_length: 3000
        description: "Detailed root cause analysis. What was the fundamental cause of the issue? Include analysis diagram or summary."

      - field_id: "INV-005"
        field_label: "Identified Root Causes"
        field_type: "table"
        required: true
        columns:
          - column_id: "IRC-001"
            column_label: "Root Cause"
            column_type: "textarea"
            description: "Specific root cause identified"
          - column_id: "IRC-002"
            column_label: "Root Cause Category"
            column_type: "dropdown"
            options:
              [
                "Human Error",
                "Process Design Flaw",
                "System/Technology Failure",
                "Training Deficiency",
                "Procedure Inadequacy",
                "Management/Oversight Gap",
                "Resource Limitation",
                "External Factor",
              ]
          - column_id: "IRC-003"
            column_label: "Evidence"
            column_type: "textarea"
            description: "Evidence supporting this root cause"
        min_rows: 1
        description: "All identified root causes"

      - field_id: "INV-006"
        field_label: "Contributing Factors"
        field_type: "textarea"
        required: false
        max_length: 2000
        description: "Additional contributing factors that did not directly cause but influenced the issue"

      - field_id: "INV-007"
        field_label: "Investigation Summary"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Summary of investigation findings, conclusions, and key takeaways"

  - section_id: "SEC-006"
    section_title: "Impact Assessment"
    section_order: 6
    instructions: "Assess the impact of the data integrity issue on operations, compliance, and product quality"

    fields:
      - field_id: "IMPA-001"
        field_label: "Product Quality Impact"
        field_type: "dropdown"
        required: true
        options:
          - "No Impact: Issue does not affect product quality"
          - "Potential Impact: Possible but unconfirmed impact on product quality"
          - "Confirmed Impact: Verified impact on product quality"
          - "Unknown: Impact cannot be determined"
        description: "Impact on product quality"

      - field_id: "IMPA-002"
        field_label: "Product Quality Impact Details"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Describe product quality impact assessment, affected batches, disposition decisions"

      - field_id: "IMPA-003"
        field_label: "Patient Safety Impact"
        field_type: "dropdown"
        required: true
        options:
          - "No Impact: No patient safety concerns"
          - "Low Risk: Minimal theoretical risk to patients"
          - "Moderate Risk: Potential patient safety implications requiring evaluation"
          - "High Risk: Significant patient safety concern requiring immediate action"
        description: "Potential impact on patient safety"

      - field_id: "IMPA-004"
        field_label: "Regulatory Compliance Impact"
        field_type: "dropdown"
        required: true
        options:
          - "No Impact: Isolated issue with no regulatory implications"
          - "Low Impact: Minor non-conformance"
          - "Moderate Impact: Notable compliance issue requiring remediation"
          - "High Impact: Significant compliance breach requiring regulatory notification"
        description: "Impact on regulatory compliance"

      - field_id: "IMPA-005"
        field_label: "Regulatory Notification Required"
        field_type: "dropdown"
        required: true
        options:
          - "Yes - Immediate: Regulatory authority must be notified immediately"
          - "Yes - Prompt: Regulatory notification required within regulatory timeframe"
          - "Under Evaluation: Regulatory Affairs evaluating notification requirement"
          - "No: No regulatory notification required"
        description: "Regulatory notification requirement"

      - field_id: "IMPA-006"
        field_label: "Other Impacted Systems/Processes"
        field_type: "textarea"
        required: false
        max_length: 1500
        description: "List other systems or processes potentially affected by the same or similar issue"

  - section_id: "SEC-007"
    section_title: "Corrective and Preventive Actions (CAPA)"
    section_order: 7
    instructions: "Define corrective actions (fix the issue) and preventive actions (prevent recurrence)"

    fields:
      - field_id: "CAPA-001"
        field_label: "CAPA Required"
        field_type: "dropdown"
        required: true
        options:
          - "Yes - Formal CAPA: Issue requires formal CAPA per SOP-CAPA-001"
          - "Yes - Integrated CAPA: CAPA integrated into this issue report"
          - "No - Immediate Correction Only: Simple correction sufficient, no systemic issue"
        description: "CAPA requirement determination"

      - field_id: "CAPA-002"
        field_label: "Formal CAPA Reference"
        field_type: "text"
        required: false
        max_length: 50
        description: "If formal CAPA initiated, provide CAPA ID (e.g., CAPA-2026-0042)"

      - field_id: "CAPA-003"
        field_label: "Corrective Actions"
        field_type: "table"
        required: true
        columns:
          - column_id: "CA-001"
            column_label: "Corrective Action Description"
            column_type: "textarea"
            description: "Action to correct the identified issue"
          - column_id: "CA-002"
            column_label: "Responsible Party"
            column_type: "text"
          - column_id: "CA-003"
            column_label: "Target Completion"
            column_type: "date"
          - column_id: "CA-004"
            column_label: "Status"
            column_type: "dropdown"
            options: ["Not Started", "In Progress", "Completed", "Delayed"]
          - column_id: "CA-005"
            column_label: "Completion Date"
            column_type: "date"
        min_rows: 1
        description: "Corrective actions to address this specific issue"

      - field_id: "CAPA-004"
        field_label: "Preventive Actions"
        field_type: "table"
        required: true
        columns:
          - column_id: "PA-001"
            column_label: "Preventive Action Description"
            column_type: "textarea"
            description: "Action to prevent recurrence of similar issues"
          - column_id: "PA-002"
            column_label: "Responsible Party"
            column_type: "text"
          - column_id: "PA-003"
            column_label: "Target Completion"
            column_type: "date"
          - column_id: "PA-004"
            column_label: "Status"
            column_type: "dropdown"
            options: ["Not Started", "In Progress", "Completed", "Delayed"]
          - column_id: "PA-005"
            column_label: "Completion Date"
            column_type: "date"
        min_rows: 1
        description: "Preventive actions to prevent recurrence"

      - field_id: "CAPA-005"
        field_label: "Affected SOPs/Procedures Requiring Update"
        field_type: "textarea"
        required: false
        max_length: 1500
        description: "List any SOPs, work instructions, or procedures requiring revision as preventive action"

  - section_id: "SEC-008"
    section_title: "Effectiveness Verification"
    section_order: 8
    instructions: "Define how effectiveness of corrective/preventive actions will be verified"

    fields:
      - field_id: "EFFV-001"
        field_label: "Effectiveness Verification Plan"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Describe how effectiveness of CAPAs will be verified: KPIs to monitor? Audit? Review period?"

      - field_id: "EFFV-002"
        field_label: "Verification Timeline"
        field_type: "dropdown"
        required: true
        options:
          - "30 Days: Verification within 30 days of CAPA completion"
          - "60 Days: Verification within 60 days"
          - "90 Days: Verification within 90 days"
          - "6 Months: Long-term verification (6 months)"
          - "Other (specify in plan)"
        description: "Timeline for effectiveness verification"

      - field_id: "EFFV-003"
        field_label: "Responsible for Verification"
        field_type: "text"
        required: true
        max_length: 100
        description: "Person responsible for conducting effectiveness verification"

      - field_id: "EFFV-004"
        field_label: "Verification Results"
        field_type: "textarea"
        required: false
        max_length: 2000
        description: "Results of effectiveness verification (completed after verification period)"

      - field_id: "EFFV-005"
        field_label: "Verification Status"
        field_type: "dropdown"
        required: true
        options:
          - "Not Due: Verification not yet due"
          - "Scheduled: Verification scheduled"
          - "In Progress: Verification in progress"
          - "Effective: CAPAs verified as effective"
          - "Not Effective: CAPAs not effective, additional action required"
        description: "Status of effectiveness verification"

  - section_id: "SEC-009"
    section_title: "Closure"
    section_order: 9
    instructions: "Final closure of the data integrity issue report"

    fields:
      - field_id: "CLOS-001"
        field_label: "Issue Resolution Summary"
        field_type: "textarea"
        required: true
        max_length: 2000
        description: "Summarize issue resolution: Actions taken, effectiveness verified, lessons learned"

      - field_id: "CLOS-002"
        field_label: "Lessons Learned"
        field_type: "textarea"
        required: true
        max_length: 1500
        description: "Key lessons learned and knowledge to share across organization"

      - field_id: "CLOS-003"
        field_label: "Trending and Continuous Improvement Opportunities"
        field_type: "textarea"
        required: false
        max_length: 1500
        description: "Opportunities for trending analysis or broader continuous improvement initiatives"

  - section_id: "SEC-010"
    section_title: "Approvals"
    section_order: 10
    instructions: "Required approvals for data integrity issue report closure"

    fields:
      - field_id: "APP-001"
        field_label: "Investigation Completed By"
        field_type: "signature"
        required: true
        signature_meaning: "I certify that I have completed the investigation and documented findings accurately"
        fields:
          - "Name"
          - "Title"
          - "Date"
          - "Electronic Signature"

      - field_id: "APP-002"
        field_label: "Quality Assurance Review"
        field_type: "signature"
        required: true
        signature_meaning: "I have reviewed the investigation and concur with findings and proposed CAPAs"
        fields:
          - "Name"
          - "Title"
          - "Date"
          - "Electronic Signature"
          - "Comments"

      - field_id: "APP-003"
        field_label: "Quality Manager Approval for Closure"
        field_type: "signature"
        required: true
        signature_meaning: "I approve closure of this data integrity issue report subject to CAPA completion and effectiveness verification"
        fields:
          - "Name"
          - "Title"
          - "Date"
          - "Electronic Signature"
          - "Conditions for Closure (if applicable)"

workflow:
  - step: 1
    action: "Issue discovered and FORM-DI-002 initiated within required timeframe"
    responsibility: "Discoverer"
    system: "Quality Management System"
    timeframe: "Within 24h (critical/major), 48h (moderate), 72h (minor)"

  - step: 2
    action: "Complete Sections 1-4: Identification, Classification, Description, Immediate Actions"
    responsibility: "Reporter"
    system: "FORM-DI-002"
    timeframe: "Within 1 business day of initiation"

  - step: 3
    action: "QA notified and investigation team assigned"
    responsibility: "Quality Manager"
    system: "Workflow System"
    timeframe: "Within 1 business day (critical/major), 3 days (moderate/minor)"

  - step: 4
    action: "Investigation conducted, root cause analysis completed (Section 5)"
    responsibility: "Investigation Team"
    system: "FORM-DI-002"
    timeframe: "5 business days (minor), 10 days (moderate/major), 15 days (critical)"

  - step: 5
    action: "Impact assessment completed (Section 6)"
    responsibility: "Investigation Team + QA"
    system: "FORM-DI-002"
    timeframe: "Concurrent with investigation"

  - step: 6
    action: "CAPAs defined and documented (Section 7)"
    responsibility: "Investigation Team"
    system: "FORM-DI-002 or CAPA System"
    timeframe: "Within 3 days of investigation completion"

  - step: 7
    action: "Effectiveness verification plan established (Section 8)"
    responsibility: "Quality Assurance"
    system: "FORM-DI-002"
    timeframe: "With CAPA definition"

  - step: 8
    action: "CAPAs implemented"
    responsibility: "CAPA Owners"
    system: "CAPA System"
    timeframe: "Per CAPA target dates"

  - step: 9
    action: "Effectiveness verification conducted"
    responsibility: "Verification Owner"
    system: "FORM-DI-002"
    timeframe: "Per verification timeline (30-180 days)"

  - step: 10
    action: "Issue report closed with approvals (Section 9-10)"
    responsibility: "Quality Manager"
    system: "FORM-DI-002"
    timeframe: "After effectiveness verification"

storage:
  location: "Mayan-EDMS under Data Integrity Issues folder"
  retention_period: "7_years"
  backup_requirement: "automated_daily"

change_history:
  - version: "1.0"
    date: "2026-01-08"
    author: "DSL Conversion Team"
    description: "Initial DSL conversion from SOP-DI-001"
    approved_by: "Pending"
